<style>
:root{--p:#2563eb;--pd:#1d4ed8;--s:#fff;--b:#f8fafc;--os:#0f172a;--o:#e2e8f0;--e:#ef4444;--su:#10b981;--w:#f59e0b;--sh:0 1px 2px rgba(0,0,0,0.05);--shm:0 4px 6px rgba(0,0,0,0.07);--rx:6px;--rs:10px;--rm:16px;--rl:24px;--tr:0.2s ease;--purple:#7c3aed}
.dark{--s:#0f172a;--b:#020617;--os:#e2e8f0;--o:#1e293b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--b);color:var(--os);min-height:100dvh;line-height:1.5;-webkit-tap-highlight-color:transparent;overflow-x:hidden;transition:background 0.3s,color 0.3s}
body.logged-in{padding-top:60px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
.top-nav{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(255,255,255,0.95);border-bottom:1px solid var(--o);display:none;align-items:center;justify-content:space-between;padding:0 14px;z-index:500;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.top-nav.visible{display:flex}
.dark .top-nav{background:rgba(15,23,42,0.95)}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-logo{height:30px;border-radius:6px;cursor:pointer}
.nav-brand{font-weight:700;font-size:0.95rem;cursor:pointer;color:var(--p);font-family:'Outfit',sans-serif;white-space:nowrap}
.nav-right{display:flex;align-items:center;gap:4px}
.nav-icon-btn{width:34px;height:34px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;color:var(--os);position:relative;transition:all var(--tr)}
.nav-icon-btn:hover{background:rgba(37,99,235,0.08);color:var(--p)}
.nav-badge{position:absolute;top:-1px;right:-1px;background:var(--e);color:#fff;border-radius:8px;padding:1px 4px;font-size:0.5rem;font-weight:700;min-width:14px;text-align:center}
.user-info{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:rgba(37,99,235,0.06);cursor:pointer;font-size:0.8rem;font-weight:500}
.app-container{max-width:1400px;margin:0 auto;padding:12px;min-height:100vh}
.side-menu{position:fixed;top:0;left:0;height:100dvh;width:280px;max-width:85vw;background:var(--s);box-shadow:0 10px 40px rgba(0,0,0,0.2);transform:translateX(-100%);transition:transform 0.3s ease;z-index:600;display:flex;flex-direction:column}
.side-menu.open{transform:translateX(0)}
.side-menu.drawer-right{left:auto;right:0;width:380px;max-width:90vw;transform:translateX(100%)}
.side-menu.drawer-right.open{transform:translateX(0)}
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:599;display:none}
.menu-overlay.active{display:block}
.menu-header{padding:14px;border-bottom:1px solid var(--o);display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--p),#6366f1);color:#fff}
.menu-header img{height:30px;border-radius:6px}
.menu-header h3{font-size:0.85rem;font-family:'Outfit',sans-serif}
.role-badge{font-size:0.58rem;background:rgba(255,255,255,0.25);padding:2px 8px;border-radius:10px;margin-left:auto;font-weight:600}
.menu-content{flex:1;overflow-y:auto;padding:6px}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--rs);cursor:pointer;transition:all var(--tr);font-size:0.82rem;margin-bottom:1px;font-weight:500;color:var(--os)}
.menu-item:hover{background:rgba(37,99,235,0.06)}
.menu-item.active{background:var(--p);color:#fff}
.menu-item i{width:20px;text-align:center;font-size:0.85rem}
.menu-item.danger{color:var(--e)}
.menu-divider{border-top:1px solid var(--o);margin:5px 0}
.menu-section{padding:6px 14px;font-size:0.58rem;text-transform:uppercase;letter-spacing:1.5px;color:#94a3b8;font-weight:700}
.menu-footer{padding:8px;border-top:1px solid var(--o);font-size:0.6rem;text-align:center;color:#94a3b8}
.glass-card{background:var(--s);border-radius:var(--rl);padding:16px;box-shadow:var(--shm);border:1px solid var(--o);transition:background 0.3s,border-color 0.3s;margin-bottom:12px}
.btn{background:var(--p);color:#fff;border:none;padding:8px 16px;border-radius:20px;font-weight:600;font-size:0.82rem;cursor:pointer;transition:all var(--tr);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:var(--pd);transform:translateY(-1px)}
.btn-outline{background:transparent;border:2px solid var(--p);color:var(--p)}
.btn-outline:hover{background:var(--p);color:#fff}
.btn-danger{background:var(--e)}
.btn-success{background:var(--su)}
.btn-warning{background:var(--w);color:#000}
.btn-sm{padding:4px 10px;font-size:0.72rem}
.btn-lg{padding:11px 22px;font-size:0.9rem;border-radius:24px}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none!important}
.form-group{margin-bottom:10px}
.form-group label{display:block;margin-bottom:3px;font-size:0.75rem;font-weight:600;color:#475569}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:2px solid var(--o);border-radius:var(--rs);background:#f8fafc;font-family:'Inter',sans-serif;font-size:0.82rem;outline:none;color:var(--os);transition:all var(--tr)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(37,99,235,0.1);background:var(--s)}
.password-wrapper{position:relative}
.password-wrapper input{padding-right:40px}
.password-toggle{position:absolute;right:5px;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;color:#94a3b8}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
.grid-2{grid-template-columns:1fr 1fr}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hidden{display:none!important}
.empty-state{text-align:center;padding:25px;color:#94a3b8}
.empty-state i{font-size:2rem;margin-bottom:8px}
.badge{padding:2px 7px;border-radius:8px;font-size:0.65rem;font-weight:600;display:inline-block}
.badge-success{background:#d1fae5;color:#065f46}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-danger{background:#fee2e2;color:#991b1b}
.badge-info{background:#dbeafe;color:#1e40af}
.badge-purple{background:#ede9fe;color:#5b21b6}
.auth-wrapper{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at 30% 70%,rgba(37,99,235,0.05) 0%,transparent 50%)}
.auth-container{width:100%;max-width:460px}
.auth-card{background:var(--s);border-radius:var(--rl);padding:32px 24px;box-shadow:0 20px 50px rgba(0,0,0,0.15);border:1px solid var(--o);position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--p),var(--su),var(--w),var(--p));background-size:200% 100%;animation:gradientSlide 3s ease infinite}
@keyframes gradientSlide{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.auth-logo{text-align:center;margin-bottom:20px}
.auth-logo img{height:50px;border-radius:12px;margin-bottom:10px}
.auth-logo h1{font-family:'Outfit',sans-serif;font-weight:700;font-size:1.4rem;background:linear-gradient(135deg,var(--p),#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-logo p{font-size:0.8rem;color:#64748b;margin-top:4px}
.btn-auth{width:100%;padding:12px 24px;background:linear-gradient(135deg,var(--p),#6366f1);color:#fff;border:none;border-radius:24px;font-weight:600;font-size:0.9rem;cursor:pointer;transition:all var(--tr);margin-top:5px}
.btn-auth:hover{transform:translateY(-2px)}
.btn-auth:disabled{opacity:0.7;cursor:wait;transform:none!important}
.auth-links{text-align:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--o)}
.auth-links p{font-size:0.78rem;color:#64748b;margin:3px 0}
.auth-links a{color:var(--p);text-decoration:none;font-weight:600;cursor:pointer}
.whatsapp-btn{background:#25D366;color:#fff;border:none;padding:10px 16px;border-radius:20px;font-weight:600;font-size:0.78rem;cursor:pointer;display:inline-flex;align-items:center;gap:8px;text-decoration:none;width:100%;justify-content:center}
.spinner-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.92);z-index:10001;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;backdrop-filter:blur(4px)}
.dark .spinner-overlay{background:rgba(15,23,42,0.92)}
.spinner-ring{width:48px;height:48px;border:3px solid transparent;border-top:3px solid var(--p);border-right:3px solid var(--p);border-radius:50%;animation:spin 0.8s cubic-bezier(0.4,0,0.2,1) infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.spinner-text{font-size:0.9rem;font-weight:600;color:var(--p)}
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px}
.popup-card{background:var(--s);border-radius:20px;padding:28px 24px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:700;display:flex;align-items:center;justify-content:center;padding:12px}
.modal-content{background:var(--s);border-radius:var(--rl);width:100%;max-width:650px;max-height:80vh;overflow-y:auto;padding:18px;box-shadow:0 20px 50px rgba(0,0,0,0.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--o);position:sticky;top:0;background:var(--s);z-index:1}
.close-btn{width:30px;height:30px;border-radius:50%;border:2px solid var(--o);background:transparent;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;color:var(--os);transition:all var(--tr)}
.close-btn:hover{background:var(--e);color:#fff;border-color:var(--e);transform:rotate(90deg)}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.install-toast{position:fixed;top:16px;right:16px;left:auto;width:300px;max-width:calc(100vw - 32px);background:var(--s);border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,0.22);border:1px solid var(--o);padding:14px;z-index:10050;animation:toastIn 0.3s ease}
.install-toast .it-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.install-toast img{height:34px;width:34px;border-radius:9px;flex-shrink:0}
.install-toast h4{font-size:0.82rem;font-family:'Outfit',sans-serif;line-height:1.2}
.install-toast p{font-size:0.72rem;color:#64748b;margin-bottom:10px;line-height:1.4}
.install-toast .it-actions{display:flex;gap:6px}
.install-toast .it-close{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;border:none;background:transparent;color:#94a3b8;cursor:pointer;font-size:0.75rem}
@media(max-width:480px){.install-toast{top:8px;right:8px;width:calc(100vw - 16px)}}
.profile-wizard{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.wizard-step{flex:1;min-width:60px;text-align:center;padding:8px 4px;border-radius:8px;font-size:0.6rem;font-weight:600;cursor:pointer;transition:all var(--tr);background:var(--o);color:#64748b}
.wizard-step.active{background:var(--p);color:#fff}
.wizard-step.completed{background:#d1fae5;color:#065f46}
.wizard-step i{display:block;font-size:0.9rem;margin-bottom:2px}
.progress-ring{position:relative;width:100px;height:100px;margin:0 auto 16px}
.progress-ring svg{transform:rotate(-90deg)}
.bg-circle{fill:none;stroke:var(--o);stroke-width:8}
.fg-circle{fill:none;stroke:var(--p);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 0.5s ease}
.progress-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:var(--p)}
.supervisor-card{padding:10px;border:1px solid var(--o);border-radius:10px;cursor:pointer;transition:all var(--tr);margin-bottom:6px}
.supervisor-card:hover{background:rgba(37,99,235,0.04);border-color:var(--p)}
.supervisor-card.selected{background:rgba(16,185,129,0.06);border-color:var(--su);border-width:2px}
.status-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:12px 0}
.status-dot{width:12px;height:12px;border-radius:50%}
.status-line{flex:1;height:2px;background:var(--o);min-width:20px}
.status-dot.active{background:var(--p);box-shadow:0 0 0 4px rgba(37,99,235,0.2)}
.status-dot.done{background:var(--su)}
.status-dot.rejected{background:var(--e)}
.field-placement-card{background:rgba(37,99,235,0.03);border:1px solid rgba(37,99,235,0.1);border-radius:12px;padding:12px;margin-bottom:8px}
.sticky-bottom{position:sticky;bottom:0;background:var(--s);padding:12px 0;border-top:1px solid var(--o);z-index:10;margin-top:12px}
.db-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.db-card{background:var(--s);border-radius:var(--rm);padding:16px;border:1px solid var(--o);transition:all 0.2s;cursor:pointer}
.db-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,0.1)}
.card-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:10px}
.card-value{font-size:1.8rem;font-weight:700;line-height:1.1}
.card-label{font-size:0.7rem;color:#64748b;margin-top:2px}
.card-trend{font-size:0.65rem;margin-top:4px;font-weight:600}
.trend-up{color:var(--su)}
.trend-down{color:var(--e)}
.chart-container{background:var(--s);border-radius:var(--rm);padding:16px;border:1px solid var(--o);margin-bottom:12px}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.chart-title{font-weight:600;font-size:0.85rem}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:180px;padding:0 4px}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-fill{width:100%;background:var(--p);border-radius:6px 6px 0 0;transition:height 0.5s ease;min-height:4px}
.bar-label{font-size:0.6rem;color:#64748b;text-align:center;white-space:nowrap}
.bar-value{font-size:0.6rem;font-weight:600;color:var(--p)}
.pie-chart{width:160px;height:160px;border-radius:50%;margin:0 auto}
.pie-legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:0.68rem}
.legend-dot{width:10px;height:10px;border-radius:3px}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--o)}
.timeline-item{position:relative;margin-bottom:14px;padding-left:8px}
.timeline-item::before{content:'';position:absolute;left:-20px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--p);border:2px solid var(--s)}
.tl-date{font-size:0.6rem;color:#94a3b8}
.tl-title{font-size:0.78rem;font-weight:500}
.tl-desc{font-size:0.7rem;color:#64748b}
.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.quick-action{background:var(--s);border:1px solid var(--o);border-radius:var(--rs);padding:14px 8px;text-align:center;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.quick-action:hover{background:rgba(37,99,235,0.04);border-color:var(--p);transform:translateY(-1px)}
.quick-action i{font-size:1.3rem;color:var(--p)}
.quick-action span{font-size:0.68rem;font-weight:500}
.attendance-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:0.75rem;font-weight:600}
.attendance-present{background:#d1fae5;color:#065f46}
.attendance-late{background:#fef3c7;color:#92400e}
.attendance-absent{background:#fee2e2;color:#991b1b}
.permission-alert{background:rgba(245,158,11,0.1);border:2px solid var(--w);border-radius:var(--rm);padding:14px;text-align:center;margin-bottom:12px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filter-bar select,.filter-bar input{padding:6px 10px;border:1px solid var(--o);border-radius:20px;font-size:0.75rem;background:var(--s);color:var(--os);min-width:120px}
.responsive-table{overflow-x:auto;border-radius:var(--rs);border:1px solid var(--o)}
.responsive-table table{width:100%;border-collapse:collapse;min-width:500px}
.responsive-table th{background:rgba(37,99,235,0.03);padding:10px 12px;text-align:left;font-size:0.7rem;font-weight:600;color:#64748b;text-transform:uppercase;border-bottom:2px solid var(--o);white-space:nowrap}
.responsive-table td{padding:9px 12px;font-size:0.78rem;border-bottom:1px solid var(--o)}
.responsive-table tr:hover td{background:rgba(37,99,235,0.02)}
.date-badge{width:32px;height:32px;border-radius:8px;background:rgba(37,99,235,0.08);display:inline-flex;align-items:center;justify-content:center;font-size:0.75rem;color:var(--p);flex-shrink:0;font-weight:700}
.week-badge{padding:3px 8px;border-radius:6px;background:rgba(37,99,235,0.06);font-size:0.7rem;font-weight:600;color:var(--p)}
.signature-canvas{border:2px dashed var(--o);border-radius:var(--rs);background:#f8fafc;cursor:crosshair;width:100%;touch-action:none}
.dark .signature-canvas{background:#1e293b}
.checkbox-cell{width:30px;text-align:center}
.placement-status-card{background:linear-gradient(135deg,rgba(37,99,235,0.05),rgba(99,102,241,0.03));border:1px solid rgba(37,99,235,0.15);border-radius:var(--rm);padding:14px;margin-bottom:12px}
.empty-dashboard{text-align:center;padding:40px 20px}
.empty-dashboard i{font-size:3rem;color:#cbd5e1;margin-bottom:12px}
.empty-dashboard h3{font-size:1rem;margin-bottom:6px}
.empty-dashboard p{font-size:0.78rem;color:#94a3b8;margin-bottom:16px}
.assessment-card{background:rgba(124,58,237,0.03);border:1px solid rgba(124,58,237,0.15);border-radius:var(--rm);padding:14px;margin-bottom:8px;transition:all 0.2s}
.assessment-card:hover{background:rgba(124,58,237,0.06)}

S.loadProfileData=async function(){if(!S.user||S.role!=='student')return;try{var pr=await db.listDocuments(AC.databaseId,AC.collections.profiles,[Q.equal('userId',S.user.$id)]);if(pr.documents.length>0){var p=pr.documents[0];S.profileData={gender:p.gender,dateOfBirth:p.dateOfBirth,profilePhotoId:p.profilePhotoId,institution:p.institution,programme:p.programme,yearOfStudy:p.yearOfStudy,semester:p.semester,completionStatus:p.completionStatus};}var fpr=await db.listDocuments(AC.databaseId,AC.collections.fieldPlacements,[Q.equal('studentId',S.user.$id),Q.orderDesc('createdAt'),Q.limit(1)]);if(fpr.documents.length>0){var fp=fpr.documents[0];S.fieldPlacementData={$id:fp.$id,fieldRegion:fp.fieldRegion,fieldDistrict:fp.fieldDistrict,institution:fp.institution,ward:fp.ward,startDate:fp.startDate,endDate:fp.endDate,status:fp.status,verifiedBy:fp.verifiedBy,verifiedAt:fp.verifiedAt,rejectionReason:fp.rejectionReason,fieldSupervisorName:fp.fieldSupervisorName,fieldSupervisorPhone:fp.fieldSupervisorPhone,fieldSupervisorEmail:fp.fieldSupervisorEmail,fieldSupervisorPosition:fp.fieldSupervisorPosition,fieldSupervisorInstitution:fp.fieldSupervisorInstitution};}if(S.profileData.completionStatus==='completed')S.profileWizardStep=4;}catch(er){}};
S.calcWeek=function(){if(!S.attendance||S.attendance.length===0){S.week=1;return;}var f=new Date(S.attendance[S.attendance.length-1].checkInDate);var t=new Date();S.week=Math.ceil(Math.abs(t-f)/(1000*60*60*24*7))||1;};
S.checkToday=async function(){var t=new Date().toISOString().split('T')[0];try{var r=await db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.equal('checkInDate',t)]);if(r.documents.length>0){S.checkedIn=true;S.isLate=r.documents[0].status==='late'&&!r.documents[0].permissionGranted;}else{S.checkedIn=false;S.isLate=false;}}catch(e){S.checkedIn=false;}};
S.refreshAll=async function(){if(S.refreshing)return;S.refreshing=true;try{await S.loadNotifs();await S.loadData(true);await S.loadProfileData();S.render();S.toast('✅ Refreshed!','success');}catch(e){S.toast('❌ Refresh failed','error');}setTimeout(function(){S.refreshing=false;},400);};

S.calcProfileCompletion=function(){var p=S.profileData||{},fp=S.fieldPlacementData||{},t=0;if(p.gender)t+=5;if(p.dateOfBirth)t+=5;if(p.institution)t+=5;if(p.programme)t+=5;if(p.yearOfStudy)t+=5;if(p.semester)t+=5;if(fp.fieldRegion)t+=5;if(fp.fieldDistrict)t+=5;if(fp.institution)t+=5;if(fp.ward)t+=3;if(fp.startDate)t+=5;if(fp.endDate)t+=5;if(S.supId)t+=15;if(fp.fieldSupervisorName)t+=5;if(fp.fieldSupervisorPhone)t+=5;if(fp.fieldSupervisorEmail)t+=3;if(fp.fieldSupervisorPosition)t+=3;if(fp.fieldSupervisorInstitution)t+=3;return Math.min(t,100);};

S.renderDashboard=function(){var u=S.user;if(!u)return'';switch(S.role){case'student':return S.renderStudentDashboard();case'university_supervisor':return S.renderSupervisorDashboard();case'department':return S.renderDepartmentDashboard();case'admin':return S.renderAdminDashboard();default:return'<div class="glass-card" style="text-align:center;padding:30px"><h2>Welcome, '+(u.fullName||'User')+'!</h2></div>';}};

S.renderStudentDashboard=function(){var u=S.user,entries=S.entries||[],attendance=S.attendance||[],approved=entries.filter(function(e){return e.status==='Approved';}).length,pending=entries.filter(function(e){return e.status==='Pending Review';}).length,totalE=entries.length,totalA=attendance.length,presentDays=attendance.filter(function(a){return a.status==='present'||a.permissionGranted;}).length,approvalRate=totalE>0?Math.round((approved/totalE)*100):0,presentRate=totalA>0?Math.round((presentDays/totalA)*100):0,cp=S.calcProfileCompletion(),fp=S.fieldPlacementData||{},ms=S.supervisors.find(function(s){return s.$id===S.supId;});var h='<div class="welcome-hero"><h1>👋 Welcome back, '+(u.fullName||'').split(' ')[0]+'!</h1><p>Reg No: '+u.registrationNumber+' | Week '+S.week+' | '+(S.checkedIn?'✅ Checked In':'⏰ Not Checked In')+(S.isLate?' ⚠️ Late':'')+'</p></div>';h+='<div class="db-grid"><div class="db-card" onclick="app.goHistory()"><div class="card-icon" style="background:rgba(37,99,235,0.1);color:var(--p)"><i class="fas fa-book"></i></div><div class="card-value">'+totalE+'</div><div class="card-label">Entries</div></div><div class="db-card"><div class="card-icon" style="background:rgba(16,185,129,0.1);color:var(--su)"><i class="fas fa-check-circle"></i></div><div class="card-value">'+approved+'</div><div class="card-label">Approved</div><div class="card-trend '+(approvalRate>=70?'trend-up':'trend-down')+'">'+approvalRate+'%</div></div><div class="db-card" onclick="app.goTasks()"><div class="card-icon" style="background:rgba(245,158,11,0.1);color:var(--w)"><i class="fas fa-clock"></i></div><div class="card-value">'+pending+'</div><div class="card-label">Pending</div></div><div class="db-card"><div class="card-icon" style="background:rgba(16,185,129,0.1);color:var(--su)"><i class="fas fa-calendar-check"></i></div><div class="card-value">'+totalA+'</div><div class="card-label">Attendance</div><div class="card-trend trend-up">'+presentRate+'%</div></div></div>';if(fp.status&&fp.status!=='not_submitted'){var sc={submitted:'#f59e0b',verified:'#10b981',rejected:'#ef4444'},si={submitted:'📋',verified:'✅',rejected:'❌'};h+='<div class="placement-status-card"><div class="flex-between"><div><strong style="font-size:0.85rem">'+si[fp.status]+' Field Placement: '+(fp.institution||'N/A')+'</strong><p style="font-size:0.7rem;color:#64748b">'+fp.fieldRegion+', '+fp.fieldDistrict+'</p></div><span class="badge" style="background:'+(sc[fp.status]||'#e2e8f0')+'20;color:'+(sc[fp.status]||'#64748b')+'">'+fp.status+'</span></div></div>';}h+='<div class="glass-card"><h3 style="font-size:0.85rem;margin-bottom:10px">⚡ Quick Actions</h3><div class="quick-actions"><div class="quick-action" onclick="app.newEntry()"><i class="fas fa-plus-circle"></i><span>New Entry</span></div><div class="quick-action" onclick="app.checkIn()"><i class="fas fa-clock"></i><span>Check In</span></div><div class="quick-action" onclick="app.checkOut()"><i class="fas fa-sign-out-alt"></i><span>Check Out</span></div><div class="quick-action" onclick="app.goTasks()"><i class="fas fa-tasks"></i><span>Tasks</span></div></div></div>';if(entries.length>0){h+='<div class="chart-container"><div class="chart-header"><span class="chart-title">📊 Weekly Entries</span></div><div class="bar-chart">';var wd=S.getWeeklyData(7);wd.forEach(function(w){var mx=Math.max.apply(null,wd.map(function(d){return d.count;}));var hp=mx>0?(w.count/mx)*160:4;h+='<div class="bar-item"><div class="bar-fill" style="height:'+hp+'px;background:'+(w.isCurrent?'var(--p)':'rgba(37,99,235,0.4)')+'"></div><div class="bar-value">'+w.count+'</div><div class="bar-label">W'+w.week+'</div></div>';});h+='</div></div>';}if(totalE>0){h+='<div class="chart-container"><div class="chart-header"><span class="chart-title">🥧 Entry Status</span></div><div style="display:flex;align-items:center;justify-content:center;gap:20px"><div class="pie-chart" style="background:conic-gradient(var(--su) 0deg '+(approved/totalE*360)+'deg,var(--w) '+(approved/totalE*360)+'deg '+((approved+pending)/totalE*360)+'deg,var(--e) '+((approved+pending)/totalE*360)+'deg 360deg)"></div><div class="pie-legend"><div class="legend-item"><div class="legend-dot" style="background:var(--su)"></div>Approved ('+approved+')</div><div class="legend-item"><div class="legend-dot" style="background:var(--w)"></div>Pending ('+pending+')</div></div></div></div>';}h+='<div class="glass-card">'+(ms?'<div style="display:flex;align-items:center;gap:10px"><div style="width:40px;height:40px;border-radius:50%;background:rgba(16,185,129,0.1);display:flex;align-items:center;justify-content:center"><i class="fas fa-user-tie" style="color:var(--su)"></i></div><div><strong>'+ms.fullName+'</strong><p style="font-size:0.68rem;color:#64748b">University Supervisor</p></div></div>':'<div style="text-align:center;color:var(--w)"><i class="fas fa-exclamation-triangle"></i> <span>No supervisor. <a onclick="app.goProf()" style="color:var(--p);cursor:pointer">Select Now</a></span></div>')+'</div>';if(entries.length>0){h+='<div class="chart-container"><div class="chart-header"><span class="chart-title">📅 Recent</span></div><div class="timeline">';entries.slice(0,5).forEach(function(e){var ic=e.status==='Approved'?'✅':e.status==='Rejected'?'❌':'📝';h+='<div class="timeline-item"><div class="tl-date">'+new Date(e.entryDate).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+'</div><div class="tl-title">'+ic+' '+e.activityTitle+'</div><div class="tl-desc">Week '+e.weekNumber+' | '+(e.status||'Draft')+'</div></div>';});h+='</div></div>';}if(totalE===0&&totalA===0){h+='<div class="empty-dashboard"><i class="fas fa-rocket"></i><h3>Start Your Journey!</h3><p>Check in and create your first entry.</p><div style="display:flex;gap:8px;justify-content:center"><button class="btn btn-lg" onclick="app.checkIn()">Check In</button><button class="btn btn-lg btn-outline" onclick="app.newEntry()">New Entry</button></div></div>';}return h;};
S.getWeeklyData=function(nw){var d=[];var t=new Date();for(var i=nw-1;i>=0;i--){var ws=new Date(t);ws.setDate(t.getDate()-t.getDay()-(i*7));var we=new Date(ws);we.setDate(ws.getDate()+6);var wn=Math.ceil((ws-new Date(t.getFullYear(),0,1))/(1000*60*60*24*7))||S.week-(nw-1-i);var c=S.entries.filter(function(e){var ed=new Date(e.entryDate);return ed>=ws&&ed<=we;}).length;d.push({week:wn>0?wn:S.week-(nw-1-i),count:c,isCurrent:i===nw-1});}return d;};

S.requestPermission=async function(){if(!S.user.supervisorId||S.user.supervisorId==='unassigned'){S.toast('❌ No supervisor!','error');return;}var t=new Date().toISOString().split('T')[0];try{var ex=await db.listDocuments(AC.databaseId,AC.collections.permissionRequests,[Q.equal('studentId',S.user.$id),Q.equal('requestDate',t)]);if(ex.documents.length>0){S.toast('⚠️ Already sent!','warning');return;}var reason=prompt('Reason:','Late check-in');if(!reason)return;S.loading('Sending...');await db.createDocument(AC.databaseId,AC.collections.permissionRequests,ID.unique(),{studentId:S.user.$id,supervisorId:S.user.supervisorId,requestDate:t,reason:reason,status:'pending',createdAt:new Date().toISOString()});db.createDocument(AC.databaseId,AC.collections.notifications,ID.unique(),{recipientId:S.user.supervisorId,title:'⏰ Permission Request',message:(S.user.fullName||'Student')+': '+reason,type:'permission_request',isRead:false,createdAt:new Date().toISOString()}).catch(function(){});S.hideLoading();S.toast('✅ Sent!','success');}catch(er){S.hideLoading();S.toast('❌ '+er.message,'error');}};
S.checkIn=async function(){if(S.role!=='student')return;var t=new Date().toISOString().split('T')[0],n=new Date(),dl=new Date(n);dl.setHours(9,30,0,0);var late=n>dl;try{var ex=await db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.equal('checkInDate',t)]);if(ex.documents.length){S.toast('⚠️ Already checked in!','warning');return;}await db.createDocument(AC.databaseId,AC.collections.attendance,ID.unique(),{studentId:S.user.$id,checkInDate:t,checkInTime:n.toISOString(),weekNumber:S.week,status:late?'late':'present',permissionGranted:false});S.checkedIn=true;S.isLate=late;late?S.toast('⚠️ Late! Request permission.','warning'):S.toast('✅ Check-in!','success');S.render();}catch(er){S.toast('❌ '+er.message,'error');}};
S.checkOut=async function(){if(S.role!=='student')return;var t=new Date().toISOString().split('T')[0];try{var r=await db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.equal('checkInDate',t)]);if(!r.documents.length){S.toast('⚠️ Check in first!','warning');return;}await db.updateDocument(AC.databaseId,AC.collections.attendance,r.documents[0].$id,{checkOutTime:new Date().toISOString()});S.toast('✅ Check-out!','success');}catch(er){S.toast('❌ '+er.message,'error');}};

S.openSig=function(id){S.sigId=id;var h='<div class="modal-content" style="max-width:420px"><div class="modal-header"><h3><i class="fas fa-signature"></i> Sign & Approve</h3><button class="close-btn" onclick="app.closeMod(\'modalSignature\');app.sigId=null">✕</button></div><canvas id="sigCanvas" class="signature-canvas" width="400" height="180"></canvas><div style="display:flex;gap:8px;margin-top:8px;justify-content:center"><button class="btn btn-sm btn-outline" onclick="app.clearSig()"><i class="fas fa-eraser"></i> Clear</button><button class="btn btn-sm btn-success" onclick="app.saveSig()"><i class="fas fa-check"></i> Approve</button></div></div>';S.openMod('modalSignature',h);setTimeout(function(){S.sigCanvas=document.getElementById('sigCanvas');if(S.sigCanvas){S.sigCtx=S.sigCanvas.getContext('2d');S.sigCtx.strokeStyle='#2563eb';S.sigCtx.lineWidth=2;var isDrawing=false;var getPos=function(e){var r=S.sigCanvas.getBoundingClientRect();return{x:(e.clientX||(e.touches&&e.touches[0].clientX))-r.left,y:(e.clientY||(e.touches&&e.touches[0].clientY))-r.top};};S.sigCanvas.onmousedown=S.sigCanvas.ontouchstart=function(e){e.preventDefault();isDrawing=true;var p=getPos(e);S.sigCtx.beginPath();S.sigCtx.moveTo(p.x,p.y);};S.sigCanvas.onmousemove=S.sigCanvas.ontouchmove=function(e){if(!isDrawing)return;e.preventDefault();var p=getPos(e);S.sigCtx.lineTo(p.x,p.y);S.sigCtx.stroke();};S.sigCanvas.onmouseup=S.sigCanvas.ontouchend=function(){isDrawing=false;};S.sigCanvas.onmouseleave=function(){isDrawing=false;};}},100);};
S.clearSig=function(){if(S.sigCtx&&S.sigCanvas)S.sigCtx.clearRect(0,0,S.sigCanvas.width,S.sigCanvas.height);};
S.saveSig=async function(){if(!S.sigCanvas||!S.sigId)return;var d=S.sigCanvas.toDataURL();try{await db.updateDocument(AC.databaseId,AC.collections.logbookEntries,S.sigId,{status:'Approved',supervisorSignature:d,reviewedAt:new Date().toISOString()});var entry=await db.getDocument(AC.databaseId,AC.collections.logbookEntries,S.sigId);db.createDocument(AC.databaseId,AC.collections.notifications,ID.unique(),{recipientId:entry.studentId,title:'✅ Entry Approved',message:'"'+entry.activityTitle+'" approved.',type:'entry_approved',isRead:false,createdAt:new Date().toISOString()}).catch(function(){});await S.logAudit('logbook','entry_approved','Approved entry');S.closeMod('modalSignature');S.sigId=null;S.toast('✅ Approved!','success');await S.loadSupervisorData();S.render();}catch(er){S.toast('❌ '+er.message,'error');}};

S.verifyFieldPlacement=async function(fpid,action){var reason='';if(action==='reject'){reason=prompt('Reason:');if(!reason)return;}S.loading((action==='verify'?'Verifying':'Rejecting')+'...');try{var data={status:action==='verify'?'verified':'rejected',verifiedBy:S.user.$id,verifiedAt:new Date().toISOString()};if(action==='reject')data.rejectionReason=reason;await db.updateDocument(AC.databaseId,AC.collections.fieldPlacements,fpid,data);var fp=await db.getDocument(AC.databaseId,AC.collections.fieldPlacements,fpid);db.createDocument(AC.databaseId,AC.collections.notifications,ID.unique(),{recipientId:fp.studentId,title:action==='verify'?'✅ Placement Verified':'❌ Placement Rejected',message:action==='verify'?'Field placement verified.':('Rejected: '+reason),type:'placement_verified',isRead:false,createdAt:new Date().toISOString()}).catch(function(){});await S.logAudit('field_placement','placement_'+action,(action==='verify'?'Verified':'Rejected')+' placement');S.hideLoading();await S.loadVerifications();S.render();S.toast(action==='verify'?'✅ Verified!':'❌ Rejected!','success');}catch(er){S.hideLoading();S.toast('❌ '+er.message,'error');}};

S.renderHistoryPage=function(){var entries=S.entries||[],fs='all';try{fs=document.getElementById('historyFilter')?document.getElementById('historyFilter').value:'all';}catch(e){}if(fs!=='all'){entries=entries.filter(function(e){return e.status===fs;});}var h='<div class="glass-card"><div class="flex-between" style="margin-bottom:14px"><h2><i class="fas fa-history"></i> '+(S.role==='student'?'My Entries':'Student Entries')+'</h2><button class="btn btn-outline btn-sm" onclick="app.goDash()"><i class="fas fa-arrow-left"></i> Back</button></div><div class="filter-bar"><select id="historyFilter" onchange="app.render()"><option value="all">All</option><option value="Pending Review" '+(fs==='Pending Review'?'selected':'')+'>Pending</option><option value="Approved" '+(fs==='Approved'?'selected':'')+'>Approved</option><option value="Rejected" '+(fs==='Rejected'?'selected':'')+'>Rejected</option><option value="Draft" '+(fs==='Draft'?'selected':'')+'>Draft</option></select></div>';if(entries.length>0){h+='<div class="responsive-table"><table><thead><tr><th>Date</th><th>Activity</th>'+(S.role==='university_supervisor'?'<th>Student</th>':'')+'<th>Week</th><th>Status</th><th>Actions</th></tr></thead><tbody>';entries.slice(0,50).forEach(function(e){var st=S.allUsers.find(function(u){return u.$id===e.studentId;});h+='<tr><td><div style="display:flex;align-items:center;gap:8px"><div class="date-badge">'+new Date(e.entryDate).getDate()+'</div>'+new Date(e.entryDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div></td><td><strong>'+e.activityTitle+'</strong></td>'+(S.role==='university_supervisor'?'<td>'+(st?st.fullName:'Unknown')+'</td>':'')+'<td><span class="week-badge">W'+e.weekNumber+'</span></td><td><span class="badge badge-'+(e.status||'Draft').toLowerCase().replace(' ','-')+'">'+(e.status||'Draft')+'</span></td><td><div style="display:flex;gap:4px"><button class="btn btn-sm btn-outline" onclick="app.viewEntry(\''+e.$id+'\')"><i class="fas fa-eye"></i></button> S.renderTasks=function(){var entries=S.entries||[],q=S.taskSearch.toLowerCase();if(q){entries=entries.filter(function(e){return(e.activityTitle||'').toLowerCase().includes(q)||(e.description||'').toLowerCase().includes(q);});}if(S.taskFilter!=='all'){entries=entries.filter(function(e){return e.status===S.taskFilter;});}if(S.taskSort==='date-desc')entries.sort(function(a,b){return new Date(b.entryDate)-new Date(a.entryDate);});else if(S.taskSort==='date-asc')entries.sort(function(a,b){return new Date(a.entryDate)-new Date(b.entryDate);});var h='<div class="glass-card"><div class="flex-between" style="margin-bottom:14px"><h2><i class="fas fa-tasks"></i> Tasks</h2><button class="btn btn-outline btn-sm" onclick="app.goDash()"><i class="fas fa-arrow-left"></i> Back</button></div><div class="filter-bar"><input type="text" id="taskSearch" placeholder="🔍 Search..." value="'+S.taskSearch+'" oninput="app.taskSearch=this.value;app.render()"><select id="taskFilter" onchange="app.taskFilter=this.value;app.render()"><option value="all">All</option><option value="Pending Review">Pending</option><option value="Approved">Approved</option><option value="Rejected">Rejected</option><option value="Draft">Draft</option></select><select id="taskSort" onchange="app.taskSort=this.value;app.render()"><option value="date-desc">Newest</option><option value="date-asc">Oldest</option></select></div>';if(S.role==='university_supervisor'&&S.selected.size>0){h+='<div class="bulk-action-bar"><span>'+S.selected.size+' selected</span><button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff" onclick="app.bulkApprove()">✓ Approve</button><button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:#fff" onclick="app.bulkReject()">✕ Reject</button></div>';}if(entries.length>0){h+='<div class="responsive-table"><table><thead><tr><th><input type="checkbox" onchange="app.toggleAllTasks(this.checked)"></th><th>Date</th><th>Activity</th>'+(S.role==='university_supervisor'?'<th S.renderAssessPage=function(){var h='<div class="glass-card"><div class="flex-between" style="margin-bottom:12px"><h2><i class="fas fa-star" style="color:var(--purple)"></i> Assessments</h2><button class="btn btn-outline btn-sm" onclick="app.goDash()"><i class="fas fa-arrow-left"></i> Back</button></div>';if(S.role==='university_supervisor'){h+='<button class="btn btn-lg" style="background:var(--purple);margin-bottom:12px;width:100%" onclick="app.openAddAssess()"><i class="fas fa-plus-circle"></i> New Assessment</button>';}if(!S.assessments||S.assessments.length===0){h+='<div class="empty-state"><i class="fas fa-clipboard-list"></i><p>No assessments</p></div>';}else{S.assessments.forEach(function(a){var m=parseInt(a.totalMarks)||0,mc=m>=80?'mark-excellent':m>=60?'mark-good':m>=40?'mark-average':'mark-poor',g=m>=80?'A':m>=60?'B':m>=40?'C':'D',st=S.allUsers.find(function(u){return u.$id===a.studentId;});h+='<div class="assessment-card"><div class="flex-between"><div><strong>'+(a.title||'Assessment')+'</strong><p style="font-size:0.7rem;color:#64748b">'+(st?st.fullName:'Student')+' | '+new Date(a.createdAt).toLocaleDateString()+'</p></div><div style="text-align:center"><div class="mark-badge '+mc+'">'+m+'</div><span style="font-size:0.7rem;font-weight:600;color:var(--purple)">Grade: '+g+'</span></div></div>'+(a.comments?'<p style="font-size:0.72rem;color:#64748b">'+a.comments+'</p>':'')+'</div>';});}h+='</div>';return h;};
S.openAddAssess=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.supervisorId===S.user.$id;});var h='<div class="modal-content" style="max-width:500px"><div class="modal-header"><h3><i class="fas fa-star"></i> New Assessment</h3><button class="close-btn" onclick="app.closeMod(\'modalAssessment\')">✕</button></div><form onsubmit="app.saveAssess(event)"><div class="form-group"><label>Student *</label><select id="assessStudentId" required><option value="">Select</option>'+st.map(function(s){return'<option value="'+s.$id+'">'+s.fullName+' ('+(s.registrationNumber||'')+')</option>';}).join('')+'</select></div><div class="form-group"><label>Title *</label><input type="text" id="assessTitle" required></div><div class="grid grid-2"><div class="form-group"><label>Marks *</label><input type="number" id="assessMarks" min="0" max="100" required oninput="document.getElementById(\'assessGrade\').value=this.value>=80?\'A\':this.value>=60?\'B\':this.value>=40?\'C\':\'D\'"></div><div class="form-group"><label>Grade</label><input type="text" id="assessGrade" readonly></div></div><div class="form-group"><label>Comments</label><textarea id="assessComments" rows="2"></textarea></div><button type="submit" class="btn btn-lg" style="background:var(--purple);width:100%">Save Assessment</button></form></div>';S.openMod('modalAssessment',h);};
S.saveAssess=async function(e){e.preventDefault();var m=parseInt(document.getElementById('assessMarks').value)||0,g=m>=80?'A':m>=60?'B':m>=40?'C':'D';S.loading('Saving...');try{var sid=document.getElementById('assessStudentId').value;await db.createDocument(AC.databaseId,AC.collections.assessments,ID.unique(),{studentId:sid,supervisorId:S.user.$id,title:document.getElementById('assessTitle').value,totalMarks:m,grade:g,comments:document.getElementById('assessComments').value,createdAt:new Date().toISOString()});db.createDocument(AC.databaseId,AC.collections.notifications,ID.unique(),{recipientId:sid,title:'📊 Assessment Added',message:'New assessment: '+g+' ('+m+'%)',type:'assessment_added',isRead:false,createdAt:new Date().toISOString()}).catch(function(){});S.hideLoading();S.closeMod('modalAssessment');S.toast('✅ Saved!','success');await S.loadAssess();S.render();}catch(er){S.hideLoading();S.toast('❌ '+er.message,'error');}};

S.renderReportPage=function(){var h='<div class="glass-card"><h2 style="margin-bottom:12px"><i class="fas fa-chart-bar"></i> Report</h2>';if(S.role==='student'){var e=S.entries||[];h+='<div class="db-grid" style="margin-bottom:16px"><div class="db-card"><div class="card-value">'+e.length+'</div><div class="card-label">Total</div></div><div class="db-card"><div class="card-value" style="color:var(--su)">'+e.filter(function(x){return x.status==='Approved';}).length+'</div><div class="card-label">Approved</div></div><div class="db-card"><div class="card-value" style="color:var(--w)">'+e.filter(function(x){return x.status==='Pending Review';}).length+'</div><div class="card-label">Pending</div></div></div>';}else if(S.role==='department'){h+='<div class="export-buttons"><button class="btn btn-lg" onclick="app.exportReport(\'excel\')"><i class="fas fa-file-excel"></i> Export Excel</button></div>';}h+='</div><button class="btn btn-outline btn-lg" onclick="app.goDash()" style="width:100%;margin-top:8px"><i class="fas fa-arrow-left"></i> Back</button>';return h;};
S.openExport=function(){var h='<div class="modal-content" style="max-width:450px"><div class="modal-header"><h3><i class="fas fa-download"></i> Export</h3><button class="close-btn" onclick="app.closeMod(\'modalExport\')">✕</button></div><div style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-lg" onclick="app.exportEntries(\'weekly\')">This Week</button><button class="btn btn-lg btn-outline" onclick="app.exportEntries(\'monthly\')">This Month</button><button class="btn btn-lg btn-success" onclick="app.exportEntries(\'all\')">All Entries</button></div></div>';S.openMod('modalExport',h);};
S.exportEntries=function(type){var entries=(S.entries||[]).slice(),n=new Date();if(type==='weekly'){var ws=new Date(n);ws.setDate(n.getDate()-n.getDay());entries=entries.filter(function(e){return new Date(e.entryDate)>=ws;});}else if(type==='monthly'){var ms=new Date(n.getFullYear(),n.getMonth(),1);entries=entries.filter(function(e){return new Date(e.entryDate)>=ms;});}if(entries.length===0){S.toast('No entries!','warning');return;}var txt='HAS FIELD SYSTEM - LOGBOOK\n'+new Date().toLocaleDateString()+'\n'+'='.repeat(50)+'\n\n';entries.forEach(function(e,i){txt+='ENTRY '+(i+1)+'\nDate: '+new Date(e.entryDate).toLocaleDateString()+' | Week: '+e.weekNumber+'\nActivity: '+(e.activityTitle||'N/A')+'\nDescription: '+(e.description||'N/A')+'\n'+'-'.repeat(30)+'\n\n';});var blob=new Blob([txt],{type:'application/msword'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='HAS_Logbook_'+type+'_'+n.toISOString().split('T')[0]+'.doc';document.body.appendChild(a);a.click();document.body.removeChild(a);S.closeMod('modalExport');S.toast('✅ Exported!','success');};
S.exportReport=function(){var rows=[['#','Student','Reg No','Entries','Approved','Pending']],students=S.allUsers.filter(function(u){return u.role==='student';});students.forEach(function(s,i){var se=(S.entries||[]).filter(function(e){return e.studentId===s.$id;});rows.push([i+1,s.fullName||'',s.registrationNumber||'',se.length,se.filter(function(e){return e.status==='Approved';}).length,se.filter(function(e){return e.status==='Pending Review';}).length]);});var csv=rows.map(function(r){return r.join(',');}).join('\n'),blob=new Blob([csv],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='HAS_Report_'+new Date().toISOString().split('T')[0]+'.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);S.toast('✅ Exported!','success');};

S.openGlobalSearch=function(){if(!S.user)return;var overlay=document.createElement('div');overlay.id='globalSearchOverlay';overlay.className='search-overlay';overlay.innerHTML='<div class="search-container"><div class="search-input-wrap"><input type="text" id="globalSearchInput" placeholder="🔍 Search students, supervisors..." autofocus oninput="app.performGlobalSearch(this.value)"></div><div id="globalSearchResults"><div class="empty-state"><i class="fas fa-search"></i><p>Type to search...</p></div></div></div>';document.body.appendChild(overlay);overlay.onclick=function(e){if(e.target===overlay)overlay.remove();};setTimeout(function(){var inp=document.getElementById('globalSearchInput');if(inp)inp.focus();},100);};
S.performGlobalSearch=function(q){q=q.toLowerCase().trim();var results=[];if(q.length<2){document.getElementById('globalSearchResults').innerHTML='<div class="empty-state"><p>Type at least 2 characters...</p></div>';return;}if(S.role==='university_supervisor'){S.allUsers.filter(function(u){return u.role==='student'&&u.supervisorId===S.user.$id;}).forEach(function(s){if((s.fullName||'').toLowerCase().includes(q)||(s.registrationNumber||'').toLowerCase().includes(q)){results.push({type:'student',id:s.$id,name:s.fullName,sub:s.registrationNumber,icon:'🎓',color:'#2563eb'});}});}else if(S.role==='department'||S.role==='admin'){S.allUsers.forEach(function(u){if((u.fullName||'').toLowerCase().includes(q)||(u.registrationNumber||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q)){var icons={student:'🎓',university_supervisor:'👔',department:'🏛️',admin:'🎯'};results.push({type:'user',id:u.$id,name:u.fullName,sub:u.registrationNumber+' | '+u.email,icon:icons[u.role]||'👤',color:'#2563eb'});}});}document.getElementById('globalSearchResults').innerHTML=results.length===0?'<div class="empty-state"><p>No results</p></div>':results.slice(0,20).map(function(r){return'<div class="search-result" onclick="app.handleSearchResult(\''+r.type+'\',\''+r.id+'\')"><div class="sr-icon" style="background:'+r.color+'20;color:'+r.color+'">'+r.icon+'</div><div class="sr-info"><div class="sr-name">'+r.name+'</div><div class="sr-sub">'+r.sub+'</div></div></div>';}).join('');};
S.handleSearchResult=function(type,id){var overlay=document.getElementById('globalSearchOverlay');if(overlay)overlay.remove();if(type==='student'||type==='user'){var s=S.allUsers.find(function(u){return u.$id===id;});if(!s)return;var se=(S.entries||[]).filter(function(e){return e.studentId===id;});var h='<div class="modal-content" style="max-width:680px"><div class="modal-header"><h3>'+(s.fullName||'Student')+'</h3><button class="close-btn" onclick="app.closeMod(\'modalViewEntry\')">✕</button></div><p><strong>Reg No:</strong> '+s.registrationNumber+'</p><p><strong>Email:</strong> '+s.email+'</p><p><strong>Entries:</strong> '+se.length+'</p></div>';S.openMod('modalViewEntry',h);}};

S.bulkApprove=async function(){if(S.selected.size===0){S.toast('Select entries first!','warning');return;}if(!confirm('Approve '+S.selected.size+' entries?'))return;S.loading('Approving...');var success=0,failed=0,it=S.selected.values();for(var id=it.next();!id.done;id=it.next()){try{await db.updateDocument(AC.databaseId,AC.collections.logbookEntries,id.value,{status:'Approved',reviewedAt:new Date().toISOString()});success++;}catch(e){failed++;}}S.selected.clear();S.hideLoading();await S.loadSupervisorData();S.render();S.toast('✅ '+success+' approved','success');};
S.bulkReject=async function(){if(S.selected.size===0){S.toast('Select entries first!','warning');return;}var reason=prompt('Reason:');if(!reason)return;S.loading('Rejecting...');var success=0,failed=0,it=S.selected.values();for(var id=it.next();!id.done;id=it.next()){try{await db.updateDocument(AC.databaseId,AC.collections.logbookEntries,id.value,{status:'Rejected',supervisorComment:reason});success++;}catch(e){failed++;}}S.selected.clear();S.hideLoading();await S.loadSupervisorData();S.render();S.toast('✅ '+success+' rejected','success');};

S.viewAuditLog=function(){var h='<div class="modal-content" style="max-width:800px"><div class="modal-header"><h3><i class="fas fa-history"></i> Audit Trail</h3><button class="close-btn" onclick="app.closeMod(\'modalAuditLog\')">✕</button></div><div class="filter-bar"><select id="auditFilter" onchange="app.loadAuditLogs()"><option value="all">All</option><option value="auth">Auth</option><option value="profile">Profile</option><option value="logbook">Logbook</option><option value="field_placement">Field Placement</option><option value="assessment">Assessment</option></select><input type="date" id="auditDate" onchange="app.loadAuditLogs()"></div><div id="auditLogContent"><div class="empty-state"><div class="spinner-ring" style="margin:0 auto"></div></div></div></div>';S.openMod('modalAuditLog',h);S.loadAuditLogs();};
S.loadAuditLogs=async function(){var el=document.getElementById('auditLogContent');if(!el)return;try{var queries=[Q.orderDesc('timestamp'),Q.limit(100)],filter=document.getElementById('auditFilter');if(filter&&filter.value!=='all')queries.push(Q.equal('module',filter.value));var df=document.getElementById('auditDate');if(df&&df.value){var d=new Date(df.value);queries.push(Q.greaterThan('timestamp',d.toISOString()));queries.push(Q.lessThan('timestamp',new Date(d.getTime()+86400000).toISOString()));}var logs=await db.listDocuments(AC.databaseId,AC.collections.auditTrail,queries);el.innerHTML=logs.documents.length===0?'<div class="empty-state"><p>No logs</p></div>':logs.documents.map(function(l){var icons={auth:'🔐',profile:'👤',logbook:'📝',field_placement:'📍',assessment:'📊',permission:'⏰'};return'<div class="audit-log-item"><div class="flex-between"><span><span class="al-user">'+l.userFullName+'</span> <span class="al-action">'+(icons[l.module]||'📌')+' '+l.actionDescription+'</span></span><span class="al-time">'+new Date(l.timestamp).toLocaleString()+'</span></div></div>';}).join('');}catch(e){el.innerHTML='<div class="empty-state"><p>Error</p></div>';}};

S.renderSettings=function(){var h='<div class="glass-card"><h2><i class="fas fa-cog"></i> Settings</h2>';h+='<div class="settings-section"><h3>System Health</h3><div class="system-health"><div class="stat-mini"><div class="health-dot green"></div>DB: Active</div><div class="stat-mini"><div class="health-dot green"></div>Auth: Active</div><div class="stat-mini"><span>Users: '+S.allUsers.length+'</span></div></div></div>';h+='<div class="settings-section"><h3>User Management</h3><div class="responsive-table"><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody>';S.allUsers.slice(0,20).forEach(function(u){h+='<tr><td>'+u.fullName+'</td><td style="font-size:0.75rem">'+u.email+'</td><td><span class="badge badge-info">'+u.role+'</span></td><td><span class="badge '+(u.accountStatus==='active'?'badge-success':'badge-danger')+'">'+u.accountStatus+'</span></td><td><button class="btn btn-sm btn-outline" onclick="app.toggleUserStatus(\''+u.$id+'\',\''+u.accountStatus+'\')">'+(u.accountStatus==='active'?'Disable':'Activate')+'</button></td></tr>';});h+='</tbody></table></div></div>';h+='<div class="settings-section"><h3>Permissions <button class="btn btn-sm btn-outline" onclick="app.viewPermissionMatrix()">View Matrix</button></h3></div>';h+='</div><button class="btn btn-outline btn-lg" onclick="app.goDash()" style="width:100%;margin-top:8px"><i class="fas fa-arrow-left"></i> Back</button>';return h;};
S.toggleUserStatus=async function(uid,cs){var ns=cs==='active'?'disabled':'active';if(!confirm('Change to '+ns+'?'))return;try{await db.updateDocument(AC.databaseId,AC.collections.users,uid,{accountStatus:ns});S.toast('✅ User '+ns+'!','success');S.loadData(true);S.render();}catch(e){S.toast('❌ '+e.message,'error');}};
S.viewPermissionMatrix=function(){var roles=['student','university_supervisor','department','admin'],perms=Object.keys(S.permissions.student),h='<div class="modal-content" style="max-width:800px"><div class="modal-header"><h3>Permission Matrix</h3><button class="close-btn" onclick="app.closeMod(\'modalPermissions\')">✕</button></div><div class="permission-matrix"><table><thead><tr><th>Permission</th>';roles.forEach(function(r){h+='<th>'+(r==='student'?'🎓':r==='university_supervisor'?'👔':r==='department'?'🏛️':'🎯')+'</th>';});h+='</tr></thead><tbody>';perms.forEach(function(p){h+='<tr><td style="text-align:left">'+p.replace(/_/g,' ')+'</td>';roles.forEach(function(r){h+='<td>'+(S.permissions[r][p]?'<span class="perm-granted">✓</span>':'<span class="perm-denied">✕</span>')+'</td>';});h+='</tr>';});h+='</tbody></table></div></div>';S.openMod('modalPermissions',h);};

S.renderAnalytics=function(){var students=S.allUsers.filter(function(u){return u.role==='student';}),entries=S.entries||[],approved=entries.filter(function(e){return e.status==='Approved';}).length;var h='<div class="glass-card"><h2><i class="fas fa-chart-line"></i> Analytics</h2>';h+='<div class="analytics-grid" style="margin-bottom:16px"><div class="analytics-card"><div class="big-num">'+students.length+'</div><div class="lbl">Students</div></div><div class="analytics-card"><div class="big-num" style="color:var(--su)">'+S.supervisors.length+'</div><div class="lbl">Supervisors</div></div><div class="analytics-card"><div class="big-num" style="color:var(--purple)">'+entries.length+'</div><div class="lbl">Entries</div></div></div>';h+='<div class="chart-container"><div class="chart-header"><span class="chart-title">Student Performance</span></div><div class="responsive-table"><table><thead><tr><th>Student</th><th>Reg No</th><th>Entries</th><th>Approved</th><th>Rate</th></tr></thead><tbody>';students.slice(0,20).forEach(function(s){var se=entries.filter(function(e){return e.studentId===s.$id;}),sap=se.filter(function(e){return e.status==='Approved';}).length,rate=se.length>0?Math.round((sap/se.length)*100):0;h+='<tr><td>'+s.fullName+'</td><td>'+s.registrationNumber+'</td><td>'+se.length+'</td><td>'+sap+'</td><td><div class="progress-mini"><div class="progress-mini-fill" style="width:'+rate+'%;background:'+(rate>=70?'var(--su)':rate>=40?'var(--w)':'var(--e)')+'"></div></div>'+rate+'%</td></tr>';});h+='</tbody></table></div></div>';h+='</div><button class="btn btn-outline btn-lg" onclick="app.goDash()" style="width:100%;margin-top:8px"><i class="fas fa-arrow-left"></i> Back</button>';return h;};

S.renderAuth=function(){return'<div class="auth-wrapper"><div class="auth-container"><div class="auth-card"><div class="auth-logo"><img src="'+LOGO+'" alt="HAS" onerror="this.style.display=\'none\'"><h1>HAS Field System</h1><p>Student Training Logbook</p></div>'+(S.view==='login'?S.renderLogin():S.view==='register'?S.renderRegister():S.renderForgot())+'</div></div></div>';};
S.renderLogin=function(){return'<form onsubmit="app.handleLogin(event)"><div class="form-group"><label>Registration Number</label><input type="text" id="loginRegNo" required></div><div class="form-group"><label>Password</label><div class="password-wrapper"><input type="password" id="loginPassword" required><button type="button" class="password-toggle" onclick="togglePassword(\'loginPassword\',this)"><i class="fas fa-eye"></i></button></div></div><button type="submit" class="btn-auth" id="loginBtn">Sign In</button></form><div class="auth-links"><p>No account? <a onclick="app.switchView(\'register\')">Create Account</a></p><p><a onclick="app.switchView(\'forgot\')">Forgot Password?</a></p></div>';};

S.renderForgot=function(){return'<form onsubmit="app.handleForgot(event)"><div style="margin-bottom:14px;padding:14px;background:rgba(37,99,235,0.06);border-radius:12px;border-left:4px solid var(--p)"><p style="font-size:0.8rem;font-weight:600;color:var(--p)">Password Recovery</p></div><div class="form-group"><label>Registration Number *</label><input type="text" id="forgotRegNo" required></div><div class="form-group"><label>Email *</label><input type="email" id="forgotEmail" required></div><button type="submit" class="btn-auth" id="forgotBtn">Request Recovery</button></form><div id="recoverySection" class="hidden" style="margin-top:14px;padding-top:14px;border-top:2px dashed var(--o)"><p style="color:var(--su)">✅ Submitted!</p><a href="https://wa.link/va934h" target="_blank" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> Contact via WhatsApp</a></div><div class="auth-links"><p><a onclick="app.switchView(\'login\')">← Back</a></p></div>';};

S.handleLogin=async function(e){e.preventDefault();var rn=document.getElementById('loginRegNo').value.trim(),pw=document.getElementById('loginPassword').value;if(!rn||!pw){S.toast('❌ Fill all fields!','error');return;}var btn=document.getElementById('loginBtn');if(btn){btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Signing in...';}try{var users=await db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('registrationNumber',rn)]);if(!users.documents.length){if(btn){btn.disabled=false;btn.innerHTML='Sign In';}S.toast('❌ Invalid!','error');return;}var u=users.documents[0];if(u.accountStatus!=='active'){if(btn){btn.disabled=false;btn.innerHTML='Sign In';}S.toast('❌ Disabled!','error');return;}await account.createEmailSession(u.email,pw);await db.updateDocument(AC.databaseId,AC.collections.users,u.$id,{lastLoginAt:new Date().toISOString()}).catch(function(){});await S.checkSession();S.toast('✅ Welcome!','success');}catch(e){try{var u2=await db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('registrationNumber',rn),Q.equal('tempPassword',pw)]);if(u2.documents.length>0){var tu=u2.documents[0];if(tu.tempPasswordExpiry&&new Date(tu.tempPasswordExpiry)<new Date()){if(btn){btn.disabled=false;btn.innerHTML='Sign In';}S.toast('❌ Expired!','error');return;}if(btn){btn.disabled=false;btn.innerHTML='Sign In';}S.showChangePwd(tu);return;}}catch(e2){}if(btn){btn.disabled=false;btn.innerHTML='Sign In';}S.toast('❌ Invalid!','error');}};
S.handleRegister=async function(e){e.preventDefault();var pw=document.getElementById('regPassword').value;if(pw!==document.getElementById('regConfirmPassword').value){S.toast('❌ Mismatch!','error');return;}if(pw.length<8){S.toast('❌ Min 8 chars!','error');return;}var btn=document.getElementById('regBtn');if(btn){btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Creating...';}try{var em=document.getElementById('regEmail').value.trim(),rn=document.getElementById('regRegNo').value.trim(),nm=document.getElementById('regFullName').value.trim(),ph=document.getElementById('regPhone').value.trim(),ex=await db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('registrationNumber',rn)]);if(ex.documents.length>0){if(btn){btn.disabled=false;btn.innerHTML='Create Account';}S.toast('❌ Reg No exists!','error');return;}await account.create(ID.unique(),em,pw,nm);await account.createEmailSession(em,pw);var au=await account.get();await db.createDocument(AC.databaseId,AC.collections.users,au.$id,{fullName:nm,registrationNumber:rn,email:em,phone:ph,role:'student',supervisorId:null,accountStatus:'active',isFirstLogin:true,lastLoginAt:new Date().toISOString(),createdAt:new Date().toISOString()});await account.deleteSession('current');if(btn)btn.innerHTML='✅ Created!';S.toast('✅ Account created! Sign in.','success');setTimeout(function(){S.switchView('login');if(btn){btn.disabled=false;btn.innerHTML='Create Account';}},1000);}catch(er){if(btn){btn.disabled=false;btn.innerHTML='Create Account';}S.toast('❌ '+er.message,'error');}};
S.handleForgot=async function(e){e.preventDefault();var rn=document.getElementById('forgotRegNo').value.trim(),em=document.getElementById('forgotEmail').value.trim();if(!rn||!em){S.toast('❌ Fill all!','error');return;}var btn=document.getElementById('forgotBtn');if(btn){btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i>...';}try{var users=await db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('email',em),Q.equal('registrationNumber',rn)]);if(!users.documents.length){if(btn){btn.disabled=false;btn.innerHTML='Request Recovery';}S.toast('❌ Not found!','error');return;}var u=users.documents[0];await db.createDocument(AC.databaseId,AC.collections.recoveryRequests,ID.unique(),{userId:u.$id,regNo:rn,email:em,fullName:u.fullName,status:'pending',requestedAt:new Date().toISOString(),createdAt:new Date().toISOString()});await db.updateDocument(AC.databaseId,AC.collections.users,u.$id,{pendingPasswordReset:true});if(btn){btn.disabled=false;btn.innerHTML='Request Recovery';}document.getElementById('recoverySection').classList.remove('hidden');S.toast('✅ Submitted!','success');}catch(er){if(btn){btn.disabled=false;btn.innerHTML='Request Recovery';}S.toast('❌ Error','error');}};

S.showChangePwd=function(u){var mc=document.getElementById('mainContent');mc.innerHTML='<div class="auth-wrapper"><div class="auth-container"><div class="auth-card"><h1 style="color:#f59e0b">Change Password</h1><p>'+u.fullName+' ('+u.email+')</p><div class="form-group"><label>New Password</label><div class="password-wrapper"><input type="password" id="changeNewPwd" minlength="8" required><button type="button" class="password-toggle" onclick="togglePassword(\'changeNewPwd\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm</label><div class="password-wrapper"><input type="password" id="changeConfPwd" minlength="8" required><button type="button" class="password-toggle" onclick="togglePassword(\'changeConfPwd\',this)"><i class="fas fa-eye"></i></button></div></div><button class="btn-auth" style="background:#f59e0b;color:#000" onclick="app.saveNewPwd(\''+u.$id+'\')">Save</button><button class="btn" style="width:100%;margin-top:8px;background:transparent;border:2px solid var(--o);color:var(--os);padding:10px;border-radius:24px" onclick="app.switchView(\'login\')">← Back</button></div></div></div>';};
S.saveNewPwd=async function(uid){var np=document.getElementById('changeNewPwd').value,cp=document.getElementById('changeConfPwd').value;if(!np||!cp||np!==cp||np.length<8){S.toast('❌ Invalid!','error');return;}S.loading('Saving...');try{var u=await db.getDocument(AC.databaseId,AC.collections.users,uid);sessionStorage.setItem('reregister_data',JSON.stringify({fullName:u.fullName,regNo:u.registrationNumber,email:u.email,phone:u.phone}));await db.updateDocument(AC.databaseId,AC.collections.users,uid,{newPasswordRequested:np,tempPassword:'',tempPasswordExpiry:'',recoveryOption:'reregister'});S.hideLoading();S.showReregisterPopup(np,u);}catch(er){S.hideLoading();S.toast('❌ '+er.message,'error');}};
S.showReregisterPopup=function(np,u){var ov=document.createElement('div');ov.className='popup-overlay';ov.innerHTML='<div class="popup-card"><div style="font-size:3rem">🔄</div><h2>One More Step!</h2><p>Re-register to complete.</p><div style="background:rgba(245,158,11,0.08);border:2px dashed #f59e0b;border-radius:12px;padding:16px;margin:16px 0"><p>📧 '+u.email+'</p><p>🔑 <code>'+np+'</code></p></div><button class="btn btn-lg" style="background:#f59e0b;color:#000;width:100%" onclick="this.closest(\'.popup-overlay\').remove();app.switchView(\'register\')">🔄 Register</button></div>';document.body.appendChild(ov);ov.onclick=function(e){if(e.target===ov)ov.remove();};};

S.showRecovery=function(){var h='<div class="modal-content" style="max-width:720px"><div class="modal-header"><h3>Password Recovery</h3><button class="close-btn" onclick="app.closeMod(\'modalRecovery\')">✕</button></div><div class="glass-card"><h4>Generate Temp Password</h4><form onsubmit="app.genTempPwdDirect(event)"><div class="form-group"><select id="directRecoveryUser" required><option value="">Select User</option>';S.allUsers.forEach(function(u){h+='<option value="'+u.$id+'">'+u.fullName+' ('+u.email+')</option>';});h+='</select></div><button type="submit" class="btn btn-lg btn-success" style="width:100%">Generate & Send</button></form><div id="directTempPwdResult" style="margin-top:10px"></div></div><div id="recoveryRequestsList"><div class="empty-state"><div class="spinner-ring" style="margin:0 auto"></div></div></div></div>';S.openMod('modalRecovery',h);S.loadRecovery();};
S.genTempPwdDirect=async function(e){e.preventDefault();var uid=document.getElementById('directRecoveryUser').value;if(!uid)return;var tp='HAS-'+Math.random().toString(36).substring(2,8).toUpperCase()+Math.floor(Math.random()*90+10),btn=e.target.querySelector('button'),orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='Generating...';try{var u=await db.getDocument(AC.databaseId,AC.collections.users,uid);await db.updateDocument(AC.databaseId,AC.collections.users,uid,{tempPassword:tp,tempPasswordExpiry:new Date(Date.now()+3600000).toISOString()});await db.createDocument(AC.databaseId,AC.collections.notifications,ID.unique(),{recipientId:uid,title:'🔑 Temp Password',message:'Temp: '+tp,type:'temp_password_ready',isRead:false,createdAt:new Date().toISOString()});btn.innerHTML=orig;btn.disabled=false;document.getElementById('directTempPwdResult').innerHTML='<div style="background:rgba(16,185,129,0.1);border:2px solid var(--su);border-radius:10px;padding:10px"><p>✅ Sent!</p><code>'+tp+'</code></div>';S.toast('✅ Sent!','success');S.loadRecovery();}catch(er){btn.innerHTML=orig;btn.disabled=false;S.toast('❌ Error','error');}};
S.loadRecovery=async function(){try{var reqs=await db.listDocuments(AC.databaseId,AC.collections.recoveryRequests,[Q.orderDesc('createdAt'),Q.limit(50)]),el=document.getElementById('recoveryRequestsList');if(!el)return;el.innerHTML=reqs.documents.length===0?'<div class="empty-state"><p>No requests</p></div>':reqs.documents.map(function(r){return'<div style="padding:8px;border-bottom:1px solid var(--o)"><strong>'+r.fullName+'</strong> '+r.email+' <span class="badge badge-'+(r.status==='pending'?'warning':'success')+'">'+r.status+'</span></div>';}).join('');}catch(e){}};

S.createSup=function(){var h='<div class="modal-content" style="max-width:500px"><div class="modal-header"><h3>Create Supervisor</h3><button class="close-btn" onclick="app.closeMod(\'modalSupervisor\')">✕</button></div><form onsubmit="app.saveSup(event)"><div class="form-group"><label>Full Name *</label><input type="text" id="supFullName" required></div><div class="form-group"><label>Email *</label><input type="email" id="supEmail" required></div><div class="form-group"><label>Phone *</label><input type="text" id="supPhone" required></div><div class="grid grid-2"><div class="form-group"><label>Password *</label><div class="password-wrapper"><input type="password" id="supPassword" required><button type="button" class="password-toggle" onclick="togglePassword(\'supPassword\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm *</label><div class="password-wrapper"><input type="password" id="supConfirmPassword" required><button type="button" class="password-toggle" onclick="togglePassword(\'supConfirmPassword\',this)"><i class="fas fa-eye"></i></button></div></div></div><button type="submit" class="btn btn-lg btn-success" style="width:100%">Create Supervisor</button></form></div>';S.openMod('modalSupervisor',h);};

S.saveSup=async function(e){
e.preventDefault();
var sp=document.getElementById('supPassword').value,sc=document.getElementById('supConfirmPassword').value;
if(sp!==sc){S.toast('❌ Passwords do not match!','error');return;}
if(sp.length<8){S.toast('❌ Min 8 characters!','error');return;}
var se=document.getElementById('supEmail').value.trim(),sn=document.getElementById('supFullName').value.trim(),sph=document.getElementById('supPhone').value.trim();
var regNo='SUP-'+Math.floor(10000000+Math.random()*90000000);
var btn=e.target.querySelector('button[type="submit"]'),orig=btn.innerHTML;
btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Creating...';
try{
var newAcc=await account.create(ID.unique(),se,sp,sn);
await db.createDocument(AC.databaseId,AC.collections.users,newAcc.$id,{fullName:sn,registrationNumber:regNo,email:se,phone:sph,role:'university_supervisor',supervisorId:null,accountStatus:'active',isFirstLogin:false,lastLoginAt:null,createdAt:new Date().toISOString()});
await S.logAudit('user_management','supervisor_created','Created: '+sn+' ('+regNo+')');
try{await db.createDocument(AC.databaseId,AC.collections.notifications,ID.unique(),{recipientId:newAcc.$id,title:'🎉 Account Created',message:'Your account is ready!\n\nReg Number: '+regNo+'\nPassword: '+sp,type:'welcome',isRead:false,createdAt:new Date().toISOString()});}catch(ne){}
S.hideLoading();S.closeMod('modalSupervisor');await S.loadData(true);S.render();
var popup=document.createElement('div');popup.className='popup-overlay';
popup.innerHTML='<div class="popup-card"><div style="font-size:3rem">👔</div><h2>Supervisor Created!</h2><p>Give these to the supervisor:</p><div style="background:rgba(37,99,235,0.08);border:2px dashed var(--p);border-radius:12px;padding:16px;margin:16px 0;text-align:left"><p>📧 Email: '+se+'</p><p>🆔 Reg Number: <code style="font-size:1.2rem;font-weight:700;color:var(--p)">'+regNo+'</code></p><p>🔑 Password: <code>'+sp+'</code></p></div><button class="btn btn-lg" style="width:100%" onclick="navigator.clipboard.writeText(\'Reg: '+regNo+'\\nPass: '+sp+'\');this.innerHTML=\'✅ Copied!\'">📋 Copy</button><button class="btn btn-sm" style="background:transparent;color:#94a3b8;width:100%;margin-top:8px" onclick="this.closest(\'.popup-overlay\').remove()">Close</button></div>';
document.body.appendChild(popup);popup.onclick=function(e){if(e.target===popup)popup.remove();};
S.toast('✅ Supervisor created! Reg: '+regNo,'success');
}catch(er){S.hideLoading();S.toast('❌ '+er.message,'error');}
finally{if(btn){btn.disabled=false;btn.innerHTML=orig;}}
};

S.openNotifDrawer=function(){var d=document.getElementById('drawer'),o=document.getElementById('overlay');d.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;padding:14px;border-bottom:1px solid var(--o)"><h3><i class="fas fa-bell"></i> Notifications ('+S.notifs.length+')</h3><div style="display:flex;gap:6px;align-items:center">'+(S.notifs.length>0?'<button class="btn btn-sm btn-outline" onclick="app.clearAllNotifs()"><i class="fas fa-trash"></i> Clear All</button>':'')+'<button class="close-btn" onclick="closeDrawer()">✕</button></div></div><div style="max-height:calc(100vh-80px);overflow-y:auto;padding:8px">'+(S.notifs.length>0?S.notifs.map(function(n,i){var ts='';try{var dm=Math.floor((new Date()-new Date(n.createdAt))/60000);ts=dm<1?'Now':dm<60?dm+'m':Math.floor(dm/1440)+'d';}catch(e){}return'<div style="padding:10px;margin-bottom:4px;border-radius:8px;font-size:0.75rem;cursor:pointer;display:flex;justify-content:space-between;gap:8px;align-items:flex-start;'+(n.isRead?'opacity:0.75':'background:rgba(37,99,235,0.04);border:2px solid var(--p)')+'"><div onclick="app.markNotif(\''+n.$id+'\','+i+')" style="flex:1;min-width:0"><strong>'+n.title+'</strong>'+(!n.isRead?' <span style="background:var(--p);color:#fff;border-radius:8px;padding:0 4px;font-size:0.5rem">NEW</span>':'')+'<p style="font-size:0.7rem">'+n.message+'</p><small>'+ts+'</small></div><button class="close-btn" style="width:24px;height:24px;flex-shrink:0" title="Delete" onclick="event.stopPropagation();app.deleteNotif(\''+n.$id+'\','+i+')"><i class="fas fa-trash" style="font-size:0.65rem"></i></button></div>';}).join(''):'<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications</p></div>')+'</div>';d.classList.add('open');o.classList.add('active');};
S.markNotif=async function(id,i){try{await db.updateDocument(AC.databaseId,AC.collections.notifications,id,{isRead:true});S.notifs[i].isRead=true;S.unread=S.notifs.filter(function(n){return !n.isRead;}).length;S.updateBadge();S.openNotifDrawer();}catch(e){}};
S.deleteNotif=async function(id,i){try{await db.deleteDocument(AC.databaseId,AC.collections.notifications,id);S.notifs.splice(i,1);S.unread=S.notifs.filter(function(n){return !n.isRead;}).length;S.updateBadge();S.openNotifDrawer();S.toast('🗑️ Notification deleted','success');}catch(er){S.toast('❌ '+er.message,'error');}};
S.clearAllNotifs=async function(){if(!S.notifs.length)return;if(!confirm('Delete all '+S.notifs.length+' notifications? This cannot be undone.'))return;S.loading('Deleting...');try{var ids=S.notifs.map(function(n){return n.$id;});await Promise.all(ids.map(function(id){return db.deleteDocument(AC.databaseId,AC.collections.notifications,id).catch(function(){});}));S.notifs=[];S.unread=0;S.updateBadge();S.hideLoading();S.openNotifDrawer();S.toast('✅ All notifications cleared','success');}catch(er){S.hideLoading();S.toast('❌ '+er.message,'error');}};
S.switchView=function(v){S.view=v;if(!S.user)document.getElementById('mainContent').innerHTML='';S.render();if(v==='register'){setTimeout(function(){var d=sessionStorage.getItem('reregister_data');if(d){try{var r=JSON.parse(d),f={regFullName:r.fullName,regRegNo:r.regNo,regEmail:r.email,regPhone:r.phone};for(var k in f){var el=document.getElementById(k);if(el&&f[k])el.value=f[k];}S.toast('📝 Pre-filled!','info');sessionStorage.removeItem('reregister_data');}catch(e){}}},200);}};
S.toggleDark=function(){S.dark=!S.dark;document.body.classList.toggle('dark');localStorage.setItem('darkMode',S.dark);S.renderMenu();};
S.logout=async function(){try{await account.deleteSession('current');}catch(e){}S.reset();S.hideAll();document.getElementById('mainContent').innerHTML='';var ps=document.querySelectorAll('.popup-overlay');ps.forEach(function(p){p.remove();});var gs=document.getElementById('globalSearchOverlay');if(gs)gs.remove();var qs=document.getElementById('quickSearchBtn');if(qs)qs.remove();S.view='login';S.loadingInitial=false;S.render();setTimeout(function(){S.toast('👋 Logged out','success');},100);};
S.updateTop=function(){var ud=document.getElementById('userNameDisplay');if(S.user&&ud)ud.textContent=(S.user.fullName||'').split(' ')[0]||'User';S.updateBadge();};
S.updateBadge=function(){var b=document.getElementById('notifBadge');if(b){if(S.unread>0){b.textContent=S.unread>99?'99+':S.unread;b.classList.remove('hidden');}else{b.textContent='0';b.classList.add('hidden');}}};
}

function togglePassword(id,btn){var i=document.getElementById(id);if(!i)return;var ic=btn.querySelector('i');if(i.type==='password'){i.type='text';if(ic){ic.classList.remove('fa-eye');ic.classList.add('fa-eye-slash');}}else{i.type='password';if(ic){ic.classList.remove('fa-eye-slash');ic.classList.add('fa-eye');}}}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('active');if(window.app)window.app.updateBadge();}

var deferredInstallPrompt=null;
function showInstallPopup(){if(document.querySelector('.install-toast'))return;var t=document.createElement('div');t.className='install-toast';t.innerHTML='<button class="it-close" onclick="dismissInstallPopup()">✕</button><div class="it-head"><img src="'+LOGO+'" onerror="this.style.display=\'none\'"><h4>Install HAS Field System</h4></div><p>Add it to your device for faster access and offline support.</p><div class="it-actions"><button class="btn btn-sm" style="flex:1" onclick="doInstallApp()"><i class="fas fa-download"></i> Install</button><button class="btn btn-sm btn-outline" style="flex:1" onclick="dismissInstallPopup()">Not Now</button></div>';document.body.appendChild(t);}
function showIosInstallPopup(){if(document.querySelector('.install-toast'))return;var t=document.createElement('div');t.className='install-toast';t.innerHTML='<button class="it-close" onclick="dismissInstallPopup()">✕</button><div class="it-head"><img src="'+LOGO+'" onerror="this.style.display=\'none\'"><h4>Install HAS Field System</h4></div><p>Tap the Share icon <i class="fas fa-share-square"></i> in Safari, then choose "Add to Home Screen".</p><div class="it-actions"><button class="btn btn-sm" style="flex:1" onclick="dismissInstallPopup()">Got it</button></div>';document.body.appendChild(t);localStorage.setItem('iosInstallPromptSeenAt',Date.now());}
function dismissInstallPopup(){var t=document.querySelector('.install-toast');if(t)t.remove();localStorage.setItem('installPromptSeenAt',Date.now());}
function doInstallApp(){var t=document.querySelector('.install-toast');if(t)t.remove();if(!deferredInstallPrompt)return;deferredInstallPrompt.prompt();deferredInstallPrompt.userChoice.then(function(choice){deferredInstallPrompt=null;localStorage.setItem('installPromptSeenAt',Date.now());if(window.app)window.app.toast(choice.outcome==='accepted'?'✅ Installing app...':'Installation dismissed','info');});}
window.showInstallPopup=showInstallPopup;window.showIosInstallPopup=showIosInstallPopup;window.dismissInstallPopup=dismissInstallPopup;window.doInstallApp=doInstallApp;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredInstallPrompt=e;var lastSeen=parseInt(localStorage.getItem('installPromptSeenAt')||'0',10);var cooldownOk=(Date.now()-lastSeen)>7*24*60*60*1000;if(cooldownOk)showInstallPopup();});
window.addEventListener('appinstalled',function(){deferredInstallPrompt=null;var t=document.querySelector('.install-toast');if(t)t.remove();if(window.app)window.app.toast('🎉 App installed!','success');});
(function(){var isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;var isIos=/iphone|ipad|ipod/i.test(navigator.userAgent);if(!isStandalone&&isIos){var lastSeen=parseInt(localStorage.getItem('iosInstallPromptSeenAt')||'0',10);var cooldownOk=(Date.now()-lastSeen)>7*24*60*60*1000;if(cooldownOk)setTimeout(showIosInstallPopup,600);}})();
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('service-worker.js').catch(function(){});});}

var app=new AppState();window.app=app;window.closeDrawer=closeDrawer;window.togglePassword=togglePassword;app.init();
</script>
