<body>

<div class="pwa-install-banner" id="pwaInstallBanner">
<span><i class="fas fa-download"></i> Install HAS Field System app for quick access</span>

function safeOp(promise,timeoutMs){timeoutMs=timeoutMs||OPERATION_TIMEOUT;return Promise.race([promise,new Promise(function(_,reject){setTimeout(function(){reject(new Error('Timed out'));},timeoutMs);})]);}

function AppState(){
var S=this;
S.reset=function(){S.stopRealtime();S.user=null;S.role=null;S.view='login';S.dark=localStorage.getItem('darkMode')==='true';S.notifs=[];S.unread=0;S.loadingInitial=true;S.showProf=S.showHistory=S.showEntry=S.showPerm=S.showAssess=S.showTasks=S.showSettings=false;S.entries=[];S.attendance=[];S.supervisors=[];S.allUsers=[];S.permReqs=[];S.assessments=[];S.checkedIn=false;S.isLate=false;S.permissionGranted=false;S.week=1;S.supId=null;S.searchQ='';S.refreshing=false;S.cache={users:null,supervisors:null,usersTimestamp:0,supervisorsTimestamp:0};S.profileWizardStep=0;S.profileData={};S.fieldPlacementData={};S.sigId=null;S.sigCanvas=null;S.sigCtx=null;S.pendingVerifications=[];S.loginAttempts={};S.realtimeUnsub=null;S.editingEntryId=null;S.reviewEntryId=null;};
S.initRealtime=function(){if(S.realtimeUnsub){try{S.realtimeUnsub();}catch(e){}S.realtimeUnsub=null;}if(!S.user)return;try{var channels=['databases.'+AC.databaseId+'.collections.'+AC.collections.notifications+'.documents'];channels.forEach(function(channel){try{client.subscribe(channel,function(resp){if(!S.user||!resp||!resp.payload)return;var p=resp.payload,evs=resp.events||[];if(p.recipientId===S.user.$id){if(evs.some(function(ev){return ev.indexOf('.create')>-1;})){if(!S.notifs.find(function(n){return n.$id===p.$id;})){S.notifs.unshift(p);S.unread++;S.updateBadge();}}else if(evs.some(function(ev){return ev.indexOf('.update')>-1;})){var idx=S.notifs.findIndex(function(n){return n.$id===p.$id;});if(idx>-1)S.notifs[idx]=p;S.unread=S.notifs.filter(function(n){return !n.isRead;}).length;S.updateBadge();}}});}catch(chErr){}});}catch(e){}};
S.stopRealtime=function(){if(S.realtimeUnsub){try{S.realtimeUnsub();}catch(e){}S.realtimeUnsub=null;}};
S.notify=async function(recipientId,title,message,type){if(!recipientId)return null;try{var result=await safeOp(db.createDocument(AC.databaseId,AC.collections.notifications,ID.unique(),{recipientId:recipientId,title:title||'Notification',message:message||'',isRead:false,createdAt:new Date().toISOString()}));if(S.user&&recipientId===S.user.$id){if(!S.notifs)S.notifs=[];S.notifs.unshift(result);S.unread=(S.unread||0)+1;S.updateBadge();}return result;}catch(e){return null;}};
S.init=function(){if(S.dark)document.body.classList.add('dark');S.initLoginSecurity();S.checkSession();};
S.initLoginSecurity=function(){var s=localStorage.getItem('has_login_attempts');if(s){try{S.loginAttempts=JSON.parse(s);}catch(e){S.loginAttempts={};}}else{S.loginAttempts={};}};
S.isUserLockedOut=function(u,rn){if(u&&u.lockoutUntil)return new Date(u.lockoutUntil).getTime()>Date.now();var k=rn.toLowerCase().trim(),r=S.loginAttempts[k];if(!r)return false;return!!(r.lockoutUntil&&r.lockoutUntil>Date.now());};
S.recordFailedAttempt=async function(u,rn){if(!u){var k=rn.toLowerCase().trim();if(!S.loginAttempts[k])S.loginAttempts[k]={attempts:0};S.loginAttempts[k].attempts++;if(S.loginAttempts[k].attempts>=5)S.loginAttempts[k].lockoutUntil=Date.now()+15*60*1000;localStorage.setItem('has_login_attempts',JSON.stringify(S.loginAttempts));return{remaining:Math.max(0,5-S.loginAttempts[k].attempts),isLocked:!!S.loginAttempts[k].lockoutUntil};}var a=(u.failedLoginAttempts||0)+1,lo=null;if(a>=5)lo=new Date(Date.now()+15*60*1000).toISOString();try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,u.$id,{failedLoginAttempts:a,lockoutUntil:lo}));}catch(e){}return{remaining:Math.max(0,5-a),isLocked:!!lo};};
S.showNav=function(){document.getElementById('topNav').classList.add('visible');document.body.classList.add('logged-in');};
S.hideAll=function(){document.getElementById('topNav').classList.remove('visible');document.body.classList.remove('logged-in');document.getElementById('sideMenu').classList.remove('open');document.getElementById('menuOverlay').classList.remove('active');document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('active');['modalSupervisor','modalViewEntry','modalSignature','modalAssessment','modalExport','modalEditEntry','modalChecklist','modalReviewEntry'].forEach(function(id){var el=document.getElementById(id);if(el){el.classList.add('hidden');el.innerHTML='';}});var popups=document.querySelectorAll('.popup-overlay');popups.forEach(function(p){p.remove();});S.hideLoading();};
S.toggleMenu=function(){var m=document.getElementById('sideMenu'),o=document.getElementById('menuOverlay');if(m.classList.contains('open')){m.classList.remove('open');o.classList.remove('active');}else{S.renderMenu();m.classList.add('open');o.classList.add('active');}};
S.loading=function(msg){S.hideLoading();var o=document.createElement('div');o.id='loadingSpinner';o.className='spinner-overlay';o.innerHTML='<div class="spinner-ring"></div><p style="font-size:0.85rem;font-weight:600;color:var(--p)">'+(msg||'Please wait...')+'</p>';document.body.appendChild(o);};
S.hideLoading=function(){var el=document.getElementById('loadingSpinner');if(el)el.remove();};
S.openMod=function(id,c){var m=document.getElementById(id);if(!m)return;m.innerHTML=c;m.classList.remove('hidden');};
S.closeMod=function(id){var m=document.getElementById(id);if(!m)return;m.classList.add('hidden');m.innerHTML='';};
S.getPhotoUrl=function(photoId){if(!photoId)return null;return'https://fra.cloud.appwrite.io/v1/storage/buckets/6a426a570026eb00d2a3/files/'+photoId+'/view?project=6a42691c0006e65e22b2';};
S.getAvatar=function(user,size){var sz=size||'sm';var cls='avatar'+(sz==='lg'?'-lg':sz==='sm'?'-sm':'');var photoId=user&&user.profilePhotoId?user.profilePhotoId:null;if(photoId){var url=S.getPhotoUrl(photoId);return'<img src="'+url+'" class="'+cls+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" style="object-fit:cover"><div class="'+cls+'" style="display:none;background:rgba(37,99,235,0.1)"><i class="fas fa-user"></i></div>';}var icon='fa-user';if(user&&user.role==='student')icon='fa-user-graduate';else if(user&&user.role==='university_supervisor')icon='fa-user-tie';return'<div class="'+cls+'" style="background:rgba(37,99,235,0.1);color:var(--p)"><i class="fas '+icon+'"></i></div>';};
S.checkSession=async function(){try{var u=await account.get();S.loadingInitial=true;await S.fetchUser(u);S.loadingInitial=false;}catch(e){S.reset();S.loadingInitial=false;}S.render();};
S.fetchUser=async function(user){try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('email',user.email)]));if(r.documents.length>0){S.user=r.documents[0];S.role=S.user.role;S.supId=S.user.supervisorId;await S.loadData();if(S.role==='student'){await S.loadProfileData();if(S.user.isFirstLogin)S.showProf=true;}S.initRealtime();}}catch(e){S.reset();}};
S.loadData=async function(force){if(!S.user)return;try{var now=Date.now(),cacheTTL=10000;var promises=[];if(force||!S.cache.users||(now-S.cache.usersTimestamp)>cacheTTL){promises.push(safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.limit(200)])).then(function(r){S.cache.users=r.documents;S.cache.usersTimestamp=now;S.allUsers=r.documents;}));}else{S.allUsers=S.cache.users;}if(force||!S.cache.supervisors||(now-S.cache.supervisorsTimestamp)>cacheTTL){promises.push(safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('role','university_supervisor')])).then(function(r){S.cache.supervisors=r.documents;S.cache.supervisorsTimestamp=now;S.supervisors=r.documents;}));}else{S.supervisors=S.cache.supervisors;}await Promise.all(promises);await S.loadNotifs();if(S.role==='student'){await S.loadStudentData();}else if(S.role==='university_supervisor'){await S.loadSupervisorData();await S.loadVerifications();}}catch(e){}};
S.loadStudentData=async function(){if(!S.user||S.role!=='student')return;try{var r=await Promise.all([safeOp(db.listDocuments(AC.databaseId,AC.collections.logbookEntries,[Q.equal('studentId',S.user.$id),Q.orderDesc('entryDate'),Q.limit(100)])),safeOp(db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.orderDesc('checkInDate'),Q.limit(100)]))]);S.entries=r[0].documents;S.attendance=r[1].documents;S.calcWeek();await S.checkToday();}catch(e){}};
S.loadSupervisorData=async function(){if(!S.user||S.role!=='university_supervisor')return;try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.logbookEntries,[Q.equal('supervisorId',S.user.$id),Q.orderDesc('entryDate'),Q.limit(200)]));S.entries=r.documents;await S.loadPermReqs();await S.loadAssess();}catch(e){}};
S.loadNotifs=async function(){if(!S.user){S.notifs=[];S.unread=0;S.updateBadge();return;}try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.notifications,[Q.equal('recipientId',S.user.$id),Q.orderDesc('createdAt'),Q.limit(50)]));S.notifs=r.documents;S.unread=S.notifs.filter(function(n){return !n.isRead;}).length;S.updateBadge();}catch(e){S.notifs=[];S.unread=0;S.updateBadge();}};
S.loadPermReqs=async function(){if(!S.user||S.role!=='university_supervisor')return;try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.permissionRequests,[Q.equal('supervisorId',S.user.$id),Q.equal('status','pending'),Q.orderDesc('createdAt')]));S.permReqs=r.documents;}catch(e){S.permReqs=[];}};

/* ====== ASSESSMENT LOAD - FIXED FOR STUDENT ====== */
S.loadAssess=async function(){
if(!S.user)return;
try{
var q=[];
if(S.role==='university_supervisor'){
q=[Q.equal('supervisorId',S.user.$id)];
}else if(S.role==='student'){
q=[Q.equal('studentId',S.user.$id)];
}
var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.assessments,
q.concat([Q.orderDesc('createdAt'),Q.limit(50)])
));
S.assessments=r.documents.filter(function(a){return !a.isDeleted;});
}catch(e){S.assessments=[];}
};
S.loadVerifications=async function(){if(!S.user||S.role!=='university_supervisor')return;try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.fieldPlacements,[Q.equal('supervisorId',S.user.$id),Q.equal('status','submitted'),Q.orderDesc('createdAt'),Q.limit(50)]));S.pendingVerifications=r.documents;}catch(e){S.pendingVerifications=[];}};
S.loadProfileData=async function(){if(!S.user||S.role!=='student')return;try{var pr=await safeOp(db.listDocuments(AC.databaseId,AC.collections.profiles,[Q.equal('userId',S.user.$id)]));if(pr.documents.length>0){var p=pr.documents[0];S.profileData={gender:p.gender,dateOfBirth:p.dateOfBirth,profilePhotoId:p.profilePhotoId,institution:p.institution,programme:p.programme,yearOfStudy:p.yearOfStudy,semester:p.semester};}var fpr=await safeOp(db.listDocuments(AC.databaseId,AC.collections.fieldPlacements,[Q.equal('studentId',S.user.$id),Q.orderDesc('createdAt'),Q.limit(1)]));if(fpr.documents.length>0){var fp=fpr.documents[0];S.fieldPlacementData={$id:fp.$id,fieldRegion:fp.fieldRegion,fieldDistrict:fp.fieldDistrict,institution:fp.institution,startDate:fp.startDate,endDate:fp.endDate,status:fp.status,fieldSupervisorName:fp.fieldSupervisorName,fieldSupervisorPhone:fp.fieldSupervisorPhone,fieldSupervisorEmail:fp.fieldSupervisorEmail};}}catch(er){}};
S.calcWeek=function(){if(!S.attendance||S.attendance.length===0){S.week=1;return;}var f=new Date(S.attendance[S.attendance.length-1].checkInDate);S.week=Math.ceil(Math.abs(new Date()-f)/(1000*60*60*24*7))||1;};
S.checkToday=async function(){var t=new Date().toISOString().split('T')[0];try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.equal('checkInDate',t)]));if(r.documents.length>0){var att=r.documents[0];S.checkedIn=true;S.isLate=new Date(att.checkInTime).getHours()>=3;S.permissionGranted=!!att.permissionGranted;}else{S.checkedIn=S.isLate=S.permissionGranted=false;}}catch(e){S.checkedIn=false;}};
S.refreshAll=async function(){if(S.refreshing)return;S.refreshing=true;try{await S.loadNotifs();await S.loadData(true);S.render();showToast('Refreshed','success');}catch(e){showToast('Refresh failed','error');}setTimeout(function(){S.refreshing=false;},300);};
S.render=function(){if(S._renderTimer)clearTimeout(S._renderTimer);S._renderTimer=setTimeout(function(){S._doRender();},30);};
S._doRender=function(){S.updateTop();S.renderMenu();S.updateNavSearch();var mc=document.getElementById('mainContent');if(!mc)return;if(S.loadingInitial){mc.innerHTML='<div class="auth-wrapper"><div class="auth-card" style="text-align:center"><div class="spinner-ring" style="margin:0 auto 16px"></div><p style="color:#94a3b8">Loading...</p></div></div>';return;}if(!S.user){S.hideAll();mc.innerHTML=S.renderAuth();return;}S.showNav();if(S.showProf)mc.innerHTML=S.renderProf();else if(S.showEntry)mc.innerHTML=S.renderEntry();else if(S.showPerm)mc.innerHTML=S.renderPermPage();else if(S.showHistory)mc.innerHTML=S.renderHistoryPage();else if(S.showTasks)mc.innerHTML=S.renderTasks();else if(S.showAssess)mc.innerHTML=S.renderAssessPage();else if(S.showSettings)mc.innerHTML=S.renderSettings();else mc.innerHTML=S.renderDashboard();};

S.saveEntry=async function(e){e.preventDefault();var btn=e.submitter,orig=btn.innerHTML;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Saving...';btn.disabled=true;var n=new Date(),st=btn.value==='submit'?'Pending Review':'Draft',d={studentId:S.user.$id,supervisorId:S.user.supervisorId||'unassigned',entryDate:document.getElementById('entryDate').value,weekNumber:parseInt(document.getElementById('weekNumber').value),activityTitle:document.getElementById('activityTitle').value,objectives:document.getElementById('objectives').value,activitiesPerformed:document.getElementById('activitiesPerformed').value,description:document.getElementById('description').value,skillsAcquired:document.getElementById('skillsAcquired').value,challengesFaced:document.getElementById('challengesFaced').value,status:st,submittedAt:n.toISOString()};try{await safeOp(db.createDocument(AC.databaseId,AC.collections.logbookEntries,ID.unique(),d));btn.innerHTML='<i class="fas fa-check"></i> Done';S.showEntry=false;await S.loadStudentData();S.render();showToast('Entry '+(st==='Draft'?'saved':'submitted'),'success');if(st==='Pending Review'&&S.user.supervisorId&&S.user.supervisorId!=='unassigned'){await S.notify(S.user.supervisorId,'New Entry Submitted',S.user.fullName+' submitted: '+d.activityTitle,'entry_submitted');}}catch(er){btn.innerHTML=orig;btn.disabled=false;showToast(er.message,'error');}};
S.deleteEntry=async function(eid,title){if(!confirm('Delete entry: '+title+'?\nThis cannot be undone.'))return;S.loading('Deleting...');try{await safeOp(db.deleteDocument(AC.databaseId,AC.collections.logbookEntries,eid));S.hideLoading();await S.loadStudentData();S.render();showToast('Entry deleted','success');}catch(er){S.hideLoading();showToast(er.message,'error');}};
S.openEditEntry=function(eid){var e=S.entries.find(function(x){return x.$id===eid;});if(!e)return;var isResubmit=e.status==='Rejected';S.editingEntryId=eid;var h='<div class="modal-content" style="max-width:700px"><div class="modal-header"><h3>'+(isResubmit?'Edit & Resubmit':'Edit Entry')+'</h3><button class="close-btn" onclick="app.closeMod(\'modalEditEntry\')"><i class="fas fa-times"></i></button></div><form onsubmit="app.saveEditEntry(event)"><div class="form-group"><label>Title</label><input type="text" id="editActivityTitle" value="'+e.activityTitle+'" required></div><div class="grid grid-2"><div class="form-group"><label>Date</label><input type="date" id="editEntryDate" value="'+e.entryDate+'" required></div><div class="form-group"><label>Week</label><input type="number" id="editWeekNumber" value="'+e.weekNumber+'" readonly></div></div><div class="form-group"><label>Objectives</label><textarea id="editObjectives" rows="2">'+(e.objectives||'')+'</textarea></div><div class="form-group"><label>Activities</label><textarea id="editActivitiesPerformed" rows="3" required>'+e.activitiesPerformed+'</textarea></div><div class="form-group"><label>Description</label><textarea id="editDescription" rows="3" required>'+e.description+'</textarea></div><div class="grid grid-2"><div class="form-group"><label>Skills</label><textarea id="editSkillsAcquired" rows="2">'+(e.skillsAcquired||'')+'</textarea></div><div class="form-group"><label>Challenges</label><textarea id="editChallengesFaced" rows="2">'+(e.challengesFaced||'')+'</textarea></div></div><div style="display:flex;gap:10px;margin-top:16px"><button type="submit" class="btn btn-lg btn-success" style="flex:1">'+(isResubmit?'Resubmit for Review':'Save Changes')+'</button><button type="button" class="btn btn-lg btn-outline" onclick="app.closeMod(\'modalEditEntry\')" style="flex:1">Cancel</button></div></form></div>';S.openMod('modalEditEntry',h);};
S.saveEditEntry=async function(e){e.preventDefault();if(!S.editingEntryId)return;var entry=S.entries.find(function(x){return x.$id===S.editingEntryId;});var isResubmit=entry&&entry.status==='Rejected';var d={activityTitle:document.getElementById('editActivityTitle').value,entryDate:document.getElementById('editEntryDate').value,objectives:document.getElementById('editObjectives').value,activitiesPerformed:document.getElementById('editActivitiesPerformed').value,description:document.getElementById('editDescription').value,skillsAcquired:document.getElementById('editSkillsAcquired').value,challengesFaced:document.getElementById('editChallengesFaced').value};if(isResubmit){d.status='Pending Review';d.supervisorComment=null;}S.loading(isResubmit?'Resubmitting...':'Updating...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.logbookEntries,S.editingEntryId,d));S.hideLoading();S.closeMod('modalEditEntry');S.editingEntryId=null;await S.loadStudentData();S.render();showToast(isResubmit?'Entry resubmitted for review':'Entry updated','success');if(isResubmit&&S.user.supervisorId&&S.user.supervisorId!=='unassigned'){await S.notify(S.user.supervisorId,'Entry Resubmitted',S.user.fullName+' resubmitted: '+d.activityTitle,'entry_resubmitted');}}catch(er){S.hideLoading();showToast(er.message,'error');}};

/* ====== HISTORY & TASKS ====== */
S.renderHistoryPage=function(){var e=S.entries||[];var h='<div class="glass-card"><div class="flex-between"><h2>History</h2><button class="close-btn" onclick="app.goDash()"><i class="fas fa-times"></i></button></div>';if(e.length>0){h+='<div class="responsive-table"><table><thead><tr><th>Date</th><th>Activity</th><th>Status</th><th>Actions</th></tr></thead><tbody>';e.slice(0,50).forEach(function(x){var canEdit=(x.status==='Draft'||x.status==='Rejected');var canDelete=(x.status==='Draft'||x.status==='Rejected');h+='<tr><td>'+new Date(x.entryDate).toLocaleDateString()+'</td><td><strong>'+x.activityTitle+'</strong></td><td><span class="badge badge-'+(x.status||'Draft').toLowerCase().replace(' ','-')+'">'+(x.status||'Draft')+'</span></td><td><div style="display:flex;gap:4px"><button class="btn btn-sm btn-outline" onclick="app.viewEntry(\''+x.$id+'\')"><i class="fas fa-eye"></i></button>';if(canEdit)h+='<button class="btn btn-sm btn-outline" onclick="app.openEditEntry(\''+x.$id+'\')"><i class="fas fa-edit"></i></button>';if(canDelete)h+='<button class="btn btn-sm btn-danger" onclick="app.deleteEntry(\''+x.$id+'\',\''+(x.activityTitle||'Entry').replace(/'/g,"\\'")+'\')"><i class="fas fa-trash-can"></i></button>';h+='</div></td></tr>';});h+='</tbody></table></div>';}else{h+='<div class="empty-state"><p>No entries</p></div>';}h+='</div>';return h;};
S.renderTasks=function(){var e=S.entries||[];var h='<div class="glass-card"><div class="flex-between"><h2>Tasks</h2><button class="close-btn" onclick="app.goDash()"><i class="fas fa-times"></i></button></div>';if(e.length>0){h+='<div class="responsive-table"><table><thead><tr><th>Date</th><th>Activity</th><th>Status</th><th>Actions</th></tr></thead><tbody>';e.forEach(function(x){var canEdit=(S.role==='student'&&(x.status==='Draft'||x.status==='Rejected'));var canDelete=(S.role==='student'&&(x.status==='Draft'||x.status==='Rejected'));h+='<tr><td>'+new Date(x.entryDate).toLocaleDateString()+'</td><td>'+x.activityTitle+'</td><td><span class="badge badge-'+(x.status||'Draft').toLowerCase().replace(' ','-')+'">'+(x.status||'Draft')+'</span></td><td><div style="display:flex;gap:4px"><button class="btn btn-sm btn-outline" onclick="app.viewEntry(\''+x.$id+'\')"><i class="fas fa-eye"></i></button>';if(S.role==='university_supervisor'&&x.status==='Pending Review'){h+='<button class="btn btn-sm btn-success" onclick="app.openReviewEntry(\''+x.$id+'\')">Approve</button> <button class="btn btn-sm btn-danger" onclick="app.rejectEntry(\''+x.$id+'\')">Reject</button>';}else if(canEdit){h+='<button class="btn btn-sm btn-outline" onclick="app.openEditEntry(\''+x.$id+'\')"><i class="fas fa-edit"></i></button>';}if(canDelete){h+='<button class="btn btn-sm btn-danger" onclick="app.deleteEntry(\''+x.$id+'\',\''+(x.activityTitle||'Entry').replace(/'/g,"\\'")+'\')"><i class="fas fa-trash-can"></i></button>';}h+='</div></td></tr>';});h+='</tbody></table></div>';}else{h+='<div class="empty-state"><p>No tasks</p></div>';}h+='</div>';return h;};

/* ====== SIGNATURE & APPROVAL ====== */
S.openSig=function(id){S.sigId=id;var h='<div class="modal-content" style="max-width:420px"><div class="modal-header"><h3>Sign & Approve</h3><button class="close-btn" onclick="app.closeMod(\'modalSignature\')"><i class="fas fa-times"></i></button></div><canvas id="sigCanvas" class="signature-canvas" width="400" height="180"></canvas><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-sm btn-outline" onclick="app.clearSig()">Clear</button><button class="btn btn-sm btn-success" onclick="app.saveSig()">Approve</button></div></div>';S.openMod('modalSignature',h);setTimeout(function(){S.sigCanvas=document.getElementById('sigCanvas');if(S.sigCanvas){S.sigCtx=S.sigCanvas.getContext('2d');S.sigCtx.strokeStyle='#1e40af';S.sigCtx.lineWidth=2;var isDrawing=false;var getPos=function(e){var r=S.sigCanvas.getBoundingClientRect();return{x:(e.clientX||(e.touches&&e.touches[0].clientX))-r.left,y:(e.clientY||(e.touches&&e.touches[0].clientY))-r.top};};S.sigCanvas.onmousedown=S.sigCanvas.ontouchstart=function(e){e.preventDefault();isDrawing=true;var p=getPos(e);S.sigCtx.beginPath();S.sigCtx.moveTo(p.x,p.y);};S.sigCanvas.onmousemove=S.sigCanvas.ontouchmove=function(e){if(!isDrawing)return;e.preventDefault();var p=getPos(e);S.sigCtx.lineTo(p.x,p.y);S.sigCtx.stroke();};S.sigCanvas.onmouseup=S.sigCanvas.ontouchend=function(){isDrawing=false;};}},80);};
S.clearSig=function(){if(S.sigCtx)S.sigCtx.clearRect(0,0,S.sigCanvas.width,S.sigCanvas.height);};
S.saveSig=async function(){if(!S.sigCanvas||!S.sigId)return;var d=S.sigCanvas.toDataURL();try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.logbookEntries,S.sigId,{status:'Approved',supervisorSignature:d,reviewedAt:new Date().toISOString()}));S.closeMod('modalSignature');var entry=S.entries.find(function(e){return e.$id===S.sigId;});S.sigId=null;showToast('Approved','success');await S.loadSupervisorData();S.render();if(entry){await S.notify(entry.studentId,'Entry Approved','Your entry "'+entry.activityTitle+'" has been approved.','entry_approved');}}catch(er){showToast(er.message,'error');}};
S.rejectEntry=async function(id){var c=prompt('Rejection reason:');if(!c)return;S.rejectEntryDirect(id,c);};

/* ====== ASSESSMENTS ====== */
S.calculateGrade=function(m){m=parseInt(m)||0;if(m>=70)return{grade:'A',cssClass:'grade-a'};if(m>=60)return{grade:'B+',cssClass:'grade-bplus'};if(m>=50)return{grade:'B',cssClass:'grade-b'};if(m>=40)return{grade:'C',cssClass:'grade-c'};return{grade:'Supplementary',cssClass:'grade-supp'};};
S.renderAssessPage=function(){var h='<div class="glass-card"><div class="flex-between"><h2>Assessments</h2><button class="close-btn" onclick="app.goDash()"><i class="fas fa-times"></i></button></div>';if(S.role==='university_supervisor')h+='<button class="btn btn-lg btn-purple" style="margin-bottom:12px;width:100%" onclick="app.openAddAssess()"><i class="fas fa-plus-circle"></i> New Assessment</button>';if(!S.assessments||S.assessments.length===0){h+='<div class="empty-state"><i class="fas fa-clipboard-list" style="font-size:2.5rem;color:#cbd5e1"></i><p>No assessments yet</p>'+(S.role==='student'?'<p style="font-size:0.7rem;color:#64748b">Your supervisor will add assessments here</p>':'')+'</div>';}else{var has=false;S.assessments.forEach(function(a){if(a.isDeleted===true)return;has=true;var g=S.calculateGrade(a.totalMarks);var supervisorName='';if(S.role==='student'&&a.supervisorId){var sup=S.allUsers.find(function(u){return u.$id===a.supervisorId;});if(sup)supervisorName=sup.fullName;}h+='<div class="assessment-card"><div class="assess-header"><div class="assess-info"><div class="assess-title">'+(a.title||'Assessment')+'</div><div class="assess-meta">'+(a.createdAt?new Date(a.createdAt).toLocaleDateString():'')+(supervisorName?' | By: '+supervisorName:'')+'</div></div><div class="assess-grade"><div class="grade-badge '+g.cssClass+'">'+g.grade+'</div><div style="font-size:0.7rem;font-weight:600;margin-top:4px;color:#64748b">'+a.totalMarks+'/100</div></div></div>'+(S.role==='university_supervisor'?'<div style="margin-top:8px;text-align:right"><button class="btn btn-sm btn-danger" onclick="app.deleteAssessment(\''+a.$id+'\',\''+(a.title||'').replace(/'/g,"\\'")+'\')"><i class="fas fa-trash-can"></i> Delete</button></div>':'')+'</div>';});if(!has)h+='<div class="empty-state"><i class="fas fa-clipboard-list" style="font-size:2.5rem;color:#cbd5e1"></i><p>No assessments yet</p></div>';}h+='</div>';return h;};
S.openAddAssess=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.supervisorId===S.user.$id&&u.supervisorStatus==='approved';});var h='<div class="modal-content" style="max-width:500px"><div class="modal-header"><h3>New Assessment</h3><button class="close-btn" onclick="app.closeMod(\'modalAssessment\')"><i class="fas fa-times"></i></button></div><form onsubmit="app.saveAssess(event)"><div class="form-group"><label>Student</label><select id="assessStudentId" required><option value="">Select</option>'+st.map(function(s){return'<option value="'+s.$id+'">'+s.fullName+'</option>';}).join('')+'</select></div><div class="form-group"><label>Title</label><input type="text" id="assessTitle" required></div><div class="form-group"><label>Marks (0-100)</label><input type="number" id="assessMarks" min="0" max="100" required oninput="app.updateGradePreview()"><div id="gradePreview" style="margin-top:6px;padding:8px 12px;border-radius:8px;font-weight:600;font-size:0.85rem;display:none"></div></div><button type="submit" class="btn btn-lg btn-purple" style="width:100%">Save Assessment</button></form></div>';S.openMod('modalAssessment',h);};
S.updateGradePreview=function(){var m=document.getElementById('assessMarks');var p=document.getElementById('gradePreview');if(!m||!p)return;var v=parseInt(m.value);if(isNaN(v)||v<0||v>100){p.style.display='none';return;}var g=S.calculateGrade(v);p.style.display='block';p.style.background=g.cssClass==='grade-a'?'#dcfce7':g.cssClass==='grade-bplus'?'#dbeafe':g.cssClass==='grade-b'?'#e0e7ff':g.cssClass==='grade-c'?'#fff7ed':'#fee2e2';p.style.color=g.cssClass==='grade-a'?'#166534':g.cssClass==='grade-bplus'?'#1e40af':g.cssClass==='grade-b'?'#3730a3':g.cssClass==='grade-c'?'#9a3412':'#991b1b';p.innerHTML='Grade: <strong>'+g.grade+'</strong>';};
S.saveAssess=async function(e){e.preventDefault();var m=parseInt(document.getElementById('assessMarks').value)||0;var g=S.calculateGrade(m);var sid=document.getElementById('assessStudentId').value;var t=document.getElementById('assessTitle').value;if(!sid||!t){showToast('Fill all fields','error');return;}S.loading('Saving...');try{await safeOp(db.createDocument(AC.databaseId,AC.collections.assessments,ID.unique(),{studentId:sid,supervisorId:S.user.$id,title:t,totalMarks:m,grade:g.grade,isDeleted:false,createdAt:new Date().toISOString()}));S.hideLoading();S.closeMod('modalAssessment');showToast('Assessment saved: '+g.grade+' ('+m+'/100)','success');await S.loadAssess();S.render();var student=S.allUsers.find(function(u){return u.$id===sid;});var studentName=student?student.fullName:'Student';await S.notify(sid,'New Assessment: '+g.grade,t+' - Marks: '+m+'/100, Grade: '+g.grade,'assessment_submitted');}catch(er){S.hideLoading();showToast(er.message,'error');}};
S.deleteAssessment=async function(id,t){if(!confirm('Delete: '+t+'?'))return;S.loading('Deleting...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.assessments,id,{isDeleted:true,deletedAt:new Date().toISOString(),deletedBy:S.user.$id}));S.hideLoading();showToast('Deleted','success');await S.loadAssess();S.render();}catch(er){S.hideLoading();showToast(er.message,'error');}};

/* ====== CHECK-IN, PERMISSION, EXPORT ====== */
S.renderPermPage=function(){return'<div style="max-width:460px;margin:40px auto"><div class="glass-card"><div class="flex-between"><h2>Permission Request</h2><button class="close-btn" onclick="app.showPerm=false;app.render()"><i class="fas fa-times"></i></button></div><button class="btn btn-lg btn-warning" onclick="app.requestPermission()" style="width:100%;margin:8px 0">Request Permission</button><button class="btn btn-lg btn-outline" onclick="app.goDash()" style="width:100%">Back</button></div></div>';};
S.requestPermission=async function(){if(!S.user.supervisorId){showToast('No supervisor','error');return;}var r=prompt('Reason for late check-in:');if(!r)return;S.loading('Sending...');try{var t=new Date().toISOString().split('T')[0];await safeOp(db.createDocument(AC.databaseId,AC.collections.permissionRequests,ID.unique(),{studentId:S.user.$id,supervisorId:S.user.supervisorId,requestDate:t,reason:r,status:'pending',createdAt:new Date().toISOString()}));S.hideLoading();S.showPerm=false;S.render();showToast('Permission request sent','success');await S.notify(S.user.supervisorId,'Permission Request',S.user.fullName+' requests late check-in permission.','permission_request');}catch(er){S.hideLoading();showToast(er.message,'error');}};
S.checkIn=async function(){if(S.role!=='student')return;var t=new Date().toISOString().split('T')[0],n=new Date(),late=n.getHours()>=3;try{var ex=await safeOp(db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.equal('checkInDate',t)]));if(ex.documents.length){showToast('Already checked in','warning');return;}await safeOp(db.createDocument(AC.databaseId,AC.collections.attendance,ID.unique(),{studentId:S.user.$id,checkInDate:t,checkInTime:n.toISOString(),weekNumber:S.week,status:late?'late':'present',permissionGranted:false}));S.checkedIn=true;S.isLate=late;if(late){showToast('Late check-in recorded. Request permission to write entries.','warning',{duration:5000});}else{showToast('Checked in successfully','success');}S.render();}catch(er){showToast(er.message,'error');}};
S.checkOut=async function(){if(S.role!=='student')return;var t=new Date().toISOString().split('T')[0];try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.equal('checkInDate',t)]));if(!r.documents.length){showToast('Check in first','warning');return;}await safeOp(db.updateDocument(AC.databaseId,AC.collections.attendance,r.documents[0].$id,{checkOutTime:new Date().toISOString()}));showToast('Checked out','success');}catch(er){showToast(er.message,'error');}};
S.openExport=function(){var h='<div class="modal-content" style="max-width:500px"><div class="modal-header"><h3>Export Data</h3><button class="close-btn" onclick="app.closeMod(\'modalExport\')"><i class="fas fa-times"></i></button></div>';if(S.role==='student'){h+='<div style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-lg" onclick="app.exportPDF()"><i class="fas fa-file-pdf"></i> PDF</button><button class="btn btn-lg btn-outline" onclick="app.exportWord()"><i class="fas fa-file-word"></i> Word</button><button class="btn btn-lg btn-success" onclick="app.exportExcel()"><i class="fas fa-file-excel"></i> Excel</button></div>';}else{h+='<div style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-lg" onclick="app.exportUsersPDF()"><i class="fas fa-file-pdf"></i> PDF</button><button class="btn btn-lg btn-outline" onclick="app.exportUsersWord()"><i class="fas fa-file-word"></i> Word</button><button class="btn btn-lg btn-success" onclick="app.exportUsersExcel()"><i class="fas fa-file-excel"></i> Excel</button></div>';}h+='</div>';S.openMod('modalExport',h);};
S.getStudentEntries=function(){return(S.entries||[]).slice();};
S.getUsersForExport=function(){var u=S.allUsers||[];if(S.role==='university_supervisor')u=u.filter(function(x){return x.role==='student'&&x.supervisorId===S.user.$id;});else if(S.role==='department')u=u.filter(function(x){return x.role==='student';});return u;};
S.exportPDF=function(){if(typeof window.jspdf==='undefined')return;var e=S.getStudentEntries();if(e.length===0){showToast('No entries','warning');return;}var doc=new window.jspdf.jsPDF('p','mm','a4'),m=15,y=20;doc.setFontSize(14);doc.setTextColor(30,64,175);doc.text('Logbook Entries',m,y);y+=5;doc.setFontSize(9);doc.setTextColor(100,116,139);doc.text('Student: '+(S.user.fullName||'N/A'),m,y);y+=3;doc.text('Total: '+e.length,m,y);y+=4;doc.line(m,y,195,y);y+=5;e.forEach(function(x,i){if(y>265){doc.addPage();y=20;}doc.setFontSize(10);doc.setTextColor(15,23,42);doc.text((i+1)+'. '+x.activityTitle,m,y);y+=4;doc.setFontSize(8);doc.setTextColor(71,85,105);doc.text('Date: '+new Date(x.entryDate).toLocaleDateString()+' | '+(x.status||'Draft'),m,y);y+=4;doc.text((x.description||'').substring(0,120),m,y);y+=5;});doc.line(m,y,195,y);doc.setFontSize(7);doc.setTextColor(148,163,184);doc.text('Generated: '+new Date().toLocaleString(),m,y+4);S.closeMod('modalExport');doc.save('Logbook_'+new Date().toISOString().split('T')[0]+'.pdf');showToast('PDF downloaded','success');};
S.exportWord=function(){var e=S.getStudentEntries();if(e.length===0){showToast('No entries','warning');return;}var t='Logbook Entries\n\n';e.forEach(function(x,i){t+=(i+1)+'. '+x.activityTitle+'\nDate: '+new Date(x.entryDate).toLocaleDateString()+' | '+(x.status||'Draft')+'\n'+(x.description||'')+'\n\n';});var b=new Blob([t],{type:'application/msword'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Logbook_'+new Date().toISOString().split('T')[0]+'.doc';a.click();S.closeMod('modalExport');showToast('Word downloaded','success');};
S.exportExcel=function(){var e=S.getStudentEntries();if(e.length===0){showToast('No entries','warning');return;}var c='No.,Date,Title,Status\n';e.forEach(function(x,i){c+=(i+1)+','+new Date(x.entryDate).toLocaleDateString()+',"'+x.activityTitle+'","'+(x.status||'Draft')+'"\n';});var b=new Blob([c],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Logbook_'+new Date().toISOString().split('T')[0]+'.csv';a.click();S.closeMod('modalExport');showToast('Excel downloaded','success');};
S.exportUsersPDF=function(){if(typeof window.jspdf==='undefined')return;var u=S.getUsersForExport();if(u.length===0){showToast('No users','warning');return;}var doc=new window.jspdf.jsPDF('p','mm','a4'),m=15,y=20;doc.setFontSize(14);doc.setTextColor(30,64,175);doc.text('Users List',m,y);y+=4;doc.setFontSize(9);doc.text('Total: '+u.length,m,y);y+=4;doc.line(m,y,195,y);y+=5;doc.setFontSize(9);doc.text('No.',m,y);doc.text('Full Name',m+10,y);doc.text('Reg No.',m+100,y);y+=3;doc.line(m,y,195,y);y+=3;u.forEach(function(x,i){if(y>270){doc.addPage();y=20;}doc.setFontSize(8);doc.setTextColor(71,85,105);doc.text(String(i+1),m,y);doc.text(x.fullName||'N/A',m+10,y);doc.text(x.registrationNumber||'N/A',m+100,y);y+=4;});doc.line(m,y,195,y);doc.setFontSize(7);doc.text('Generated: '+new Date().toLocaleString(),m,y+4);S.closeMod('modalExport');doc.save('Users_'+new Date().toISOString().split('T')[0]+'.pdf');showToast('PDF downloaded','success');};
S.exportUsersWord=function(){var u=S.getUsersForExport();if(u.length===0){showToast('No users','warning');return;}var t='Users List\n\n';u.forEach(function(x,i){t+=(i+1)+'. '+x.fullName+' - '+x.registrationNumber+'\n';});var b=new Blob([t],{type:'application/msword'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Users_'+new Date().toISOString().split('T')[0]+'.doc';a.click();S.closeMod('modalExport');showToast('Word downloaded','success');};
S.exportUsersExcel=function(){var u=S.getUsersForExport();if(u.length===0){showToast('No users','warning');return;}var c='No.,Full Name,Registration Number\n';u.forEach(function(x,i){c+=(i+1)+',"'+x.fullName+'","'+x.registrationNumber+'"\n';});var b=new Blob([c],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Users_'+new Date().toISOString().split('T')[0]+'.csv';a.click();S.closeMod('modalExport');showToast('Excel downloaded','success');};

/* ====== PROFILE WIZARD ====== */
S.renderProf=function(){var u=S.user;if(!u)return'';var w=S.profileWizardStep||0,p=S.profileData||{},f=S.fieldPlacementData||{},c=S.calcProfileCompletion();var h='<div class="glass-card" style="max-width:800px;margin:0 auto"><div class="flex-between"><h2>Profile</h2><button class="close-btn" onclick="app.showProf=false;app.render()"><i class="fas fa-times"></i></button></div><div class="progress-ring"><svg width="90" height="90"><circle class="bg-circle" cx="45" cy="45" r="38"/><circle class="fg-circle" cx="45" cy="45" r="38" stroke-dasharray="238.76" stroke-dashoffset="'+(238.76-(238.76*c/100))+'"/></svg><div class="progress-text">'+c+'%</div></div><div style="text-align:center;margin-bottom:12px;font-size:0.72rem;color:#64748b">Each step: 20% | Complete all 5 for 100%</div><div class="profile-wizard">';var st=['Personal','Academic','Field','Uni Sup','Field Sup'],si=['user','graduation-cap','map-marker-alt','user-tie','user-check'];st.forEach(function(s,i){var cls=i===w?'active':(c>=(i+1)*20?'completed':'');h+='<div class="wizard-step '+cls+'" onclick="app.setWizardStep('+i+')"><i class="fas fa-'+si[i]+'"></i>'+s+'<br><small>20%</small></div>';});h+='</div>'+S.renderWizardContent(w,p,f)+'</div>';return h;};
S.setWizardStep=function(s){S.profileWizardStep=s;S.render();};
S.renderWizardContent=function(s,p,f){switch(s){case 0:return S.renderPersonalInfo(p);case 1:return S.renderAcademicInfo(p);case 2:return S.renderFieldPlacement(f);case 3:return S.renderUnivSupervisor();case 4:return S.renderFieldSupervisor(f);default:return'';}};
S.renderPersonalInfo=function(p){return'<form onsubmit="app.savePersonalInfo(event)"><h3>Personal Info (20%)</h3><div class="grid grid-2"><div class="form-group"><label>Gender</label><select id="profGender" required><option value="">Select</option><option value="Male" '+(p.gender==='Male'?'selected':'')+'>Male</option><option value="Female" '+(p.gender==='Female'?'selected':'')+'>Female</option></select></div><div class="form-group"><label>Date of Birth</label><input type="date" id="profDOB" value="'+(p.dateOfBirth||'')+'"></div></div><div class="form-group"><label>Photo</label><input type="file" id="profPhoto" accept="image/*"></div><div class="sticky-bottom"><button type="submit" class="btn btn-lg" style="width:100%">Save & Continue</button></div></form>';};
S.savePersonalInfo=async function(e){e.preventDefault();S.profileData.gender=document.getElementById('profGender').value;S.profileData.dateOfBirth=document.getElementById('profDOB').value;var file=document.getElementById('profPhoto').files[0];if(file){S.loading('Uploading...');try{var storage=new Appwrite.Storage(client);var uploaded=await safeOp(storage.createFile('6a426a570026eb00d2a3',ID.unique(),file));S.profileData.profilePhotoId=uploaded.$id;S.user.profilePhotoId=uploaded.$id;await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,S.user.$id,{profilePhotoId:uploaded.$id})).catch(function(){});}catch(er){}S.hideLoading();}await S.saveProfileToDB();S.profileWizardStep=1;S.render();showToast('Saved (20%)','success');};
S.renderAcademicInfo=function(p){var y='';for(var i=1;i<=6;i++)y+='<option value="'+i+'" '+(p.yearOfStudy==i?'selected':'')+'>Year '+i+'</option>';return'<form onsubmit="app.saveAcademicInfo(event)"><h3>Academic Info (20%)</h3><div class="form-group"><label>Institution</label><input type="text" id="profInstitution" value="'+(p.institution||'')+'" required></div><div class="form-group"><label>Programme</label><input type="text" id="profProgramme" value="'+(p.programme||'')+'" required></div><div class="grid grid-2"><div class="form-group"><label>Year</label><select id="profYear"><option value="">Select</option>'+y+'</select></div><div class="form-group"><label>Semester</label><select id="profSemester"><option value="">Select</option><option value="1" '+(p.semester==1?'selected':'')+'>Sem 1</option><option value="2" '+(p.semester==2?'selected':'')+'>Sem 2</option></select></div></div><div class="sticky-bottom" style="display:flex;gap:8px"><button type="button" class="btn btn-outline btn-lg" onclick="app.setWizardStep(0)" style="flex:1">Back</button><button type="submit" class="btn btn-lg" style="flex:1">Save</button></div></form>';};
S.saveAcademicInfo=async function(e){e.preventDefault();S.profileData.institution=document.getElementById('profInstitution').value;S.profileData.programme=document.getElementById('profProgramme').value;S.profileData.yearOfStudy=parseInt(document.getElementById('profYear').value)||null;S.profileData.semester=parseInt(document.getElementById('profSemester').value)||null;await S.saveProfileToDB();S.profileWizardStep=2;S.render();showToast('Saved (40%)','success');};
S.renderFieldPlacement=function(f){var regs=Object.keys(tzData).sort(),dist=f.fieldRegion&&tzData[f.fieldRegion]?tzData[f.fieldRegion]:[];var h='<form onsubmit="app.saveFieldPlacement(event)"><h3>Field Placement (20%)</h3>';if(f.status&&f.status!=='not_submitted')h+='<div style="margin-bottom:8px"><strong>Status:</strong> <span class="badge badge-'+(f.status==='verified'?'success':'warning')+'">'+f.status+'</span></div>';h+='<div class="grid grid-2"><div class="form-group"><label>Region</label><select id="fpRegion" onchange="app.updateFpDistricts()" required><option value="">Select</option>'+regs.map(function(r){return'<option value="'+r+'" '+(f.fieldRegion===r?'selected':'')+'>'+r+'</option>';}).join('')+'</select></div><div class="form-group"><label>District</label><select id="fpDistrict" required><option value="">Select</option>'+dist.map(function(d){return'<option value="'+d+'" '+(f.fieldDistrict===d?'selected':'')+'>'+d+'</option>';}).join('')+'</select></div></div><div class="form-group"><label>Institution</label><input type="text" id="fpInstitution" value="'+(f.institution||'')+'" required></div><div class="grid grid-2"><div class="form-group"><label>Start</label><input type="date" id="fpStartDate" value="'+(f.startDate||'')+'" required></div><div class="form-group"><label>End</label><input type="date" id="fpEndDate" value="'+(f.endDate||'')+'" required></div></div><div class="sticky-bottom" style="display:flex;gap:8px"><button type="button" class="btn btn-outline btn-lg" onclick="app.setWizardStep(1)" style="flex:1">Back</button><button type="submit" class="btn btn-lg" style="flex:1">Save</button></div></form>';return h;};
S.updateFpDistricts=function(){var r=document.getElementById('fpRegion');if(!r)return;var d=document.getElementById('fpDistrict');if(!d)return;d.innerHTML='<option value="">Select</option>'+(tzData[r.value]||[]).map(function(dd){return'<option value="'+dd+'">'+dd+'</option>';}).join('');};
S.saveFieldPlacement=async function(e){e.preventDefault();var d={studentId:S.user.$id,supervisorId:S.supId||null,fieldRegion:document.getElementById('fpRegion').value,fieldDistrict:document.getElementById('fpDistrict').value,institution:document.getElementById('fpInstitution').value,startDate:document.getElementById('fpStartDate').value,endDate:document.getElementById('fpEndDate').value,status:S.fieldPlacementData.status==='rejected'?'submitted':(S.fieldPlacementData.status||'submitted')};S.loading('Saving...');try{if(S.fieldPlacementData.$id)await safeOp(db.updateDocument(AC.databaseId,AC.collections.fieldPlacements,S.fieldPlacementData.$id,d));else{var r=await safeOp(db.createDocument(AC.databaseId,AC.collections.fieldPlacements,ID.unique(),d));S.fieldPlacementData.$id=r.$id;}Object.assign(S.fieldPlacementData,d);S.hideLoading();S.profileWizardStep=3;S.render();showToast('Saved (60%)','success');}catch(er){S.hideLoading();showToast(er.message,'error');}};
S.renderUnivSupervisor=function(){var ms=S.supervisors.find(function(s){return s.$id===S.supId;});var h='<div><h3>University Supervisor (20%)</h3>';if(ms)h+='<div class="supervisor-card selected"><div style="display:flex;align-items:center;gap:10px">'+S.getAvatar(ms)+'<div><strong>'+ms.fullName+'</strong></div></div></div>';h+='<div class="form-group"><input type="text" id="supervisorSearch" placeholder="Search..." oninput="app.searchSupLive()" value="'+(S.searchQ||'')+'"></div><div style="max-height:250px;overflow-y:auto" id="supervisorList">'+S.renderSupervisorList()+'</div><div class="sticky-bottom" style="display:flex;gap:8px"><button type="button" class="btn btn-outline btn-lg" onclick="app.setWizardStep(2)" style="flex:1">Back</button><button type="button" class="btn btn-lg" onclick="app.setWizardStep(4)" style="flex:1">Continue</button></div></div>';return h;};
S.renderSupervisorList=function(){var f=S.getFilteredSup();if(f.length===0)return'<div class="empty-state"><p>No supervisors</p></div>';return f.map(function(s){var is=S.supId===s.$id;return'<div class="supervisor-card'+(is?' selected':'')+'" onclick="app.requestSupervisor(\''+s.$id+'\')"><div class="flex-between"><div style="display:flex;align-items:center;gap:10px">'+S.getAvatar(s)+'<strong>'+s.fullName+'</strong></div>'+(is?'<span class="badge badge-warning">Requested</span>':'<button class="btn btn-sm">Request</button>')+'</div></div>';}).join('');};
S.getFilteredSup=function(){if(!S.searchQ)return S.supervisors;var q=S.searchQ.toLowerCase();return S.supervisors.filter(function(s){return(s.fullName||'').toLowerCase().indexOf(q)>-1;});};
S.searchSupLive=function(){S.searchQ=document.getElementById('supervisorSearch')?document.getElementById('supervisorSearch').value:'';var l=document.getElementById('supervisorList');if(l)l.innerHTML=S.renderSupervisorList();};
S.requestSupervisor=async function(sid){if(!confirm('Request this supervisor?'))return;S.loading('Sending...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,S.user.$id,{supervisorId:sid,supervisorStatus:'pending'}));S.supId=sid;S.hideLoading();S.render();showToast('Request sent (80%)','success');await S.notify(sid,'Supervisor Request',S.user.fullName+' requested you as supervisor.','supervisor_request');}catch(er){S.hideLoading();showToast(er.message,'error');}};
S.renderFieldSupervisor=function(f){return'<form onsubmit="app.saveFieldSupervisor(event)"><h3>Field Supervisor (20%)</h3><div class="form-group"><label>Name</label><input type="text" id="fsName" value="'+(f.fieldSupervisorName||'')+'" required></div><div class="grid grid-2"><div class="form-group"><label>Phone</label><input type="tel" id="fsPhone" value="'+(f.fieldSupervisorPhone||'')+'" required></div><div class="form-group"><label>Email</label><input type="email" id="fsEmail" value="'+(f.fieldSupervisorEmail||'')+'"></div></div><div class="sticky-bottom" style="display:flex;gap:8px"><button type="button" class="btn btn-outline btn-lg" onclick="app.setWizardStep(3)" style="flex:1">Back</button><button type="submit" class="btn btn-lg btn-success" style="flex:1">Complete</button></div></form>';};
S.saveFieldSupervisor=async function(e){e.preventDefault();var d={fieldSupervisorName:document.getElementById('fsName').value,fieldSupervisorPhone:document.getElementById('fsPhone').value,fieldSupervisorEmail:document.getElementById('fsEmail').value};S.loading('Saving...');try{if(S.fieldPlacementData.$id)await safeOp(db.updateDocument(AC.databaseId,AC.collections.fieldPlacements,S.fieldPlacementData.$id,d));else{var r=await safeOp(db.createDocument(AC.databaseId,AC.collections.fieldPlacements,ID.unique(),Object.assign({studentId:S.user.$id,supervisorId:S.supId||null,status:'not_submitted'},d)));S.fieldPlacementData.$id=r.$id;}Object.assign(S.fieldPlacementData,d);if(S.user.isFirstLogin){await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,S.user.$id,{isFirstLogin:false}));S.user.isFirstLogin=false;}S.hideLoading();S.showProf=false;S.render();showToast('Profile completed (100%)','success');}catch(er){S.hideLoading();showToast(er.message,'error');}};
S.saveProfileToDB=async function(){var p=S.profileData,c=S.calcProfileCompletion(),d={userId:S.user.$id,gender:p.gender||null,dateOfBirth:p.dateOfBirth||null,profilePhotoId:p.profilePhotoId||null,institution:p.institution||null,programme:p.programme||null,yearOfStudy:p.yearOfStudy||null,semester:p.semester||null,completionPercentage:c};try{var ex=await safeOp(db.listDocuments(AC.databaseId,AC.collections.profiles,[Q.equal('userId',S.user.$id)]));if(ex.documents.length>0)await safeOp(db.updateDocument(AC.databaseId,AC.collections.profiles,ex.documents[0].$id,d));else await safeOp(db.createDocument(AC.databaseId,AC.collections.profiles,ID.unique(),d));}catch(er){}};

/* ====== QUICK REFERENCE FUNCTIONS ====== */
S.approveSupervisorAssignment=async function(sid){S.loading('Approving...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,sid,{supervisorStatus:'approved'}));S.hideLoading();await S.loadData(true);S.render();showToast('Approved','success');var s=S.allUsers.find(function(u){return u.$id===sid;});if(s){await S.notify(sid,'Supervisor Approved','Your supervisor assignment has been approved.','supervisor_approved');}}catch(er){S.hideLoading();showToast(er.message,'error');}};
S.rejectSupervisorAssignment=async function(sid){S.loading('Rejecting...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,sid,{supervisorId:null,supervisorStatus:null}));S.hideLoading();await S.loadData(true);S.render();showToast('Rejected','success');}catch(er){S.hideLoading();showToast(er.message,'error');}};
S.approveAllSupervisorAssignments=async function(){var p=S.allUsers.filter(function(u){return u.role==='student'&&u.supervisorStatus==='pending';});if(p.length===0){showToast('No pending','warning');return;}if(!confirm('Approve all '+p.length+'?'))return;S.loading('Approving...');var d=0;for(var i=0;i<p.length;i++){try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,p[i].$id,{supervisorStatus:'approved'}));d++;}catch(e){}}S.hideLoading();await S.loadData(true);S.render();showToast(d+' approved','success');};
S.verifyFieldPlacement=async function(fpid,action){var r='';if(action==='reject'){r=prompt('Reason:');if(!r)return;}S.loading('Processing...');try{var d={status:action==='verify'?'verified':'rejected',verifiedBy:S.user.$id,verifiedAt:new Date().toISOString()};if(action==='reject')d.rejectionReason=r;await safeOp(db.updateDocument(AC.databaseId,AC.collections.fieldPlacements,fpid,d));S.hideLoading();await S.loadVerifications();S.render();showToast(action==='verify'?'Verified':'Rejected','success');}catch(er){S.hideLoading();showToast(er.message,'error');}};
S.navSearch=function(q){var rc=document.getElementById('navSearchResults');if(!rc)return;q=q.toLowerCase().trim();if(q.length<2){rc.innerHTML='<div style="padding:14px;text-align:center;color:#94a3b8;font-size:0.75rem">Type 2+ chars</div>';rc.classList.add('active');return;}var r=[];var u=S.allUsers;if(S.role==='university_supervisor')u=S.allUsers.filter(function(x){return x.role==='student'&&x.supervisorId===S.user.$id;});u.forEach(function(x){if((x.fullName||'').toLowerCase().includes(q)||(x.registrationNumber||'').toLowerCase().includes(q))r.push({id:x.$id,name:x.fullName,sub:x.registrationNumber,role:x.role});});rc.innerHTML=r.length===0?'<div style="padding:14px;text-align:center;color:#94a3b8;font-size:0.75rem">No results</div>':r.slice(0,10).map(function(x){return'<div class="nav-search-result" onclick="app.selectNavSearchResult(\''+x.id+'\')"><div class="avatar-sm" style="background:rgba(30,64,175,0.08);color:var(--p)"><i class="fas fa-user"></i></div><div><div style="font-weight:600;font-size:0.8rem">'+x.name+'</div><div style="font-size:0.68rem;color:#64748b">'+x.sub+' | '+x.role+'</div></div></div>';}).join('');rc.classList.add('active');};
S.showNavSearchResults=function(){var rc=document.getElementById('navSearchResults');var inp=document.getElementById('navSearchInput');if(rc&&inp&&inp.value.trim().length>=2)rc.classList.add('active');};
S.hideNavSearchResults=function(){var rc=document.getElementById('navSearchResults');if(rc)rc.classList.remove('active');};
S.selectNavSearchResult=function(id){var inp=document.getElementById('navSearchInput');if(inp)inp.value='';var rc=document.getElementById('navSearchResults');if(rc){rc.classList.remove('active');rc.innerHTML='';}S.viewUserDetails(id);};
S.renderSettings=function(){var h='<div class="glass-card"><div class="flex-between"><h2>Settings</h2><button class="close-btn" onclick="app.goDash()"><i class="fas fa-times"></i></button></div><div class="responsive-table"><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody>';S.allUsers.slice(0,30).forEach(function(u){h+='<tr><td><div style="display:flex;align-items:center;gap:6px">'+S.getAvatar(u,'sm')+'<strong>'+u.fullName+'</strong></div></td><td style="font-size:0.75rem">'+u.email+'</td><td><span class="badge badge-info">'+u.role+'</span></td><td><span class="badge '+(u.accountStatus==='active'?'badge-success':'badge-danger')+'">'+u.accountStatus+'</span></td><td><button class="btn btn-sm btn-outline" onclick="app.viewUserDetails(\''+u.$id+'\')">View</button> <button class="btn btn-sm btn-outline" onclick="app.toggleUserStatus(\''+u.$id+'\',\''+u.accountStatus+'\')">'+(u.accountStatus==='active'?'Disable':'Activate')+'</button> <button class="btn btn-sm btn-purple" onclick="app.changeUserRole(\''+u.$id+'\',\''+u.role+'\')">Role</button> <button class="btn btn-sm btn-warning" onclick="app.adminSendTempPassword(\''+u.$id+'\',\''+(u.fullName||'').replace(/'/g,"\\'")+'\')">Pwd</button></td></tr>';});h+='</tbody></table></div></div>';return h;};
S.toggleUserStatus=async function(uid,cs){var ns=cs==='active'?'disabled':'active';if(!confirm('Change to '+ns+'?'))return;try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,uid,{accountStatus:ns}));showToast('User '+ns,'success');S.loadData(true);S.render();}catch(e){showToast(e.message,'error');}};

S.handleLogin=async function(e){e.preventDefault();var rn=document.getElementById('loginRegNo').value.trim(),pw=document.getElementById('loginPassword').value;if(!rn||!pw){showToast('Fill all fields','error');return;}var btn=document.getElementById('loginBtn');if(btn){btn.disabled=true;btn.innerHTML='Signing in...';}try{var users=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('registrationNumber',rn)]));var u=users.documents.length?users.documents[0]:null;if(S.isUserLockedOut(u,rn)){showToast('Account locked','error');if(btn){btn.disabled=false;btn.innerHTML='Sign In';}return;}if(!u){await S.recordFailedAttempt(null,rn);showToast('Invalid credentials','error');if(btn){btn.disabled=false;btn.innerHTML='Sign In';}return;}if(u.accountStatus==='disabled'){showToast('Account disabled','error');if(btn){btn.disabled=false;btn.innerHTML='Sign In';}return;}try{await safeOp(account.createEmailSession(u.email,pw));}catch(le2){var fr=await S.recordFailedAttempt(u,rn);showToast(fr.isLocked?'Locked':'Invalid','error');if(btn){btn.disabled=false;btn.innerHTML='Sign In';}return;}if(u.mustChangePassword){if(u.tempPasswordExpiry&&new Date(u.tempPasswordExpiry)<new Date()){try{await account.deleteSession('current');}catch(de){}showToast('Temp password expired','error');if(btn){btn.disabled=false;btn.innerHTML='Sign In';}return;}S.user=u;S.role=u.role;S.showChangePwdPrompt(u);return;}await S.resetLoginAttempts(u,rn);await S.checkSession();showToast('Welcome, '+u.fullName,'success');}catch(er){showToast('Login failed','error');if(btn){btn.disabled=false;btn.innerHTML='Sign In';}}};
S.handleRegister=async function(e){e.preventDefault();var pw=document.getElementById('regPassword').value;if(pw!==document.getElementById('regConfirmPassword').value){showToast('Passwords mismatch','error');return;}if(pw.length<8){showToast('Min 8 chars','error');return;}var btn=document.getElementById('regBtn');if(btn){btn.disabled=true;btn.innerHTML='Creating...';}try{var em=document.getElementById('regEmail').value.trim(),rn=document.getElementById('regRegNo').value.trim(),nm=document.getElementById('regFullName').value.trim(),ph=document.getElementById('regPhone').value.trim();var ex=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('registrationNumber',rn)]));if(ex.documents.length>0){showToast('Reg No exists','error');btn.disabled=false;btn.innerHTML='Create Account';return;}var newAcc=await safeOp(account.create(ID.unique(),em,pw,nm));await safeOp(db.createDocument(AC.databaseId,AC.collections.users,newAcc.$id,{fullName:nm,registrationNumber:rn,email:em,phone:ph,role:'student',supervisorId:null,accountStatus:'active',isFirstLogin:true,createdAt:new Date().toISOString()}));await safeOp(account.createEmailSession(em,pw));await S.checkSession();showToast('Welcome, '+nm,'success');}catch(er){showToast(er.message,'error');btn.disabled=false;btn.innerHTML='Create Account';}};
S.handleForgot=async function(e){e.preventDefault();var rn=document.getElementById('forgotRegNo').value.trim(),em=document.getElementById('forgotEmail').value.trim();if(!rn||!em){showToast('Fill all fields','error');return;}var btn=document.getElementById('forgotBtn');if(btn){btn.disabled=true;btn.innerHTML='Submitting...';}try{var users=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('email',em),Q.equal('registrationNumber',rn)]));if(!users.documents.length){showToast('No account found','error');btn.disabled=false;btn.innerHTML='Send Request';return;}var u=users.documents[0];await safeOp(db.createDocument(AC.databaseId,AC.collections.recoveryRequests,ID.unique(),{userId:u.$id,regNo:rn,email:em,fullName:u.fullName||'Unknown',status:'pending',createdAt:new Date().toISOString()}));document.getElementById('recoverySection').classList.remove('hidden');showToast('Request sent!','success');}catch(er){showToast('Error','error');}finally{if(btn){btn.disabled=false;btn.innerHTML='Send Request';}}};
S.adminSendTempPassword=async function(uid,name){if(!confirm('Generate temp password (12345678) for '+name+'?'))return;S.loading('Generating...');try{try{await safeOp(functions.createExecution(AC.functions.resetPassword,JSON.stringify({action:'adminGenerateTempPassword',userId:uid,newPassword:'12345678'}),false),12000);}catch(funcErr){}try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,uid,{mustChangePassword:true,tempPasswordCreatedAt:new Date().toISOString(),tempPasswordExpiry:new Date(Date.now()+30*60*1000).toISOString(),passwordResetBy:S.user.$id}));}catch(dbErr){}S.hideLoading();var popup=document.createElement('div');popup.className='popup-overlay';popup.innerHTML='<div class="popup-card"><i class="fas fa-key" style="font-size:3rem;color:#b45309"></i><h2>Temporary Password</h2><p>For: <strong>'+name+'</strong></p><div style="background:#1e293b;border:2px solid #b45309;border-radius:12px;padding:15px;margin:12px 0"><code style="font-size:2rem;font-weight:700;color:#b45309">12345678</code></div><button class="btn btn-lg" style="width:100%" onclick="navigator.clipboard.writeText(\'12345678\');this.innerHTML=\'Copied!\'">Copy</button><button class="btn btn-sm" style="width:100%;margin-top:8px" onclick="this.closest(\'.popup-overlay\').remove()">Close</button></div>';document.body.appendChild(popup);popup.onclick=function(e){if(e.target===popup)popup.remove();};showToast('Password generated','success');}catch(er){S.hideLoading();showToast('Error','error');}};
S.completePasswordChange=async function(uid,email){var tp=document.getElementById('changeTempPwd').value,np=document.getElementById('changeNewPwd').value,cp=document.getElementById('changeConfPwd').value,er=document.getElementById('changePwdError'),btn=document.getElementById('changePwdBtn');er.style.display='none';if(!tp||!np||!cp){er.textContent='All fields required';er.style.display='block';return;}if(np!==cp){er.textContent='Passwords do not match';er.style.display='block';return;}if(np.length<8){er.textContent='Min 8 characters';er.style.display='block';return;}if(btn){btn.disabled=true;btn.innerHTML='Updating...';}try{await safeOp(account.updatePassword(np,tp));try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,uid,{mustChangePassword:false,tempPasswordCreatedAt:null,tempPasswordExpiry:null}));}catch(dbErr){}try{await account.deleteSessions();}catch(e){}await safeOp(account.createEmailSession(email,np));showToast('Password updated!','success');await S.checkSession();}catch(e){if(btn){btn.disabled=false;btn.innerHTML='Save New Password';}er.textContent='Failed';er.style.display='block';}};
S.showChangePwdPrompt=function(u){var mc=document.getElementById('mainContent');mc.innerHTML='<div class="auth-wrapper"><div class="auth-container"><div class="auth-card"><div style="text-align:center;margin-bottom:20px"><i class="fas fa-lock" style="font-size:3rem;color:#b45309"></i><h1 style="color:#b45309;font-size:1.3rem">Create New Password</h1></div><p style="text-align:center;font-weight:600">'+u.fullName+'</p><p style="font-size:0.8rem;color:#64748b;text-align:center;margin-bottom:16px">Create a new password to continue.</p><div class="form-group"><label>Temporary Password</label><div class="password-wrapper"><input type="password" id="changeTempPwd" required><button type="button" class="password-toggle" onclick="togglePassword(\'changeTempPwd\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>New Password (min 8 chars)</label><div class="password-wrapper"><input type="password" id="changeNewPwd" minlength="8" required><button type="button" class="password-toggle" onclick="togglePassword(\'changeNewPwd\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm Password</label><div class="password-wrapper"><input type="password" id="changeConfPwd" minlength="8" required><button type="button" class="password-toggle" onclick="togglePassword(\'changeConfPwd\',this)"><i class="fas fa-eye"></i></button></div></div><div id="changePwdError" style="color:#dc2626;font-size:0.8rem;display:none;margin-bottom:12px;padding:10px;background:rgba(220,38,38,0.04);border-radius:8px"></div><button class="btn-auth" id="changePwdBtn" style="background:linear-gradient(135deg,#b45309,#d97706);color:#fff;font-weight:700" onclick="app.completePasswordChange(\''+u.$id+'\',\''+u.email+'\')">Save New Password</button></div></div></div>';};
S.createSup=function(){var h='<div class="modal-content" style="max-width:500px"><div class="modal-header"><h3>Create Supervisor</h3><button class="close-btn" onclick="app.closeMod(\'modalSupervisor\')"><i class="fas fa-times"></i></button></div><form onsubmit="app.saveSup(event)"><div class="form-group"><label>Full Name</label><input type="text" id="supFullName" required></div><div class="form-group"><label>Email</label><input type="email" id="supEmail" required></div><div class="form-group"><label>Phone</label><input type="text" id="supPhone" required></div><div class="grid grid-2"><div class="form-group"><label>Password</label><div class="password-wrapper"><input type="password" id="supPassword" required><button type="button" class="password-toggle" onclick="togglePassword(\'supPassword\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm</label><div class="password-wrapper"><input type="password" id="supConfirmPassword" required><button type="button" class="password-toggle" onclick="togglePassword(\'supConfirmPassword\',this)"><i class="fas fa-eye"></i></button></div></div></div><button type="submit" class="btn btn-lg btn-success" style="width:100%">Create</button></form></div>';S.openMod('modalSupervisor',h);};
S.saveSup=async function(e){e.preventDefault();var sp=document.getElementById('supPassword').value,sc=document.getElementById('supConfirmPassword').value;if(sp!==sc){showToast('Passwords mismatch','error');return;}var se=document.getElementById('supEmail').value.trim(),sn=document.getElementById('supFullName').value.trim(),sph=document.getElementById('supPhone').value.trim(),regNo='SUP-'+Math.floor(10000000+Math.random()*90000000),btn=e.target.querySelector('button'),orig=btn.innerHTML;btn.disabled=true;btn.innerHTML='Creating...';try{var newAcc=await safeOp(account.create(ID.unique(),se,sp,sn));await safeOp(db.createDocument(AC.databaseId,AC.collections.users,newAcc.$id,{fullName:sn,registrationNumber:regNo,email:se,phone:sph,role:'university_supervisor',accountStatus:'active',isFirstLogin:false,createdAt:new Date().toISOString()}));S.hideLoading();S.closeMod('modalSupervisor');await S.loadData(true);S.render();showToast('Supervisor created','success');}catch(er){S.hideLoading();showToast(er.message,'error');}finally{if(btn){btn.disabled=false;btn.innerHTML=orig;}}};
S.openNotifDrawer=function(){var d=document.getElementById('drawer'),o=document.getElementById('overlay');if(!d||!o)return;d.innerHTML='';var hh='<div style="display:flex;justify-content:space-between;align-items:center;padding:14px;border-bottom:1px solid var(--o);background:var(--s)"><h3 style="margin:0;font-size:0.9rem"><i class="fas fa-bell" style="color:var(--p)"></i> Notifications ('+S.notifs.length+')</h3><div style="display:flex;gap:6px"><button class="btn btn-sm btn-outline" onclick="app.markAllNotifsRead()" style="font-size:0.6rem;padding:4px 8px">Read All</button><button class="btn btn-sm btn-danger" onclick="app.deleteAllNotifs()" style="font-size:0.6rem;padding:4px 8px">Clear All</button><button class="close-btn" onclick="closeDrawer()" style="width:28px;height:28px"><i class="fas fa-times"></i></button></div></div>';var bh='<div style="flex:1;overflow-y:auto;padding:8px">';if(S.notifs.length>0){S.notifs.forEach(function(n,i){var ts='';try{var dm=Math.floor((new Date()-new Date(n.createdAt))/60000);ts=dm<1?'Just now':dm<60?dm+'m ago':dm<1440?Math.floor(dm/60)+'h ago':Math.floor(dm/1440)+'d ago';}catch(e){}bh+='<div style="padding:10px 12px;margin-bottom:6px;border-radius:10px;cursor:pointer;'+(n.isRead?'opacity:0.7;border:1px solid var(--o)':'background:rgba(30,64,175,0.04);border:1px solid rgba(30,64,175,0.12)')+'" onclick="app.markNotif(\''+n.$id+'\','+i+')"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="width:28px;height:28px;border-radius:50%;background:rgba(30,64,175,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-'+(n.title.indexOf('Assessment')>-1?'star':n.title.indexOf('Approved')>-1?'circle-check':n.title.indexOf('Rejected')>-1?'circle-xmark':'bell')+'" style="font-size:0.75rem;color:var(--p)"></i></div><div style="flex:1"><div style="font-weight:600;font-size:0.82rem">'+n.title+'</div><div style="font-size:0.74rem;color:#64748b;margin:3px 0">'+n.message+'</div><div style="font-size:0.65rem;color:#94a3b8">'+ts+'</div></div><button class="btn btn-sm btn-danger" onclick="event.stopPropagation();app.deleteSingleNotif(\''+n.$id+'\','+i+')" style="padding:3px 8px;font-size:0.6rem"><i class="fas fa-trash-can"></i></button></div></div>';});}else{bh+='<div class="empty-state"><i class="fas fa-bell-slash" style="font-size:2rem"></i><p>No notifications</p></div>';}bh+='</div>';d.innerHTML=hh+bh;d.classList.add('open');o.classList.add('active');};
S.markAllNotifsRead=async function(){if(S.notifs.length===0)return;try{for(var i=0;i<S.notifs.length;i++){if(!S.notifs[i].isRead){await safeOp(db.updateDocument(AC.databaseId,AC.collections.notifications,S.notifs[i].$id,{isRead:true}));S.notifs[i].isRead=true;}}S.unread=0;S.updateBadge();S.openNotifDrawer();}catch(e){}};
S.deleteAllNotifs=async function(){if(S.notifs.length===0||!confirm('Delete all notifications?'))return;try{for(var i=0;i<S.notifs.length;i++){await safeOp(db.deleteDocument(AC.databaseId,AC.collections.notifications,S.notifs[i].$id));}S.notifs=[];S.unread=0;S.updateBadge();S.openNotifDrawer();}catch(e){}};
S.deleteSingleNotif=async function(id,index){try{await safeOp(db.deleteDocument(AC.databaseId,AC.collections.notifications,id));S.notifs.splice(index,1);S.unread=S.notifs.filter(function(n){return !n.isRead;}).length;S.updateBadge();S.openNotifDrawer();}catch(e){}};
S.markNotif=async function(id,i){try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.notifications,id,{isRead:true}));if(S.notifs[i])S.notifs[i].isRead=true;S.unread=S.notifs.filter(function(n){return !n.isRead;}).length;S.updateBadge();S.openNotifDrawer();}catch(e){}};
S.openChecklist=function(){var PT={"1. Food Hygiene & Safety":["Inspection of meat & carriage facilities","Abattoir hygiene standards inspection","Post mortem carcass inspection","Meat carriage vehicle inspection","Butcheries inspection","Fish carriage vehicle inspection","Food premise registration & licensing","Restaurants & food vendors inspection","Food shops & supermarkets inspection","Cereals harvesting & storage monitoring","Condemned food disposal & certification","Healthcare waste management","Incinerator & waste pit assessment"],"2. Occupational Health & Safety":["Health & safety assessment in manufacturing","Health & safety assessment in health facilities","Health & safety assessment in construction","Health & safety assessment in mining","Health & safety assessment in agriculture","Health & safety assessment in informal garages","Health & safety assessment in carpentry workshops","Health & safety assessment in flour mills","Health & safety assessment in quarrying"],"3. Environmental Health":["Inspection of schools","Inspection of prisons","Inspection of markets","Inspection of bars","Inspection of pombe shops","Inspection of recreational grounds"],"4. Disease Prevention & Control":["Disease management using guidelines","Malaria vector control","Disease surveillance & reporting","Outbreak investigation","Infectious disease case follow-up","Immunization promotion","Vaccine cold chain management","Vaccine ordering & distribution","Immunization sessions & records","Mortuary inspections","Corpse preservation","Cemetery inspection","Unclaimed bodies & exhumation","Port health functions"],"5. Buildings & Land Management":["Land-use survey application","Lighting & ventilation assessment","Building standards adherence","Building plans scrutinization"]};var h='<div class="modal-content" style="max-width:800px"><div class="modal-header"><h3>PT Checklist Reference</h3><button class="close-btn" onclick="app.closeMod(\'modalChecklist\')"><i class="fas fa-times"></i></button></div><div style="max-height:65vh;overflow-y:auto"><p style="font-size:0.7rem;color:#94a3b8;margin-bottom:12px;text-align:center">Reference only - not stored in database</p>';for(var cat in PT){h+='<div style="margin-bottom:14px"><h4 style="background:rgba(30,64,175,0.04);padding:10px 14px;border-radius:10px;font-size:0.82rem;color:var(--p);margin-bottom:6px;border-left:4px solid var(--p)"><i class="fas fa-folder"></i> '+cat+' ('+PT[cat].length+' items)</h4>';PT[cat].forEach(function(item,i){h+='<div style="padding:6px 14px 6px 24px;font-size:0.76rem;color:var(--os);display:flex;align-items:flex-start;gap:8px"><span style="color:var(--p);font-weight:600;min-width:22px;text-align:right">'+(i+1)+'.</span><span>'+item+'</span></div>';});h+='</div>';}h+='</div></div>';S.openMod('modalChecklist',h);};
S.switchView=function(v){S.view=v;if(!S.user)document.getElementById('mainContent').innerHTML='';S.render();};
S.toggleDark=function(){S.dark=!S.dark;document.body.classList.toggle('dark');localStorage.setItem('darkMode',S.dark);};
S.logout=async function(){try{await account.deleteSession('current');}catch(e){}S.reset();S.hideAll();document.getElementById('mainContent').innerHTML='';var ps=document.querySelectorAll('.popup-overlay');ps.forEach(function(p){p.remove();});S.view='login';S.loadingInitial=false;S.render();showToast('Logged out','success');};
S.updateTop=function(){var ud=document.getElementById('userNameDisplay');if(S.user&&ud)ud.textContent=(S.user.fullName||'').split(' ')[0]||'User';S.updateBadge();};
S.updateBadge=function(){var b=document.getElementById('notifBadge');if(b){if(S.unread>0){b.textContent=S.unread>99?'99+':S.unread;b.classList.add('show');b.style.display='inline-block';}else{b.textContent='0';b.classList.remove('show');b.style.display='none';}}};
S.resetLoginAttempts=async function(u,rn){if(rn){var k=rn.toLowerCase().trim();delete S.loginAttempts[k];localStorage.setItem('has_login_attempts',JSON.stringify(S.loginAttempts));}if(u&&(u.failedLoginAttempts||u.lockoutUntil)){try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,u.$id,{failedLoginAttempts:0,lockoutUntil:null}));}catch(e){}}};
}

function togglePassword(id,btn){var i=document.getElementById(id);if(!i)return;var ic=btn.querySelector('i');if(i.type==='password'){i.type='text';if(ic){ic.classList.remove('fa-eye');ic.classList.add('fa-eye-slash');}}else{i.type='password';if(ic){ic.classList.remove('fa-eye-slash');ic.classList.add('fa-eye');}}}
function closeDrawer(){var d=document.getElementById('drawer');var o=document.getElementById('overlay');if(d){d.classList.remove('open');d.innerHTML='';}if(o)o.classList.remove('active');if(window.app)window.app.updateBadge();}
var app=new AppState();window.app=app;window.closeDrawer=closeDrawer;window.togglePassword=togglePassword;window.installPWA=installPWA;
app.init();
</script>
</body>
</html>
