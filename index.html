S.openUSign=function(eid){S.sigId=eid;var sig=S.user.signature;var h='<div class="modal-content" style="max-width:450px"><div class="modal-header"><h3>Approve & Sign</h3><button class="close-btn" onclick="app.closeMod(\'modalSignature\')"><i class="fas fa-times"></i></button></div>'+(sig?'<div style="border:1px solid var(--o);border-radius:10px;padding:8px;text-align:center;background:#f8fafc"><img src="'+sig+'" style="max-height:100px"></div>':'<p style="color:var(--e);font-size:0.8rem">No saved signature found. Please log out and back in to set one up.</p>')+'<div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-sm btn-outline" style="flex:1" onclick="app.closeMod(\'modalSignature\')">Cancel</button><button class="btn btn-sm btn-success" style="flex:2" onclick="app.saveUSign()">Approve & Sign</button></div></div>';S.openMod('modalSignature',h)};
S.openUSReject=function(eid){S.sigId=eid;var h='<div class="modal-content" style="max-width:450px"><div class="modal-header"><h3>Reject Entry</h3><button class="close-btn" onclick="app.closeMod(\'modalSignature\')"><i class="fas fa-times"></i></button></div><div class="form-group"><label>Reason for rejection (required)</label><textarea id="usRejectComment" rows="4" required></textarea></div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-sm btn-outline" style="flex:1" onclick="app.closeMod(\'modalSignature\')">Cancel</button><button class="btn btn-sm btn-danger" style="flex:1" onclick="app.saveUSReject()">Reject</button></div></div>';S.openMod('modalSignature',h)};
S.initSig=function(c){S.sigCanvas=document.getElementById('sigCanvas');if(!S.sigCanvas)return;S.sigCtx=S.sigCanvas.getContext('2d');S.sigCtx.strokeStyle=c||'#1e40af';S.sigCtx.lineWidth=2;S.sigCtx.lineCap='round';var d=false;var gp=function(e){var r=S.sigCanvas.getBoundingClientRect();return{x:(e.clientX||(e.touches&&e.touches[0].clientX))-r.left,y:(e.clientY||(e.touches&&e.touches[0].clientY))-r.top}};S.sigCanvas.onmousedown=S.sigCanvas.ontouchstart=function(e){e.preventDefault();d=true;var p=gp(e);S.sigCtx.beginPath();S.sigCtx.moveTo(p.x,p.y)};S.sigCanvas.onmousemove=S.sigCanvas.ontouchmove=function(e){if(!d)return;e.preventDefault();var p=gp(e);S.sigCtx.lineTo(p.x,p.y);S.sigCtx.stroke()};S.sigCanvas.onmouseup=S.sigCanvas.ontouchend=S.sigCanvas.onmouseleave=function(){d=false}};
S.clearSig=function(){if(S.sigCtx&&S.sigCanvas)S.sigCtx.clearRect(0,0,S.sigCanvas.width,S.sigCanvas.height)};
S.saveFSign=async function(){if(!S.sigId||!S.user.signature){showToast('No saved signature found','error');return}var entry=S.entries.find(function(e){return e.$id===S.sigId});var commentEl=document.getElementById('fsApproveComment'),comment=commentEl?commentEl.value.trim():'';S.loading('Verifying...');try{var fsUpd=S.mergeMeta(entry,{fieldSupervisorStatus:'verified',fieldSupervisorSignature:S.user.signature,fieldSupervisorComment:comment||null,fieldSupervisorRejectComment:null,fieldSupervisorReviewedAt:new Date().toISOString(),isEdited:false});await safeOp(db.updateDocument(AC.databaseId,AC.collections.logbookEntries,S.sigId,fsUpd));S.closeMod('modalSignature');S.sigId=null;S.hideLoading();showToast('Verified!','success');if(entry&&entry.supervisorId)await S.notify(entry.supervisorId,'Entry Verified',(S.user.fullName||'Field Supervisor')+' verified an entry for '+(entry.activityTitle||'a student')+' — ready for your review.','field_verified').catch(function(){});await S.loadFieldSupervisorData();S.render()}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};
S.saveFSReject=async function(){if(!S.sigId){showToast('Something went wrong, please try again','error');return}var commentEl=document.getElementById('fsRejectComment'),comment=commentEl?commentEl.value.trim():'';if(!comment){showToast('Please provide a reason for rejection','error');return}var entry=S.entries.find(function(e){return e.$id===S.sigId});S.loading('Rejecting...');try{var fsRUpd=S.mergeMeta(entry,{fieldSupervisorStatus:'rejected',fieldSupervisorRejectComment:comment,fieldSupervisorReviewedAt:new Date().toISOString()});await safeOp(db.updateDocument(AC.databaseId,AC.collections.logbookEntries,S.sigId,fsRUpd));S.closeMod('modalSignature');S.sigId=null;S.hideLoading();showToast('Entry rejected','success');if(entry)await S.notify(entry.studentId,'Entry Rejected','Your Field Supervisor rejected your entry "'+(entry.activityTitle||'')+'": '+comment,'field_rejected').catch(function(){});await S.loadFieldSupervisorData();S.render()}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};
S.saveUSign=async function(){if(!S.sigId||!S.user.signature){showToast('No saved signature found','error');return}var entry=S.entries.find(function(e){return e.$id===S.sigId});S.loading('Approving...');try{var usUpd=S.mergeMeta(entry,{status:'Approved',supervisorSignature:S.user.signature,universitySupervisorRejectComment:null,reviewedAt:new Date().toISOString(),isEdited:false});await safeOp(db.updateDocument(AC.databaseId,AC.collections.logbookEntries,S.sigId,usUpd));S.closeMod('modalSignature');S.sigId=null;S.hideLoading();showToast('Approved!','success');if(entry){await S.notify(entry.studentId,'Entry Approved','Your entry "'+(entry.activityTitle||'')+'" has been approved.','entry_approved').catch(function(){});if(entry.fieldSupervisorId)await S.notify(entry.fieldSupervisorId,'Entry Approved','University Supervisor approved the entry "'+(entry.activityTitle||'')+'" for '+(S.allUsers.find(function(u){return u.$id===entry.studentId})||{}).fullName+'.','entry_approved').catch(function(){})}await S.loadSupervisorData();S.render()}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};
S.saveUSReject=async function(){if(!S.sigId){showToast('Something went wrong, please try again','error');return}var commentEl=document.getElementById('usRejectComment'),comment=commentEl?commentEl.value.trim():'';if(!comment){showToast('Please provide a reason for rejection','error');return}var entry=S.entries.find(function(e){return e.$id===S.sigId});S.loading('Rejecting...');try{var usRUpd=S.mergeMeta(entry,{status:'Rejected',universitySupervisorRejectComment:comment,reviewedAt:new Date().toISOString()});await safeOp(db.updateDocument(AC.databaseId,AC.collections.logbookEntries,S.sigId,usRUpd));S.closeMod('modalSignature');S.sigId=null;S.hideLoading();showToast('Entry rejected','success');if(entry){await S.notify(entry.studentId,'Entry Rejected','Your University Supervisor rejected your entry "'+(entry.activityTitle||'')+'": '+comment,'supervisor_rejected').catch(function(){});if(entry.fieldSupervisorId)await S.notify(entry.fieldSupervisorId,'Entry Rejected','University Supervisor rejected an entry you verified: "'+(entry.activityTitle||'')+'" — '+comment,'supervisor_rejected').catch(function(){})}await S.loadSupervisorData();S.render()}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};

// ===== ASSESSMENTS =====
S.calculateGrade=function(m){m=parseInt(m)||0;if(m>=70)return{grade:'A',cssClass:'grade-a'};if(m>=60)return{grade:'B+',cssClass:'grade-bplus'};if(m>=50)return{grade:'B',cssClass:'grade-b'};if(m>=40)return{grade:'C',cssClass:'grade-c'};return{grade:'Supplementary',cssClass:'grade-supp'}};
S.findAssessmentRecord=async function(sid,title){try{var norm=function(s){return String(s||'').trim().toLowerCase()};var tnorm=norm(title);var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.assessments,[Q.equal('studentId',sid),Q.limit(100)]));var match=r.documents.find(function(a){return !a.isDeleted&&norm(a.title)===tnorm});return match||null}catch(e){return null}};
S.toggleBulkAll=function(prefix,checked,count){for(var i=0;i<count;i++){var el=document.getElementById(prefix+i);if(el)el.checked=checked}};
S.renderAssessments=function(){var h='<div class="glass-card"><div class="flex-between"><h2>Assessments</h2><button class="close-btn" onclick="app.goDash()"><i class="fas fa-times"></i></button></div>';if(S.role==='university_supervisor'){h+='<div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-lg btn-purple" style="flex:1" onclick="app.openAddAssessment()"><i class="fas fa-user"></i> One Student</button><button class="btn btn-lg btn-purple" style="flex:1" onclick="app.openBulkAssessment()"><i class="fas fa-users"></i> Bulk Marks</button></div>'}if(S.role==='field_supervisor'){h+='<div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-lg btn-fs" style="flex:1" onclick="app.openFieldAssessment()"><i class="fas fa-user"></i> One Student</button><button class="btn btn-lg btn-fs" style="flex:1" onclick="app.openBulkFieldAssessment()"><i class="fas fa-users"></i> Bulk Marks</button></div>'}if(!S.assessments||S.assessments.length===0){h+='<div class="empty-state"><p>No assessments</p></div>'}else{S.assessments.forEach(function(a){var g=S.calculateGrade(a.totalMarks);h+='<div class="assessment-card"><div class="flex-between"><div><strong>'+(a.title||'Assessment')+'</strong><div style="font-size:0.7rem">'+new Date(a.createdAt).toLocaleDateString()+'</div></div><div><span class="grade-badge '+g.cssClass+'">'+g.grade+(a.uniDone?'':' (provisional)')+'</span><div style="font-size:0.7rem">'+a.totalMarks+'/100</div></div></div><div style="font-size:0.7rem">Field: '+(a.fieldDone?(a.fieldMarks||0)+'/100':'Pending')+' | Uni: '+(a.uniDone?(a.uniMarks||0)+'/100':'Pending')+'</div></div>';});}h+='</div>';return h};

// ----- shared merge logic (single record per student+title, filled in by field sup then uni sup) -----
S.applyFieldMarks=async function(sid,title,fm){var ea=await S.findAssessmentRecord(sid,title);var um=ea?(ea.uniMarks||0):0,uniDone=ea?!!ea.uniDone:false;var tm=uniDone?Math.round((fm+um)/2):fm;var g=S.calculateGrade(tm);var stu=S.allUsers.find(function(u){return u.$id===sid});if(ea){await safeOp(db.updateDocument(AC.databaseId,AC.collections.assessments,ea.$id,{fieldMarks:fm,fieldDone:true,totalMarks:tm,grade:g.grade,fieldSupervisorId:S.user.$id}))}else{await safeOp(db.createDocument(AC.databaseId,AC.collections.assessments,ID.unique(),{studentId:sid,supervisorId:(stu&&stu.supervisorId)||null,fieldSupervisorId:S.user.$id,title:title,fieldMarks:fm,fieldDone:true,uniMarks:0,uniDone:false,totalMarks:tm,grade:g.grade,isDeleted:false,createdAt:new Date().toISOString()}))}try{if(stu&&stu.supervisorId){await S.notify(stu.supervisorId,'Field Marks Submitted','Field marks submitted for '+(stu.fullName||'student')+' ('+title+'). You can now add your marks.','field_marks_submitted').catch(function(){})}}catch(notifErr){}};
S.applyUniMarks=async function(sid,title,um){var ea=await S.findAssessmentRecord(sid,title);if(!ea||!ea.fieldDone)return{blocked:true};var fm=ea.fieldMarks||0;var tm=Math.round((fm+um)/2);var g=S.calculateGrade(tm);await safeOp(db.updateDocument(AC.databaseId,AC.collections.assessments,ea.$id,{uniMarks:um,uniDone:true,totalMarks:tm,grade:g.grade,supervisorId:S.user.$id}));await S.notify(sid,'Assessment Marks Sent',title+': '+tm+'/100 - Grade '+g.grade,'assessment_marks').catch(function(){});return{blocked:false,total:tm,grade:g.grade}};

// ----- field supervisor: one student -----
S.openFieldAssessment=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.fieldSupervisorId===S.user.$id});var h='<div class="modal-content" style="max-width:600px"><div class="modal-header"><h3>Field Marks</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><form onsubmit="app.saveFieldMarks(event)"><div class="form-group"><label>Student</label><select id="fieldAssessStudentId" required><option value="">Select...</option>';st.forEach(function(s){h+='<option value="'+s.$id+'">'+s.fullName+'</option>'});h+='</select></div><div class="form-group"><label>Title</label><input type="text" id="fieldAssessTitle" required></div><div class="form-group"><label>Field Marks (0-100)</label><input type="number" id="fieldAssessMarks" min="0" max="100" required></div><button type="submit" class="btn btn-lg btn-fs" style="width:100%">Save</button></form></div>';S.openMod('modalReviewEntry',h)};
S.saveFieldMarks=async function(e){e.preventDefault();var sid=document.getElementById('fieldAssessStudentId').value,title=document.getElementById('fieldAssessTitle').value.trim(),fm=parseInt(document.getElementById('fieldAssessMarks').value)||0;if(!sid||!title){showToast('Fill fields','error');return}S.loading('Saving...');try{await S.applyFieldMarks(sid,title,fm);S.hideLoading();S.closeMod('modalReviewEntry');await S.loadAssess();S.render();showToast('Field marks saved!','success')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};

// ----- field supervisor: bulk (same marks for many students at once) -----
S.openBulkFieldAssessment=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.fieldSupervisorId===S.user.$id});if(st.length===0){showToast('No students assigned','warning');return}var h='<div class="modal-content" style="max-width:600px"><div class="modal-header"><h3>Bulk Field Marks</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><div class="form-group"><label>Title</label><input type="text" id="bulkFieldTitle" required></div><div class="form-group"><label>Field Marks (0-100) - applied to all selected</label><input type="number" id="bulkFieldMarks" min="0" max="100" required></div><div class="flex-between" style="margin:8px 0"><strong style="font-size:0.75rem">Students ('+st.length+')</strong><label style="font-size:0.72rem"><input type="checkbox" id="bulkFieldSelectAll" checked onclick="app.toggleBulkAll(\'bulkFieldStu_\',this.checked,'+st.length+')"> Select All</label></div><div style="max-height:220px;overflow-y:auto;border:1px solid var(--o);border-radius:8px;padding:6px">'+st.map(function(s,i){return'<label style="display:flex;align-items:center;gap:8px;padding:6px;font-size:0.78rem"><input type="checkbox" id="bulkFieldStu_'+i+'" value="'+s.$id+'" checked> '+s.fullName+'</label>'}).join('')+'</div><button class="btn btn-lg btn-fs" style="width:100%;margin-top:10px" onclick="app.saveBulkFieldMarks('+st.length+')">Save for Selected</button></div>';S.openMod('modalReviewEntry',h)};
S.saveBulkFieldMarks=async function(count){var title=document.getElementById('bulkFieldTitle').value.trim(),fm=parseInt(document.getElementById('bulkFieldMarks').value)||0;if(!title){showToast('Enter title','error');return}var ids=[];for(var i=0;i<count;i++){var el=document.getElementById('bulkFieldStu_'+i);if(el&&el.checked)ids.push(el.value)}if(ids.length===0){showToast('Select at least one student','error');return}S.loading('Saving for '+ids.length+' students...');try{for(var j=0;j<ids.length;j++){await S.applyFieldMarks(ids[j],title,fm)}S.hideLoading();S.closeMod('modalReviewEntry');await S.loadAssess();S.render();showToast('Saved for '+ids.length+' students!','success')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};

// ----- university supervisor: one student -----
S.openAddAssessment=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.supervisorId===S.user.$id});var h='<div class="modal-content" style="max-width:600px"><div class="modal-header"><h3>New Assessment</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><form onsubmit="app.saveAssessment(event)"><div class="form-group"><label>Student</label><select id="assessStudentId" required onchange="app.updateAssessTitleOptions(this.value)"><option value="">Select...</option>';st.forEach(function(s){h+='<option value="'+s.$id+'">'+s.fullName+'</option>'});h+='</select></div><div class="form-group"><label>Title</label><select id="assessTitle" required><option value="">Select a student first</option></select><div id="assessTitleHint" style="font-size:0.7rem;color:#64748b;margin-top:4px"></div></div><div class="form-group"><label>Uni Marks (0-100)</label><input type="number" id="assessUniMarks" min="0" max="100" required></div><button type="submit" class="btn btn-lg btn-purple" style="width:100%">Save & Send</button></form></div>';S.openMod('modalReviewEntry',h)};
S.updateAssessTitleOptions=function(sid){var sel=document.getElementById('assessTitle'),hint=document.getElementById('assessTitleHint');if(!sel)return;var pending=(S.assessments||[]).filter(function(a){return a.studentId===sid&&a.fieldDone&&!a.uniDone});if(!sid){sel.innerHTML='<option value="">Select a student first</option>';if(hint)hint.textContent='';return}if(pending.length===0){sel.innerHTML='<option value="">No pending field marks for this student</option>';if(hint)hint.textContent='The Field Supervisor has not submitted marks for this student yet.'}else{sel.innerHTML='<option value="">Select assessment...</option>'+pending.map(function(a){return '<option value="'+a.title.replace(/"/g,'&quot;')+'">'+a.title+' — Field: '+(a.fieldMarks||0)+'/100</option>'}).join('');if(hint)hint.textContent=''}};
S.saveAssessment=async function(e){e.preventDefault();var sid=document.getElementById('assessStudentId').value,title=document.getElementById('assessTitle').value.trim(),um=parseInt(document.getElementById('assessUniMarks').value)||0;if(!sid||!title){showToast('Fill fields','error');return}S.loading('Saving...');try{var res=await S.applyUniMarks(sid,title,um);S.hideLoading();if(res.blocked){showToast('Field supervisor has not submitted marks for this student yet','error');return}S.closeMod('modalReviewEntry');await S.loadAssess();S.render();showToast('Marks sent to student!','success')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};

// ----- university supervisor: bulk (same marks for many students at once) -----
S.openBulkAssessment=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.supervisorId===S.user.$id});if(st.length===0){showToast('No students assigned','warning');return}var h='<div class="modal-content" style="max-width:600px"><div class="modal-header"><h3>Bulk Assessment Marks</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><div class="form-group"><label>Title</label><input type="text" id="bulkUniTitle" required></div><div class="form-group"><label>Uni Marks (0-100) - applied to all selected</label><input type="number" id="bulkUniMarks" min="0" max="100" required></div><div class="flex-between" style="margin:8px 0"><strong style="font-size:0.75rem">Students ('+st.length+')</strong><label style="font-size:0.72rem"><input type="checkbox" id="bulkUniSelectAll" checked onclick="app.toggleBulkAll(\'bulkUniStu_\',this.checked,'+st.length+')"> Select All</label></div><div style="max-height:220px;overflow-y:auto;border:1px solid var(--o);border-radius:8px;padding:6px">'+st.map(function(s,i){return'<label style="display:flex;align-items:center;gap:8px;padding:6px;font-size:0.78rem"><input type="checkbox" id="bulkUniStu_'+i+'" value="'+s.$id+'" checked> '+s.fullName+'</label>'}).join('')+'</div><button class="btn btn-lg btn-purple" style="width:100%;margin-top:10px" onclick="app.saveBulkAssessment('+st.length+')">Save & Send to Selected</button></div>';S.openMod('modalReviewEntry',h)};
S.saveBulkAssessment=async function(count){var title=document.getElementById('bulkUniTitle').value.trim(),um=parseInt(document.getElementById('bulkUniMarks').value)||0;if(!title){showToast('Enter title','error');return}var ids=[];for(var i=0;i<count;i++){var el=document.getElementById('bulkUniStu_'+i);if(el&&el.checked)ids.push(el.value)}if(ids.length===0){showToast('Select at least one student','error');return}S.loading('Sending to '+ids.length+' students...');try{var sent=0,blocked=0;for(var j=0;j<ids.length;j++){var res=await S.applyUniMarks(ids[j],title,um);if(res.blocked)blocked++;else sent++}S.hideLoading();S.closeMod('modalReviewEntry');await S.loadAssess();S.render();if(blocked>0)showToast('Sent to '+sent+' student(s). '+blocked+' skipped - field marks not submitted yet.','warning');else showToast('Marks sent to '+sent+' students!','success')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};

// ===== CHECK IN/OUT, EXPORT, TASKS =====
S.checkIn=async function(){if(S.role!=='student')return;var t=new Date().toISOString().split('T')[0];try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.equal('checkInDate',t)]));if(r.documents.length){showToast('Already checked in','warning');return}await safeOp(db.createDocument(AC.databaseId,AC.collections.attendance,ID.unique(),{studentId:S.user.$id,checkInDate:t,checkInTime:new Date().toISOString(),weekNumber:S.week,status:'present'}));showToast('Checked in!','success')}catch(er){showToast(getErrMsg(er),'error')}};
S.checkOut=async function(){if(S.role!=='student')return;var t=new Date().toISOString().split('T')[0];try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.equal('checkInDate',t)]));if(!r.documents.length){showToast('Check in first','warning');return}await safeOp(db.updateDocument(AC.databaseId,AC.collections.attendance,r.documents[0].$id,{checkOutTime:new Date().toISOString()}));showToast('Checked out','success')}catch(er){showToast(getErrMsg(er),'error')}};
S.openExport=function(){S.exportScope=null;S.exportEntryId=null;S.exportWeek=null;var isMgr=(S.role==='department'||S.role==='admin');var h='<div class="modal-content" style="max-width:500px"><div class="modal-header"><h3>Export</h3><button class="close-btn" onclick="app.closeMod(\'modalExport\')"><i class="fas fa-times"></i></button></div><p style="font-size:0.8rem;color:#64748b;margin-bottom:10px">What would you like to export?</p><div style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-lg" onclick="app.exportChooseScope(\'single\')"><i class="fas fa-file"></i> Single Entry</button><button class="btn btn-lg btn-outline" onclick="app.exportChooseScope(\'week\')"><i class="fas fa-calendar-week"></i> Whole Week</button>'+(isMgr?('<button class="btn btn-lg btn-success" onclick="app.exportChooseFormat(\'approved\')"><i class="fas fa-check-double"></i> All Approved Entries</button><button class="btn btn-lg btn-outline" onclick="app.exportChooseFormat(\'all\')"><i class="fas fa-layer-group"></i> All Entries</button>'):'')+'</div></div>';S.openMod('modalExport',h)};
S.exportChooseScope=function(scope){S.exportScope=scope;var e=S.entries||[];var h='<div class="modal-content" style="max-width:500px"><div class="modal-header"><h3>Export — '+(scope==='single'?'Select Entry':'Select Week')+'</h3><button class="close-btn" onclick="app.closeMod(\'modalExport\')"><i class="fas fa-times"></i></button></div>';if(scope==='single'){if(e.length===0){h+='<div class="empty-state"><p>No entries available</p></div></div>';S.openMod('modalExport',h);return}h+='<div class="form-group"><label>Entry</label><select id="exportEntrySelect">'+e.map(function(x){return'<option value="'+x.$id+'">'+new Date(x.entryDate).toLocaleDateString()+' - '+(x.activityTitle||'Untitled')+'</option>'}).join('')+'</select></div>'}else{var weeks=[];e.forEach(function(x){if(x.weekNumber&&weeks.indexOf(x.weekNumber)===-1)weeks.push(x.weekNumber)});weeks.sort(function(a,b){return a-b});if(weeks.length===0){h+='<div class="empty-state"><p>No entries available</p></div></div>';S.openMod('modalExport',h);return}h+='<div class="form-group"><label>Week</label><select id="exportWeekSelect">'+weeks.map(function(w){return'<option value="'+w+'">Week '+w+'</option>'}).join('')+'</select></div>'}h+='<div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-outline" style="flex:1" onclick="app.openExport()">Back</button><button class="btn" style="flex:2" onclick="app.exportChooseFormat()">Continue</button></div></div>';S.openMod('modalExport',h)};
S.exportChooseFormat=function(directScope){if(directScope){S.exportScope=directScope}else if(S.exportScope==='single'){var sel=document.getElementById('exportEntrySelect');S.exportEntryId=sel?sel.value:null}else{var sel=document.getElementById('exportWeekSelect');S.exportWeek=sel?parseInt(sel.value):null}var h='<div class="modal-content" style="max-width:500px"><div class="modal-header"><h3>Export Format</h3><button class="close-btn" onclick="app.closeMod(\'modalExport\')"><i class="fas fa-times"></i></button></div><div style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-lg" onclick="app.exportPDF()">PDF</button><button class="btn btn-lg btn-outline" onclick="app.exportWord()">Word</button><button class="btn btn-lg btn-success" onclick="app.exportExcel()">Excel</button></div></div>';S.openMod('modalExport',h)};
S.getExportEntries=function(){var e=S.entries||[];if(S.exportScope==='single')return e.filter(function(x){return x.$id===S.exportEntryId});if(S.exportScope==='week')return e.filter(function(x){return x.weekNumber===S.exportWeek});if(S.exportScope==='approved')return e.filter(function(x){return x.status==='Approved'});return e};
S.exportPDF=function(){if(typeof window.jspdf==='undefined')return;var list=S.getExportEntries();if(list.length===0){showToast('No entries to export','error');return}var doc=new window.jspdf.jsPDF();var pageW=doc.internal.pageSize.getWidth(),marginX=15,maxW=pageW-marginX*2;list.forEach(function(x,idx){if(idx>0)doc.addPage();var y=20;doc.setFontSize(14);doc.text('FoHS Field System - Logbook Entry',marginX,y);y+=8;doc.setFontSize(10);doc.text('Date: '+new Date(x.entryDate).toLocaleDateString()+'   Week: '+(x.weekNumber||'')+'   Status: '+(x.status||'Draft'),marginX,y);y+=8;var addSection=function(title,content){if(!content)return;if(y>265){doc.addPage();y=20}doc.setFont(undefined,'bold');doc.text(title,marginX,y);y+=5;doc.setFont(undefined,'normal');var lines=doc.splitTextToSize(String(content),maxW);lines.forEach(function(line){if(y>270){doc.addPage();y=20}doc.text(line,marginX,y);y+=5});y+=3};addSection('Activity Title:',x.activityTitle);addSection('Objectives:',x.objectives);addSection('Activities Performed:',x.activitiesPerformed);addSection('Skills Acquired:',x.skillsAcquired);addSection('Challenges Faced:',x.challengesFaced);if(x.fieldSupervisorComment)addSection('Field Supervisor Comment:',x.fieldSupervisorComment);if(x.fieldSupervisorRejectComment)addSection('Field Supervisor Rejection Reason:',x.fieldSupervisorRejectComment);if(x.universitySupervisorRejectComment)addSection('University Supervisor Rejection Reason:',x.universitySupervisorRejectComment);var stu=S.allUsers.find(function(u){return u.$id===x.studentId});var fsp=x.fieldSupervisorId?S.allUsers.find(function(u){return u.$id===x.fieldSupervisorId}):null;var usp=x.supervisorId?S.allUsers.find(function(u){return u.$id===x.supervisorId}):null;var sigY=y+12;if(sigY>230){doc.addPage();sigY=25}doc.setFont(undefined,'bold');doc.setFontSize(10);doc.text('Signatures',marginX,sigY);sigY+=6;doc.setFont(undefined,'normal');var colW=maxW/3,cols=[{title:'STUDENT',person:stu,sig:x.studentSignature,date:x.submittedAt},{title:'FIELD SUPERVISOR',person:fsp,sig:x.fieldSupervisorStatus==='verified'?x.fieldSupervisorSignature:null,date:x.fieldSupervisorReviewedAt},{title:'UNIVERSITY SUPERVISOR',person:usp,sig:x.status==='Approved'?x.supervisorSignature:null,date:x.reviewedAt}];cols.forEach(function(col,ci){var cx=marginX+ci*colW;doc.setFontSize(8);doc.setFont(undefined,'bold');doc.text(col.title,cx,sigY);var innerY=sigY+5;if(col.sig){try{doc.addImage(col.sig,'PNG',cx,innerY,colW-15,22)}catch(e){}innerY+=26}else{doc.setFont(undefined,'italic');doc.setTextColor(180,83,9);doc.text('Pending Approval',cx,innerY+10);doc.setTextColor(0,0,0);innerY+=26}doc.setFont(undefined,'normal');doc.setFontSize(8);doc.text('Name: '+(col.person?col.person.fullName:'N/A'),cx,innerY);innerY+=5;doc.text((col.date?'Date: '+new Date(col.date).toLocaleDateString():'Date: —'),cx,innerY)})});doc.save('logbook_export.pdf');S.closeMod('modalExport')};
S.exportWord=function(){var list=S.getExportEntries();if(list.length===0){showToast('No entries to export','error');return}var html='<html><head><meta charset="UTF-8"></head><body>';html+='<h2>FoHS Field System - Logbook Export</h2>';list.forEach(function(x){html+='<hr><h3>'+(x.activityTitle||'Untitled')+'</h3>';html+='<p><b>Date:</b> '+new Date(x.entryDate).toLocaleDateString()+' &nbsp; <b>Week:</b> '+(x.weekNumber||'')+' &nbsp; <b>Status:</b> '+(x.status||'Draft')+'</p>';if(x.objectives)html+='<p><b>Objectives:</b><br>'+(x.objectives||'').replace(/\n/g,'<br>')+'</p>';if(x.activitiesPerformed)html+='<p><b>Activities Performed:</b><br>'+(x.activitiesPerformed||'').replace(/\n/g,'<br>')+'</p>';if(x.skillsAcquired)html+='<p><b>Skills Acquired:</b><br>'+(x.skillsAcquired||'').replace(/\n/g,'<br>')+'</p>';if(x.challengesFaced)html+='<p><b>Challenges Faced:</b><br>'+(x.challengesFaced||'').replace(/\n/g,'<br>')+'</p>';if(x.fieldSupervisorComment)html+='<p><b>Field Supervisor Comment:</b><br>'+x.fieldSupervisorComment+'</p>';if(x.fieldSupervisorRejectComment)html+='<p><b>Field Supervisor Rejection Reason:</b><br>'+x.fieldSupervisorRejectComment+'</p>';if(x.universitySupervisorRejectComment)html+='<p><b>University Supervisor Rejection Reason:</b><br>'+x.universitySupervisorRejectComment+'</p>';var stuW=S.allUsers.find(function(u){return u.$id===x.studentId});var fspW=x.fieldSupervisorId?S.allUsers.find(function(u){return u.$id===x.fieldSupervisorId}):null;var uspW=x.supervisorId?S.allUsers.find(function(u){return u.$id===x.supervisorId}):null;var sigCellW=function(title,person,sig,date,dateLabel){return '<td style="padding:10px;border:1px solid #cbd5e1;vertical-align:top;width:33%"><p style="font-size:11px;font-weight:bold;color:#334155;margin:0 0 6px 0">'+title+'</p>'+(sig?('<img src="'+sig+'" style="max-height:60px">'):('<p style="color:#b45309;font-style:italic;margin:6px 0">Pending Approval</p>'))+'<p style="margin:6px 0 0 0;font-size:11px">Name: '+(person?person.fullName:'N/A')+'</p><p style="margin:2px 0 0 0;font-size:11px">'+dateLabel+': '+(date?new Date(date).toLocaleDateString():'—')+'</p></td>'};html+='<table style="margin-top:20px;border-collapse:collapse;width:100%"><tr>';html+=sigCellW('STUDENT',stuW,x.studentSignature,x.submittedAt,'Date Submitted');html+=sigCellW('FIELD SUPERVISOR',fspW,x.fieldSupervisorStatus==='verified'?x.fieldSupervisorSignature:null,x.fieldSupervisorReviewedAt,'Approval Date');html+=sigCellW('UNIVERSITY SUPERVISOR',uspW,x.status==='Approved'?x.supervisorSignature:null,x.reviewedAt,'Approval Date');html+='</tr></table>'});html+='<'+'/body></'+'html>';var b=new Blob(['\ufeff',html],{type:'application/msword'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='logbook_export.doc';a.click();S.closeMod('modalExport')};
S.exportExcel=async function(){var list=S.getExportEntries();if(list.length===0){showToast('No entries to export','error');return}if(typeof ExcelJS==='undefined'){showToast('Excel library not loaded, please check your connection','error');return}S.loading('Preparing Excel...');try{var headers=['Name','Reg No','Email','Phone','Date','Week','Activity Title','Objectives','Activities Performed','Skills Acquired','Challenges Faced','Field Supervisor Status','Field Supervisor Comment','Field Supervisor Rejection Reason','University Supervisor Status','University Supervisor Rejection Reason'];var wb=new ExcelJS.Workbook();var ws=wb.addWorksheet('Logbook Entries');ws.addRow(headers);ws.getRow(1).font={bold:true};var maxLens=headers.map(function(h){return h.length});list.forEach(function(x){var stu=(S.allUsers||[]).find(function(u){return u.$id===x.studentId})||{};var row=[stu.fullName||'N/A',stu.registrationNumber||'N/A',stu.email||'N/A',stu.phone||'N/A',new Date(x.entryDate).toLocaleDateString(),x.weekNumber||'',x.activityTitle||'',x.objectives||'',x.activitiesPerformed||'',x.skillsAcquired||'',x.challengesFaced||'',x.fieldSupervisorStatus||'',x.fieldSupervisorComment||'',x.fieldSupervisorRejectComment||'',x.status||'',x.universitySupervisorRejectComment||''];ws.addRow(row);row.forEach(function(v,ci){var len=v==null?0:String(v).length;if(len>maxLens[ci])maxLens[ci]=len})});ws.columns.forEach(function(col,ci){col.width=Math.min(Math.max(maxLens[ci]+2,10),60)});var curRow=ws.rowCount+3;ws.getCell('A'+curRow).value='Signatures';ws.getCell('A'+curRow).font={bold:true,size:13};curRow+=2;var colIdx={A:0,C:2,E:4};var addSigImg=function(sig,colLetter,topRow){if(!sig)return false;var m=String(sig).match(/^data:image\/(png|jpe?g);base64,(.*)$/i);if(!m)return false;try{var ext=m[1].toLowerCase()==='jpg'?'jpeg':m[1].toLowerCase();var imgId=wb.addImage({base64:sig,extension:ext});ws.addImage(imgId,{tl:{col:colIdx[colLetter],row:topRow-1},ext:{width:130,height:55}});return true}catch(e){return false}};list.forEach(function(x){var fsp=x.fieldSupervisorId?(S.allUsers||[]).find(function(u){return u.$id===x.fieldSupervisorId}):null;var usp=x.supervisorId?(S.allUsers||[]).find(function(u){return u.$id===x.supervisorId}):null;var stu=(S.allUsers||[]).find(function(u){return u.$id===x.studentId})||{};ws.getCell('A'+curRow).value=(x.activityTitle||'Entry')+' — '+new Date(x.entryDate).toLocaleDateString();ws.getCell('A'+curRow).font={bold:true};curRow+=1;var headRow=curRow;ws.getCell('A'+headRow).value='STUDENT';ws.getCell('A'+headRow).font={bold:true};ws.getCell('C'+headRow).value='FIELD SUPERVISOR';ws.getCell('C'+headRow).font={bold:true};ws.getCell('E'+headRow).value='UNIVERSITY SUPERVISOR';ws.getCell('E'+headRow).font={bold:true};curRow+=1;var imgRow=curRow;ws.getRow(imgRow).height=60;var fsSig=x.fieldSupervisorStatus==='verified'?x.fieldSupervisorSignature:null;var usSig=x.status==='Approved'?x.supervisorSignature:null;if(!addSigImg(x.studentSignature,'A',imgRow))ws.getCell('A'+imgRow).value='Pending Approval';if(!addSigImg(fsSig,'C',imgRow))ws.getCell('C'+imgRow).value='Pending Approval';if(!addSigImg(usSig,'E',imgRow))ws.getCell('E'+imgRow).value='Pending Approval';curRow+=1;ws.getCell('A'+curRow).value='Name: '+(stu.fullName||'N/A');ws.getCell('C'+curRow).value='Name: '+(fsp?fsp.fullName:'N/A');ws.getCell('E'+curRow).value='Name: '+(usp?usp.fullName:'N/A');curRow+=1;ws.getCell('A'+curRow).value='Date Submitted: '+(x.submittedAt?new Date(x.submittedAt).toLocaleDateString():'—');ws.getCell('C'+curRow).value='Approval Date: '+(x.fieldSupervisorReviewedAt?new Date(x.fieldSupervisorReviewedAt).toLocaleDateString():'—');ws.getCell('E'+curRow).value='Approval Date: '+(x.reviewedAt?new Date(x.reviewedAt).toLocaleDateString():'—');curRow+=2});var buffer=await wb.xlsx.writeBuffer();var blob=new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='logbook_export.xlsx';a.click();S.hideLoading();S.closeMod('modalExport')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error');console.error('exportExcel failed:',er)}};
S.renderTasks=function(){var e=S.entries||[];var h='<div class="glass-card"><div class="flex-between"><h2>'+(S.role==='field_supervisor'?'Verification':'Tasks')+'</h2><button class="close-btn" onclick="app.goDash()"><i class="fas fa-times"></i></button></div>';if(e.length===0){h+='<div class="empty-state"><p>No entries</p></div>'}else{h+='<div class="responsive-table"><table><thead><tr><th>Date</th><th>Activity</th><th>Status</th><th>Actions</th></tr></thead><tbody>';e.forEach(function(x){h+='<tr><td>'+new Date(x.entryDate).toLocaleDateString()+'</td><td>'+x.activityTitle+'</td><td><span class="badge badge-info">'+(x.status||'Draft')+'</span></td><td><button class="btn btn-sm btn-outline" onclick="app.viewEntry(\''+x.$id+'\')">View</button></td></tr>'});h+='</tbody></table></div>'}h+='</div>';return h};

S.REPORT_CHAPTERS=[{key:'cover',title:'Cover Page',icon:'fa-id-card',auto:true},{key:'toc',title:'Table of Contents',icon:'fa-list-ol',auto:true},{key:'ch1',title:'Chapter 1: Introduction',icon:'fa-book-open',auto:false},{key:'ch2',title:'Chapter 2: Objectives',icon:'fa-bullseye',auto:false},{key:'ch3',title:'Chapter 3: Organization Profile',icon:'fa-building',auto:false},{key:'ch4',title:'Chapter 4: Daily Activities',icon:'fa-calendar-days',auto:true},{key:'ch5',title:'Chapter 5: Weekly Summary',icon:'fa-calendar-week',auto:true},{key:'ch6',title:'Chapter 6: Skills Acquired',icon:'fa-screwdriver-wrench',auto:false},{key:'ch7',title:'Chapter 7: Challenges Encountered',icon:'fa-triangle-exclamation',auto:false},{key:'ch8',title:'Chapter 8: Recommendations',icon:'fa-lightbulb',auto:false},{key:'ch9',title:'Chapter 9: Conclusion',icon:'fa-flag-checkered',auto:false},{key:'ch10',title:'Chapter 10: Attendance Summary',icon:'fa-clipboard-check',auto:true},{key:'ch11',title:'Chapter 11: Supervisor Assessment',icon:'fa-star',auto:true},{key:'ch12',title:'Chapter 12: Declaration',icon:'fa-signature',auto:true}];
S.esc=function(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')};
S.escJs=function(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")};
S.stripHTML=function(html){if(!html)return'';var tmp=document.createElement('div');tmp.innerHTML=String(html).replace(/<div>/gi,'\n').replace(/<\/div>/gi,'').replace(/<br\s*\/?>/gi,'\n');var text=tmp.textContent||tmp.innerText||'';return text.replace(/\n{3,}/g,'\n\n').replace(/^\n+/,'').trim()};
S.autoAcademicYear=function(){var d=new Date(),y=d.getFullYear(),m=d.getMonth();return(m>=8?y:y-1)+'/'+(m>=8?y+1:y)};

// ----- load / persist -----
S.loadFinalReport=async function(){try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.finalReports,[Q.equal('studentId',S.user.$id),Q.orderDesc('$createdAt'),Q.limit(1)]));if(r.documents.length>0){var doc=r.documents[0];S.reportDoc=doc;try{S.reportChapters=JSON.parse(doc.chaptersJson||'{}')}catch(e){S.reportChapters={}}S.reportMeta={title:doc.reportTitle||'',academicYear:doc.academicYear||S.autoAcademicYear(),status:doc.status||'draft',version:doc.versionNumber||1,locked:!!doc.locked,supervisorComments:doc.supervisorComments||'',reviewedBy:doc.reviewedBy||null,reviewedAt:doc.reviewedAt||null,submittedAt:doc.submittedAt||null}}else{S.reportDoc=null;S.reportChapters={};S.reportMeta={title:'',academicYear:S.autoAcademicYear(),status:'draft',version:1,locked:false,supervisorComments:'',reviewedBy:null,reviewedAt:null,submittedAt:null}}}catch(e){S.reportDoc=null;S.reportChapters={};S.reportMeta={title:'',academicYear:S.autoAcademicYear(),status:'draft',version:1,locked:false,supervisorComments:'',reviewedBy:null,reviewedAt:null,submittedAt:null}}};
S.reportPersist=async function(){if(!S.user)return;S.reportSaving=true;S.reportUpdateSaveUI();var d={studentId:S.user.$id,reportTitle:S.reportMeta.title||'',academicYear:S.reportMeta.academicYear||'',chaptersJson:JSON.stringify(S.reportChapters||{}),status:S.reportMeta.status||'draft',versionNumber:S.reportMeta.version||1,locked:!!S.reportMeta.locked,isLatest:true,updatedAt:new Date().toISOString()};try{if(S.reportDoc&&S.reportDoc.$id){await safeOp(db.updateDocument(AC.databaseId,AC.collections.finalReports,S.reportDoc.$id,d));Object.assign(S.reportDoc,d)}else{d.createdAt=new Date().toISOString();var r=await safeOp(db.createDocument(AC.databaseId,AC.collections.finalReports,ID.unique(),d));S.reportDoc=r}S.reportSaving=false;S.reportUpdateSaveUI(true)}catch(er){S.reportSaving=false;S.reportUpdateSaveUI(false,true);console.error('reportPersist failed:',er)}};
S.reportAutoSave=function(){if(S.reportSaveTimer)clearTimeout(S.reportSaveTimer);S.reportUpdateSaveUI(null,false,true);S.reportSaveTimer=setTimeout(function(){S.reportPersist()},1200)};
S.reportUpdateSaveUI=function(saved,failed,pending){var el=document.getElementById('reportSaveIndicator');if(!el)return;if(pending){el.className='report-save-indicator';el.style.color='';el.innerHTML='<i class="fas fa-circle"></i> Unsaved changes'}else if(S.reportSaving){el.className='report-save-indicator saving';el.style.color='';el.innerHTML='<i class="fas fa-arrows-rotate"></i> Saving...'}else if(failed){el.className='report-save-indicator';el.style.color='var(--e)';el.innerHTML='<i class="fas fa-triangle-exclamation"></i> Save failed — retrying on next edit'}else if(saved){el.className='report-save-indicator saved';el.style.color='';el.innerHTML='<i class="fas fa-circle-check"></i> Saved'}};

// ----- edit handlers -----
S.reportIsLocked=function(){return !!(S.reportMeta&&S.reportMeta.status&&S.reportMeta.status!=='draft')};
S.reportChapterEdit=function(el){if(S.reportIsLocked())return;var key=el.getAttribute('data-key');if(!key)return;S.reportChapters[key]=el.innerHTML;S.reportAutoSave()};
S.reportMetaEdit=function(el,field){if(S.reportIsLocked())return;S.reportMeta[field]=el.innerText.trim();S.reportAutoSave()};
S.reportTogglePreview=function(){S.reportPreviewMode=!S.reportPreviewMode;S.render()};
S.reportScrollTo=function(key){var idx=S.REPORT_CHAPTERS.findIndex(function(c){return c.key===key});var papers=document.querySelectorAll('.report-paper');if(papers[idx])papers[idx].scrollIntoView({behavior:'smooth',block:'start'})};

S.showFSStudents=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.fieldSupervisorId===S.user.$id});var h='<div class="modal-content" style="max-width:900px"><div class="modal-header"><h3>My Students ('+st.length+')</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div>';if(st.length===0)h+='<div class="empty-state"><p>No students</p></div>';else{h+='<div class="responsive-table"><table><thead><tr><th>Name</th><th>Reg No</th><th>Entries</th><th>Actions</th></tr></thead><tbody>';st.forEach(function(s){h+='<tr><td>'+s.fullName+'</td><td>'+(s.registrationNumber||'N/A')+'</td><td>'+S.entries.filter(function(e){return e.studentId===s.$id}).length+'</td><td><button class="btn btn-sm btn-outline" onclick="app.viewStudentEntries(\''+s.$id+'\')">Entries</button> <button class="btn btn-sm btn-outline" onclick="app.viewStudentProfile(\''+s.$id+'\')">Profile</button></td></tr>'});h+='</tbody></table></div>'}h+='</div>';S.openMod('modalReviewEntry',h)};
S.showUSStudents=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.supervisorId===S.user.$id&&u.supervisorStatus==='approved'});var h='<div class="modal-content" style="max-width:900px"><div class="modal-header"><h3>My Students ('+st.length+')</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div>';if(st.length===0)h+='<div class="empty-state"><p>No students</p></div>';else{h+='<div class="responsive-table"><table><thead><tr><th>Name</th><th>Reg No</th><th>FS</th><th>Actions</th></tr></thead><tbody>';st.forEach(function(s){var fs=S.allUsers.find(function(u){return u.$id===s.fieldSupervisorId});h+='<tr><td>'+s.fullName+'</td><td>'+(s.registrationNumber||'N/A')+'</td><td>'+(fs?fs.fullName:'None')+'</td><td><button class="btn btn-sm btn-outline" onclick="app.viewStudentEntries(\''+s.$id+'\')">Entries</button> <button class="btn btn-sm btn-outline" onclick="app.viewStudentProfile(\''+s.$id+'\')">Profile</button></td></tr>'});h+='</tbody></table></div>'}h+='</div>';S.openMod('modalReviewEntry',h)};
S.showStudentsList=function(){var st=S.allUsers.filter(function(u){return u.role==='student'});var pendCount=st.filter(function(s){return(s.supervisorStatus==='pending')||(s.fieldSupervisorPendingId&&!s.fieldSupervisorId)}).length;var h='<div class="modal-content" style="max-width:1000px"><div class="modal-header"><h3>Students ('+st.length+')</h3><div style="display:flex;gap:6px;align-items:center">'+(pendCount>1?'<button class="btn btn-sm btn-success" onclick="app.approveAllSupRequests()"><i class="fas fa-check-double"></i> Approve All ('+pendCount+')</button>':'')+'<button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div></div><div class="responsive-table"><table><thead><tr><th>Name</th><th>Reg No</th><th>US</th><th>FS</th><th>Actions</th></tr></thead><tbody>';st.forEach(function(s){var sup=S.allUsers.find(function(u){return u.$id===s.supervisorId}),fs=S.allUsers.find(function(u){return u.$id===s.fieldSupervisorId});var fsCell=fs?fs.fullName:(s.fieldSupervisorPendingId?'<span class="badge badge-warning">Awaiting Approval</span>':'<span class="badge badge-warning">None</span>');var pendingAny=(s.supervisorStatus==='pending')||(s.fieldSupervisorPendingId&&!s.fieldSupervisorId);h+='<tr><td>'+s.fullName+'</td><td>'+(s.registrationNumber||'N/A')+'</td><td>'+(sup?sup.fullName:'None')+'</td><td>'+fsCell+'</td><td style="display:flex;gap:4px"><button class="btn btn-sm btn-outline" onclick="app.viewStudentProfile(\''+s.$id+'\')">Profile</button><button class="btn btn-sm btn-outline" onclick="app.viewStudentEntries(\''+s.$id+'\')">Entries</button><button class="btn btn-sm btn-fs" onclick="app.assignFSToStudent(\''+s.$id+'\')">Assign FS</button>'+(pendingAny?'<button class="btn btn-sm btn-success" onclick="app.approveSupRequest(\''+s.$id+'\')">Approve</button><button class="btn btn-sm btn-danger" onclick="app.rejectSupRequest(\''+s.$id+'\')">Reject</button>':'')+'</td></tr>'});h+='</tbody></table></div></div>';S.openMod('modalReviewEntry',h)};
S.showFieldSupList=function(){var h='<div class="modal-content" style="max-width:800px"><div class="modal-header"><h3>Field Sup ('+S.fieldSupervisors.length+')</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><div class="responsive-table"><table><thead><tr><th>Name</th><th>Email</th><th>Students</th></tr></thead><tbody>';S.fieldSupervisors.forEach(function(f){h+='<tr><td>'+f.fullName+'</td><td>'+f.email+'</td><td>'+S.allUsers.filter(function(u){return u.fieldSupervisorId===f.$id}).length+'</td></tr>'});h+='</tbody></table></div></div>';S.openMod('modalReviewEntry',h)};
S.showUniSupList=function(){var h='<div class="modal-content" style="max-width:1000px"><div class="modal-header"><h3>Uni Sup ('+S.supervisors.length+')</h3><div style="display:flex;gap:6px;align-items:center"><button class="btn btn-sm btn-purple" onclick="app.showSupervisorMatching()"><i class="fas fa-diagram-project"></i> Supervisor Matching</button><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div></div><div class="responsive-table"><table><thead><tr><th>Name</th><th>Email</th><th>Assigned Regions</th><th>Students</th><th>Actions</th></tr></thead><tbody>';S.supervisors.forEach(function(s){var regs=s.coverageAreas||[];var regHtml=regs.length?regs.map(function(r){return'<span class="coverage-chip">'+S.esc(r)+'</span>'}).join(''):'<span style="font-size:0.7rem;color:#94a3b8">None</span>';h+='<tr><td>'+s.fullName+'</td><td>'+s.email+'</td><td>'+regHtml+'</td><td>'+S.allUsers.filter(function(u){return u.supervisorId===s.$id}).length+'</td><td><button class="btn btn-sm btn-outline" onclick="app.editSupCoverage(\''+s.$id+'\')"><i class="fas fa-pen"></i> Manage Regions</button></td></tr>'});h+='</tbody></table></div></div>';S.openMod('modalReviewEntry',h)};
S.assignFSToStudent=function(sid){var st=S.allUsers.find(function(u){return u.$id===sid});if(!st)return;var fsu=S.fieldSupervisors;var h='<div class="modal-content" style="max-width:550px"><div class="modal-header"><h3>Assign FS</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><p>Student: '+st.fullName+'</p><div class="form-group"><label>Field Supervisor</label><select id="fsSelect_'+sid+'"><option value="">Choose...</option>';fsu.forEach(function(f){h+='<option value="'+f.$id+'">'+f.fullName+'</option>'});h+='</select></div><button class="btn btn-lg btn-fs" onclick="app.saveFSAssignment(\''+sid+'\')" style="width:100%">Assign</button></div>';S.openMod('modalReviewEntry',h)};

S.editSupCoverage=function(supId){var sup=S.allUsers.find(function(u){return u.$id===supId});if(!sup){showToast('Supervisor not found','error');return}var current=sup.coverageAreas||[];var allRegs=Object.keys(tzData).sort();var available=allRegs.filter(function(r){return current.indexOf(r)===-1});var h='<div class="modal-content" style="max-width:600px"><div class="modal-header"><h3><i class="fas fa-map-location-dot"></i> Assigned Regions — '+S.esc(sup.fullName)+'</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div>';h+='<label style="font-size:0.75rem;font-weight:600;color:#64748b">Current Assigned Regions</label><div style="margin:8px 0 16px">';h+=current.length?current.map(function(r){return'<span class="coverage-chip" style="cursor:pointer" title="Click to unassign" onclick="app.confirmUnassignRegion(\''+supId+'\',\''+S.escJs(r)+'\')">'+S.esc(r)+' <i class="fas fa-xmark"></i></span>'}).join(''):'<p style="font-size:0.75rem;color:#94a3b8">No regions assigned yet</p>';h+='</div>';h+='<label style="font-size:0.75rem;font-weight:600;color:#64748b"><i class="fas fa-circle-plus"></i> Add Regions</label>';if(available.length===0){h+='<p style="font-size:0.75rem;color:#94a3b8;margin-top:8px">All regions are already assigned to this supervisor</p>'}else{h+='<div class="coverage-picker" id="addCoveragePicker" style="margin-top:8px">'+available.map(function(r){return'<label class="coverage-opt" onclick="this.classList.toggle(\'checked\')"><input type="checkbox" value="'+S.esc(r)+'"> '+S.esc(r)+'</label>'}).join('')+'</div><button class="btn btn-lg btn-success" style="width:100%;margin-top:14px" onclick="app.saveAddCoverage(\''+supId+'\')"><i class="fas fa-plus"></i> Add Selected Regions</button>'}h+='<p style="font-size:0.68rem;color:#64748b;margin-top:12px"><i class="fas fa-circle-info"></i> Students placed in an assigned region are automatically matched to this supervisor, pending Department approval.</p>';h+='</div>';S.openMod('modalReviewEntry',h)};
S.confirmUnassignRegion=function(supId,region){var sup=S.allUsers.find(function(u){return u.$id===supId});if(!sup)return;var h='<div class="modal-content" style="max-width:420px"><div class="modal-header"><h3>Unassign Region</h3><button class="close-btn" onclick="app.editSupCoverage(\''+supId+'\')"><i class="fas fa-times"></i></button></div><p style="font-size:0.85rem">Are you sure you want to unassign <strong>'+S.esc(region)+'</strong> from <strong>'+S.esc(sup.fullName)+'</strong>?</p><p style="font-size:0.72rem;color:#64748b;margin-top:10px">Students already assigned will not be removed automatically unless confirmed by the existing system logic.</p><div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-outline btn-lg" style="flex:1" onclick="app.editSupCoverage(\''+supId+'\')">Cancel</button><button class="btn btn-danger btn-lg" style="flex:1" onclick="app.unassignRegion(\''+supId+'\',\''+S.escJs(region)+'\')">Unassign</button></div></div>';S.openMod('modalReviewEntry',h)};
S.unassignRegion=async function(supId,region){var sup=S.allUsers.find(function(u){return u.$id===supId});if(!sup){showToast('Supervisor not found','error');return}S.loading('Removing...');try{var updated=(sup.coverageAreas||[]).filter(function(r){return r!==region});await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,supId,{coverageAreas:updated}));sup.coverageAreas=updated;S.hideLoading();showToast('Region unassigned','success');S.editSupCoverage(supId)}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};
S.saveAddCoverage=async function(supId){var sup=S.allUsers.find(function(u){return u.$id===supId});if(!sup){showToast('Supervisor not found','error');return}var checked=document.querySelectorAll('#addCoveragePicker input:checked');var toAdd=Array.prototype.map.call(checked,function(el){return el.value});if(toAdd.length===0){showToast('Select at least one region to add','error');return}var updated=(sup.coverageAreas||[]).concat(toAdd);S.loading('Saving...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,supId,{coverageAreas:updated}));sup.coverageAreas=updated;S.hideLoading();showToast('Region(s) assigned','success');S.editSupCoverage(supId)}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};

S.showSupervisorMatching=function(){var students=S.allUsers.filter(function(u){return u.role==='student'});var noCov=students.filter(function(u){return u.matchStatus==='no_coverage'});var h='<div class="modal-content" style="max-width:900px;max-height:85vh;overflow-y:auto"><div class="modal-header"><h3><i class="fas fa-diagram-project"></i> Supervisor Matching</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div>';if(noCov.length>0){h+='<div class="match-group-card no-coverage-card"><div class="flex-between"><strong><i class="fas fa-triangle-exclamation"></i> No Regional Coverage ('+noCov.length+')</strong></div>';noCov.forEach(function(s){h+='<div class="match-region-row"><span>'+S.esc(s.fullName)+' — '+S.esc(s.matchedRegion||'Unknown region')+'</span><span class="badge badge-warning">No Supervisor</span></div>'});h+='<p style="font-size:0.7rem;color:#64748b;margin-top:8px"><i class="fas fa-circle-info"></i> Assign a University Supervisor to cover these regions so these students can be matched automatically.</p></div>'}if(S.supervisors.length===0){h+='<div class="empty-state"><p>No University Supervisors created yet</p></div>'}S.supervisors.forEach(function(sup){var regions=sup.coverageAreas||[];h+='<div class="match-group-card"><div class="flex-between"><strong>'+S.esc(sup.fullName)+'</strong><span class="match-total-pill">'+regions.length+' Region'+(regions.length!==1?'s':'')+'</span></div>';if(regions.length===0){h+='<p style="font-size:0.72rem;color:#64748b;margin-top:6px">No Assigned Regions</p>'}else{regions.forEach(function(region){var cnt=students.filter(function(u){return u.matchedSupervisorId===sup.$id&&u.matchedRegion===region&&u.matchStatus==='matched_pending_department'}).length;h+='<div class="match-region-row" style="cursor:pointer" onclick="app.reviewRegionMatches(\''+sup.$id+'\',\''+S.escJs(region)+'\')"><span>'+S.esc(region)+'</span><span>'+(cnt>0?('<span class="badge badge-warning">'+cnt+' Matched Student'+(cnt!==1?'s':'')+'</span>'):'<span style="color:#94a3b8;font-size:0.72rem">No pending matches</span>')+'</span></div>'})}h+='<div style="margin-top:10px"><button class="btn btn-sm btn-outline" onclick="app.editSupCoverage(\''+sup.$id+'\')"><i class="fas fa-pen"></i> Manage Regions</button></div></div>'});h+='</div>';S.openMod('modalReviewEntry',h)};
S.reviewRegionMatches=function(supId,region){var sup=S.allUsers.find(function(u){return u.$id===supId});if(!sup)return;var students=S.allUsers.filter(function(u){return u.role==='student'&&u.matchedSupervisorId===supId&&u.matchedRegion===region&&u.matchStatus==='matched_pending_department'});var h='<div class="modal-content" style="max-width:700px"><div class="modal-header"><h3>'+S.esc(region)+' — Matched Students ('+students.length+')</h3><button class="close-btn" onclick="app.showSupervisorMatching()"><i class="fas fa-times"></i></button></div><p style="font-size:0.75rem;color:#64748b;margin-bottom:10px">Supervisor: <strong>'+S.esc(sup.fullName)+'</strong></p>';if(students.length===0){h+='<div class="empty-state"><p>No pending matches for this region</p></div>'}else{h+='<div style="display:flex;justify-content:flex-end;margin-bottom:10px"><button class="btn btn-sm btn-success" onclick="app.approveAllRegionMatches(\''+supId+'\',\''+S.escJs(region)+'\')"><i class="fas fa-check-double"></i> Approve All</button></div>';students.forEach(function(s){h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;border:1px solid var(--o);border-radius:8px;margin-bottom:6px"><div><strong>'+S.esc(s.fullName)+'</strong><div style="font-size:0.7rem;color:#64748b">'+(s.registrationNumber||'N/A')+'</div></div><div style="display:flex;gap:6px"><button class="btn btn-sm btn-success" onclick="app.approveMatchedStudent(\''+s.$id+'\')">Approve</button><button class="btn btn-sm btn-danger" onclick="app.rejectMatchedStudent(\''+s.$id+'\')">Reject</button></div></div>'})}h+='</div>';S.openMod('modalReviewEntry',h)};
S.approveMatchedStudent=async function(sid){var stu=S.allUsers.find(function(u){return u.$id===sid});if(!stu){showToast('Student not found','error');return}if(!stu.matchedSupervisorId){showToast('No matched supervisor found for this student','error');return}S.loading('Approving...');try{var upd={supervisorId:stu.matchedSupervisorId,supervisorStatus:'approved',matchStatus:'approved'};await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,sid,upd));Object.assign(stu,upd);var sup=S.allUsers.find(function(u){return u.$id===stu.matchedSupervisorId});await S.notify(sid,'Supervisor Assignment Approved','Your automatic match with '+(sup?sup.fullName:'your University Supervisor')+' has been approved by the Department.','supervisor_match_approved').catch(function(){});if(sup)await S.notify(sup.$id,'New Student Assigned',stu.fullName+' has been assigned to you'+(stu.matchedRegion?(' ('+stu.matchedRegion+')'):'')+'.','student_assigned').catch(function(){});S.hideLoading();await S.loadData();S.showSupervisorMatching();showToast('Match approved!','success')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};
S.rejectMatchedStudent=async function(sid){var r=prompt('Reason (optional):');if(r===null)return;var stu=S.allUsers.find(function(u){return u.$id===sid});if(!stu){showToast('Student not found','error');return}S.loading('Rejecting...');try{var upd={matchedSupervisorId:null,matchedRegion:null,matchStatus:null};await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,sid,upd));Object.assign(stu,upd);await S.notify(sid,'Supervisor Match Rejected','Your automatic supervisor match was rejected by the Department.'+(r?(' Reason: '+r):''),'supervisor_match_rejected').catch(function(){});S.hideLoading();await S.loadData();S.showSupervisorMatching();showToast('Match rejected','success')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};
S.approveAllRegionMatches=async function(supId,region){var students=S.allUsers.filter(function(u){return u.role==='student'&&u.matchedSupervisorId===supId&&u.matchedRegion===region&&u.matchStatus==='matched_pending_department'});if(students.length===0){showToast('Nothing to approve','info');return}if(!confirm('Approve all '+students.length+' matched student(s) for '+region+'?'))return;S.loading('Approving all...');var ok=0,fail=0;for(var i=0;i<students.length;i++){var stu=students[i];try{var upd={supervisorId:stu.matchedSupervisorId,supervisorStatus:'approved',matchStatus:'approved'};await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,stu.$id,upd));Object.assign(stu,upd);await S.notify(stu.$id,'Supervisor Assignment Approved','Your automatic match has been approved by the Department.','supervisor_match_approved').catch(function(){});ok++}catch(er){fail++}}try{var sup=S.allUsers.find(function(u){return u.$id===supId});if(sup&&ok>0)await S.notify(sup.$id,'New Students Assigned',ok+' student(s) assigned to you for '+region+'.','student_assigned').catch(function(){})}catch(e){}S.hideLoading();await S.loadData();S.showSupervisorMatching();showToast(ok+' approved'+(fail?(', '+fail+' failed'):''),'success')};

S.saveFSAssignment=async function(sid){var fsId=document.getElementById('fsSelect_'+sid).value;if(!fsId){showToast('Select FS','error');return}S.loading('Assigning...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,sid,{fieldSupervisorId:fsId}));S.hideLoading();S.closeMod('modalReviewEntry');await S.loadData();S.render();showToast('Assigned!','success')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};
S.approveSupRequest=async function(sid){var stu=S.allUsers.find(function(u){return u.$id===sid});if(!stu)return;var upd={},didSup=false,didFs=false;if(stu.supervisorId&&stu.supervisorStatus==='pending'){upd.supervisorStatus='approved';didSup=true}if(stu.fieldSupervisorPendingId&&!stu.fieldSupervisorId){upd.fieldSupervisorId=stu.fieldSupervisorPendingId;upd.fieldSupervisorPendingId=null;didFs=true}if(!didSup&&!didFs){showToast('Nothing pending approval for this student','info');return}S.loading('Approving...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,sid,upd));if(didSup){await S.notify(sid,'Supervisor Approved','Your request has been approved.','supervisor_approved').catch(function(){});if(stu.supervisorId)await S.notify(stu.supervisorId,'New Student',stu.fullName+' assigned to you.','student_assigned').catch(function(){})}if(didFs){await S.notify(sid,'Field Supervisor Assigned','You have been connected with your Field Supervisor.','fs_assigned').catch(function(){});await S.notify(upd.fieldSupervisorId,'New Student',stu.fullName+' assigned to you as Field Supervisor.','student_assigned').catch(function(){})}S.hideLoading();await S.loadData();S.render();showToast('Assignment approved!','success')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};
S.rejectSupRequest=async function(sid){var r=prompt('Reason (optional):');if(r===null)return;var stu=S.allUsers.find(function(u){return u.$id===sid});if(!stu)return;var upd={};if(stu.supervisorId&&stu.supervisorStatus==='pending'){upd.supervisorId=null;upd.supervisorStatus=null}if(stu.fieldSupervisorPendingId&&!stu.fieldSupervisorId){upd.fieldSupervisorPendingId=null}if(Object.keys(upd).length===0){showToast('Nothing to reject','info');return}S.loading('Rejecting...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,sid,upd));S.hideLoading();await S.loadData();S.render();showToast('Rejected','success')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};
S.approveAllSupRequests=async function(){var st=S.allUsers.filter(function(u){return u.role==='student'});var pr=st.filter(function(s){return(s.supervisorStatus==='pending')||(s.fieldSupervisorPendingId&&!s.fieldSupervisorId)});if(pr.length===0){showToast('Nothing pending approval','info');return}if(!confirm('Approve all '+pr.length+' pending request(s)?'))return;S.loading('Approving all...');var okCount=0,failCount=0;for(var i=0;i<pr.length;i++){var stu=pr[i];var upd={},didSup=false,didFs=false;if(stu.supervisorId&&stu.supervisorStatus==='pending'){upd.supervisorStatus='approved';didSup=true}if(stu.fieldSupervisorPendingId&&!stu.fieldSupervisorId){upd.fieldSupervisorId=stu.fieldSupervisorPendingId;upd.fieldSupervisorPendingId=null;didFs=true}if(!didSup&&!didFs)continue;try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,stu.$id,upd));okCount++;if(didSup){await S.notify(stu.$id,'Supervisor Approved','Your request has been approved.','supervisor_approved').catch(function(){});if(stu.supervisorId)await S.notify(stu.supervisorId,'New Student',stu.fullName+' assigned to you.','student_assigned').catch(function(){})}if(didFs){await S.notify(stu.$id,'Field Supervisor Assigned','You have been connected with your Field Supervisor.','fs_assigned').catch(function(){});await S.notify(upd.fieldSupervisorId,'New Student',stu.fullName+' assigned to you as Field Supervisor.','student_assigned').catch(function(){})}}catch(er){failCount++}}S.hideLoading();await S.loadData();S.render();showToast(okCount+' approved'+(failCount?(', '+failCount+' failed'):''),'success')};

S.exportUsersExcel=function(){var list=S.allUsers||[];if(list.length===0){showToast('No users to export','error');return}if(typeof XLSX==='undefined'){showToast('Excel library not loaded, please check your connection','error');return}var headers=['Name','Reg No','Email','Phone','Role','Status'];var rows=[headers];list.forEach(function(u){rows.push([u.fullName||'N/A',u.registrationNumber||'N/A',u.email||'N/A',u.phone||'N/A',u.role||'N/A',u.accountStatus==='active'?'Active':'Disabled'])});var ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=headers.map(function(h,ci){var maxLen=h.length;rows.forEach(function(r){var v=r[ci]==null?'':String(r[ci]);if(v.length>maxLen)maxLen=v.length});return{wch:Math.min(Math.max(maxLen+2,10),60)}});var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Users');XLSX.writeFile(wb,'users_export.xlsx');showToast('Exported!','success')};

S.createSup=function(){var regs=Object.keys(tzData).sort();var h='<div class="modal-content" style="max-width:500px"><div class="modal-header"><h3>Create Supervisor</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><form onsubmit="app.saveSup(event)"><div class="form-group"><label>Name</label><input type="text" id="supFullName" required></div><div class="form-group"><label>Email</label><input type="email" id="supEmail" required></div><div class="form-group"><label>Phone</label><input type="text" id="supPhone" required></div><div class="form-group"><label>Role</label><select id="supRole" required onchange="app.toggleSupPasswordFields()"><option value="">Select</option><option value="university_supervisor">Uni Sup</option><option value="field_supervisor">Field Sup</option></select></div><div id="supCoverageSection" class="hidden form-group"><label><i class="fas fa-map-location-dot"></i> Coverage Areas (Assigned Regions)</label><div class="coverage-picker" id="supCoveragePicker">'+regs.map(function(r){return'<label class="coverage-opt" onclick="this.classList.toggle(\'checked\')"><input type="checkbox" value="'+r+'"> '+r+'</label>'}).join('')+'</div><p style="font-size:0.68rem;color:#64748b;margin-top:6px"><i class="fas fa-circle-info"></i> Students placed in these regions will be automatically matched to this supervisor, pending Department approval.</p></div><div id="supPasswordSection"><div class="grid grid-2"><div class="form-group"><label>Password</label><div class="password-wrapper"><input type="password" id="supPassword" required minlength="8"><button type="button" class="password-toggle" onclick="togglePassword(\'supPassword\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm</label><div class="password-wrapper"><input type="password" id="supConfirmPassword" required minlength="8"><button type="button" class="password-toggle" onclick="togglePassword(\'supConfirmPassword\',this)"><i class="fas fa-eye"></i></button></div></div></div></div><div id="supFsPasswordNote" class="hidden" style="margin-bottom:14px;padding:10px 12px;background:rgba(8,145,178,0.08);border-radius:10px;font-size:0.75rem;color:var(--fsd)"><i class="fas fa-info-circle"></i> Field Supervisors are not required to change their password. The default password for all Field Supervisors is <strong>Rucu@2019</strong>, and they will use the Reg No given to them together with this password to log in directly.</div><button type="submit" class="btn btn-lg btn-success" style="width:100%">Create</button></form></div>';S.openMod('modalReviewEntry',h)};
S.toggleSupPasswordFields=function(){var r=document.getElementById('supRole'),ps=document.getElementById('supPasswordSection'),note=document.getElementById('supFsPasswordNote'),pw=document.getElementById('supPassword'),cpw=document.getElementById('supConfirmPassword'),cov=document.getElementById('supCoverageSection');if(!r)return;if(r.value==='field_supervisor'){if(ps)ps.classList.add('hidden');if(note)note.classList.remove('hidden');if(pw)pw.required=false;if(cpw)cpw.required=false;if(cov)cov.classList.add('hidden')}else{if(ps)ps.classList.remove('hidden');if(note)note.classList.add('hidden');if(pw)pw.required=true;if(cpw)cpw.required=true;if(cov)cov.classList.toggle('hidden',r.value!=='university_supervisor')}};
S.saveSup=async function(e){e.preventDefault();var se=document.getElementById('supEmail').value.trim(),sn=document.getElementById('supFullName').value.trim(),sph=document.getElementById('supPhone').value.trim(),srole=document.getElementById('supRole').value;if(!srole){showToast('Select role','error');return}var isFS=srole==='field_supervisor';var coverageAreas=[];if(!isFS){var covEls=document.querySelectorAll('#supCoveragePicker input:checked');coverageAreas=Array.prototype.map.call(covEls,function(el){return el.value});if(coverageAreas.length===0){showToast('Select at least one Coverage Area for this University Supervisor','error');return}}var sp,sc;if(isFS){sp=FS_DEFAULT_PASSWORD;sc=FS_DEFAULT_PASSWORD}else{sp=document.getElementById('supPassword').value;sc=document.getElementById('supConfirmPassword').value;if(sp!==sc){showToast('Passwords do not match','error');return}}var prefix=isFS?'FS-':'SUP-',regNo=prefix+Math.floor(10000000+Math.random()*90000000),roleLabel=isFS?'Field Supervisor':'University Supervisor';var esch=function(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')};S.loading('Creating...');try{var newAcc=await account.create(ID.unique(),se,sp,sn);var newDoc={fullName:sn,registrationNumber:regNo,email:se,phone:sph,role:srole,accountStatus:'active',isFirstLogin:false,mustChangePassword:false,createdAt:new Date().toISOString()};if(!isFS)newDoc.coverageAreas=coverageAreas;await safeOp(db.createDocument(AC.databaseId,AC.collections.users,newAcc.$id,newDoc));try{var notifyTo=(S.allUsers||[]).filter(function(u){return(u.role==='admin'||u.role==='department')&&u.$id!==S.user.$id});for(var ni=0;ni<notifyTo.length;ni++){await S.notify(notifyTo[ni].$id,'New '+roleLabel+' Created',sn+' ('+regNo+') was added as '+roleLabel+' by '+(S.user.fullName||'Admin')+'.','supervisor_created').catch(function(){})}}catch(notifErr){}S.hideLoading();S.closeMod('modalReviewEntry');await S.loadData();S.render();var popup=document.createElement('div');popup.className='popup-overlay';popup.innerHTML='<div class="popup-card"><h2>'+roleLabel+' Created</h2><p>'+esch(sn)+'</p><p style="font-size:0.75rem;color:#64748b;margin-top:10px">Reg Number</p><code id="newSupReg" style="font-size:1.3rem">'+esch(regNo)+'</code><p style="font-size:0.75rem;color:#64748b;margin-top:10px">Password (they will use this to log in)</p><code id="newSupPwd" style="font-size:1.3rem">'+esch(sp)+'</code><button class="btn btn-lg" style="width:100%;margin-top:14px" onclick="navigator.clipboard.writeText(document.getElementById(\'newSupReg\').textContent+\' / \'+document.getElementById(\'newSupPwd\').textContent)">Copy Reg No & Password</button><button class="btn btn-sm" style="width:100%;margin-top:8px" onclick="this.closest(\'.popup-overlay\').remove()">Close</button></div>';document.body.appendChild(popup);popup.onclick=function(ev){if(ev.target===popup)popup.remove()};showToast(roleLabel+' created!','success')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};
