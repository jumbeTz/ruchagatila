var GT={c:null,t:{},n:0,active:{},init:function(){if(!GT.c){GT.c=document.createElement('div');GT.c.className='toast-container';document.body.appendChild(GT.c)}},show:function(m,t,o){o=o||{};GT.init();var key=t+'|'+(o.title||'')+'|'+m;if(GT.active[key]){var exId=GT.active[key],exEl=GT.c.querySelector('.toast-item[data-id="'+exId+'"]');if(exEl){if(GT.t[exId]){clearTimeout(GT.t[exId])}var nd=(o.duration!==undefined?o.duration:2000);if(nd>0)GT.t[exId]=setTimeout(function(){GT.dismiss(exId)},nd);return exId}else{delete GT.active[key]}}var id=++GT.n,d=(o.duration!==undefined?o.duration:2000),ti={success:'Success',error:'Error',warning:'Warning',info:'Information'},ic={success:'circle-check',error:'circle-xmark',warning:'triangle-exclamation',info:'circle-info'},bg={success:'#dcfce7',error:'#fee2e2',warning:'#fff7ed',info:'#dbeafe'},tc={success:'#166534',error:'#991b1b',warning:'#9a3412',info:'#1e3a8a'},bc={success:'#16a34a',error:'#dc2626',warning:'#ea580c',info:'#1e40af'};var title=o.title||ti[t]||ti.info,icon=o.icon||ic[t]||ic.info,bgc=bg[t]||bg.info,txc=tc[t]||tc.info,barc=bc[t]||bc.info;var el=document.createElement('div');el.className='toast-item';el.setAttribute('data-id',id);el.setAttribute('data-key',key);el.style.animation='toastIn 0.3s ease';var actionsHtml='';if(o.actions&&o.actions.length){actionsHtml='<div style="display:flex;gap:6px;margin-top:8px">'+o.actions.map(function(a){return'<button class="btn btn-sm '+(a.cls||'btn-outline')+'" style="flex:1" onclick="'+(a.onClick?a.onClick+';':'')+'GT.dismiss('+id+')">'+a.label+'</button>'}).join('')+'</div>'}el.innerHTML='<div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:'+barc+'"></div><div style="width:36px;height:36px;border-radius:50%;background:'+bgc+';display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0;color:'+txc+'"><i class="fas fa-'+icon+'"></i></div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:0.8rem;color:var(--os);margin-bottom:2px">'+title+'</div><div style="font-size:0.75rem;color:#64748b;line-height:1.4">'+m+'</div>'+actionsHtml+'</div><button style="width:24px;height:24px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:0.7rem;display:flex;align-items:center;justify-content:center;color:#94a3b8;flex-shrink:0" onclick="GT.dismiss('+id+')"><i class="fas fa-times"></i></button>'+(d>0?'<div style="position:absolute;bottom:0;left:0;height:2px;background:'+barc+';animation:toastProgress '+d+'ms linear forwards"></div>':'');GT.c.appendChild(el);GT.active[key]=id;if(d>0){GT.t[id]=setTimeout(function(){GT.dismiss(id)},d)}el.addEventListener('mouseenter',function(){if(GT.t[id]){clearTimeout(GT.t[id]);GT.t[id]=null}var pb=el.querySelector('[style*="toastProgress"]');if(pb)pb.style.animationPlayState='paused'});el.addEventListener('mouseleave',function(){if(!GT.t[id]&&d>0){GT.t[id]=setTimeout(function(){GT.dismiss(id)},2000)}var pb=el.querySelector('[style*="toastProgress"]');if(pb)pb.style.animationPlayState='running'});return id},dismiss:function(id){var els=document.querySelectorAll('.toast-item[data-id="'+id+'"]');els.forEach(function(el){var k=el.getAttribute('data-key');if(k&&GT.active[k]===id)delete GT.active[k];el.style.animation='toastOut 0.25s ease forwards';setTimeout(function(){if(el.parentNode)el.remove()},250)});if(GT.t[id]){clearTimeout(GT.t[id]);delete GT.t[id]}}};
function showToast(m,t,o){return GT.show(m,t,o)}
function safeOp(promise,timeoutMs){timeoutMs=timeoutMs||15000;return Promise.race([promise,new Promise(function(_,reject){setTimeout(function(){reject(new Error('Timed out'))},timeoutMs)})])}

function AppState(){var S=this;
S.reset=function(){S.user=null;S.role=null;S.view='login';S.dark=localStorage.getItem('darkMode')==='true';S.notifs=[];S.unread=0;S.loadingInitial=true;S._popupsShown=false;S.showProf=S.showEntry=S.showTasks=S.showAssess=false;S.entries=[];S.attendance=[];S.assessments=[];S.supervisors=[];S.fieldSupervisors=[];S.allUsers=[];S.announcements=[];S.week=1;S.supId=null;S.fsId=null;S.sigId=null;S.sigCanvas=null;S.sigCtx=null;S.totalPages=1;S.profileWizardStep=0;S.profileData={};S.fieldPlacementData={};S.searchQ=''};

S.fetchUser=async function(user){try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('email',user.email)]));if(r.documents.length>0){S.user=r.documents[0];S.role=S.user.role;S.supId=S.user.supervisorId;S.fsId=S.user.fieldSupervisorId;var tasks=[S.loadData()];if(S.role==='student'){tasks.push(S.loadStudentData(),S.loadProfileData(),S.loadAssess());if(S.user.isFirstLogin)S.showProf=true}else if(S.role==='field_supervisor'){tasks.push(S.loadFieldSupervisorData(),S.loadAssess())}else if(S.role==='university_supervisor'){tasks.push(S.loadSupervisorData(),S.loadAssess())}await Promise.all(tasks)}else{S.reset()}}catch(e){S.reset()}};

S.loadStudentData=async function(){try{var entriesP=safeOp(db.listDocuments(AC.databaseId,AC.collections.logbookEntries,[Q.equal('studentId',S.user.$id),Q.orderDesc('entryDate'),Q.limit(100)]));var attP=safeOp(db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.orderDesc('checkInDate'),Q.limit(100)]));var r=await entriesP;S.entries=r.documents;var a=await attP;S.attendance=a.documents;S.calcWeek()}catch(e){}};
S.loadSupervisorData=async function(){try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.logbookEntries,[Q.equal('supervisorId',S.user.$id),Q.orderDesc('entryDate'),Q.limit(200)]));S.entries=r.documents}catch(e){}};
S.loadFieldSupervisorData=async function(){try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.logbookEntries,[Q.equal('fieldSupervisorId',S.user.$id),Q.orderDesc('entryDate'),Q.limit(200)]));S.entries=r.documents}catch(e){S.entries=[]}};
S.loadNotifs=async function(){try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.notifications,[Q.equal('recipientId',S.user.$id),Q.orderDesc('createdAt'),Q.limit(50)]));S.notifs=r.documents;S.unread=S.notifs.filter(function(n){return !n.isRead}).length}catch(e){S.notifs=[]}};
S.loadProfileData=async function(){if(!S.user||S.role!=='student')return;try{var prP=safeOp(db.listDocuments(AC.databaseId,AC.collections.profiles,[Q.equal('userId',S.user.$id)]));var fprP=safeOp(db.listDocuments(AC.databaseId,AC.collections.fieldPlacements,[Q.equal('studentId',S.user.$id),Q.orderDesc('createdAt'),Q.limit(1)]));var pr=await prP;if(pr.documents.length>0){var p=pr.documents[0];S.profileData={gender:p.gender,dateOfBirth:p.dateOfBirth,institution:p.institution,programme:p.programme,yearOfStudy:p.yearOfStudy,semester:p.semester}}var fpr=await fprP;if(fpr.documents.length>0){var fp=fpr.documents[0];S.fieldPlacementData={$id:fp.$id,fieldRegion:fp.fieldRegion,fieldDistrict:fp.fieldDistrict,institution:fp.institution,startDate:fp.startDate,endDate:fp.endDate,status:fp.status,fieldSupervisorName:fp.fieldSupervisorName,fieldSupervisorPhone:fp.fieldSupervisorPhone,fieldSupervisorEmail:fp.fieldSupervisorEmail}}}catch(er){}};
S.loadAssess=async function(){if(!S.user)return;try{var q=[];if(S.role==='university_supervisor')q=[Q.equal('supervisorId',S.user.$id)];else if(S.role==='student')q=[Q.equal('studentId',S.user.$id)];else if(S.role==='field_supervisor')q=[Q.equal('fieldSupervisorId',S.user.$id)];if(q.length>0){var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.assessments,q.concat([Q.orderDesc('createdAt'),Q.limit(50)])));S.assessments=r.documents.filter(function(a){return !a.isDeleted})}else{S.assessments=[]}}catch(e){S.assessments=[]}};
S.calcWeek=function(){if(!S.attendance||S.attendance.length===0){S.week=1;return}S.week=Math.ceil(Math.abs(new Date()-new Date(S.attendance[S.attendance.length-1].checkInDate))/(1000*60*60*24*7))||1};

S._doRender=function(){S.updateTop();S.renderMenu();var mc=document.getElementById('mainContent');if(!mc)return;if(S.loadingInitial){mc.innerHTML='<div class="auth-wrapper"><div class="auth-card" style="text-align:center"><div class="spinner-ring" style="margin:0 auto 16px"></div><p style="color:#94a3b8">Loading...</p></div></div>';return}if(!S.user){S.hideAll();mc.innerHTML=S.renderAuth();return}S.showNav();S.renderAnnounceBanner();if(S.showProf)mc.innerHTML=S.renderProf();else if(S.showEntry)mc.innerHTML=S.renderEntry();else if(S.showTasks)mc.innerHTML=S.renderTasks();else if(S.showAssess)mc.innerHTML=S.renderAssessments();else mc.innerHTML=S.renderDashboard();

else if(S.role==='field_supervisor'){h+='<div class="menu-section">Field Sup</div>';h+='<div class="menu-item" onclick="app.goDash();app.toggleMenu()"><i class="fas fa-th-large"></i> Dashboard</div>';h+='<div class="menu-item" onclick="app.goTasks();app.toggleMenu()"><i class="fas fa-list-check"></i> Verification</div>';h+='<div class="menu-item" onclick="app.showFSStudents();app.toggleMenu()"><i class="fas fa-user-graduate"></i> Students</div>';h+='<div class="menu-item" onclick="app.showAssessments();app.toggleMenu()"><i class="fas fa-star"></i> Assessments</div>';h+='<div class="menu-item" onclick="app.openExport();app.toggleMenu()"><i class="fas fa-download"></i> Export</div>'}

S.calcProfileCompletion=function(){var p=S.profileData||{},f=S.fieldPlacementData||{},s=0;if(p.gender||p.dateOfBirth)s++;if(p.institution||p.programme||p.yearOfStudy||p.semester)s++;if(f.fieldRegion||f.fieldDistrict||f.institution||f.startDate||f.endDate)s++;if(S.supId)s++;if(f.fieldSupervisorName||f.fieldSupervisorPhone||f.fieldSupervisorEmail)s++;return s*20};

S.renderWizardContent=function(s,p,f){switch(s){case 0:return'<form onsubmit="app.savePersonalInfo(event)"><h3>Personal Info</h3><div class="grid grid-2"><div class="form-group"><label>Gender</label><select id="profGender" required><option value="">Select</option><option value="Male" '+(p.gender==='Male'?'selected':'')+'>Male</option><option value="Female" '+(p.gender==='Female'?'selected':'')+'>Female</option></select></div><div class="form-group"><label>Date of Birth</label><input type="date" id="profDOB" value="'+(p.dateOfBirth||'')+'"></div></div><button type="submit" class="btn btn-lg" style="width:100%">Save</button></form>';case 1:var y='';for(var i=1;i<=6;i++)y+='<option value="'+i+'" '+(p.yearOfStudy==i?'selected':'')+'>Year '+i+'</option>';return'<form onsubmit="app.saveAcademicInfo(event)"><h3>Academic</h3><div class="form-group"><label>Institution</label><input type="text" id="profInstitution" value="'+(p.institution||'')+'"></div><div class="form-group"><label>Programme</label><input type="text" id="profProgramme" value="'+(p.programme||'')+'"></div><div class="grid grid-2"><div class="form-group"><label>Year</label><select id="profYear"><option value="">Select</option>'+y+'</select></div><div class="form-group"><label>Semester</label><select id="profSemester"><option value="">Select</option><option value="1" '+(p.semester==1?'selected':'')+'>Sem 1</option><option value="2" '+(p.semester==2?'selected':'')+'>Sem 2</option></select></div></div><div class="sticky-bottom" style="display:flex;gap:8px"><button type="button" class="btn btn-outline btn-lg" onclick="app.setWizardStep(0)" style="flex:1">Back</button><button type="submit" class="btn btn-lg" style="flex:1">Save</button></div></form>';case 2:var regs=Object.keys(tzData).sort(),dist=f.fieldRegion&&tzData[f.fieldRegion]?tzData[f.fieldRegion]:[];var h='<form onsubmit="app.saveFieldPlacement(event)"><h3>Field Placement</h3>';h+='<div class="grid grid-2"><div class="form-group"><label>Region</label><select id="fpRegion" onchange="app.updateFpDistricts()" required><option value="">Select</option>'+regs.map(function(r){return'<option value="'+r+'" '+(f.fieldRegion===r?'selected':'')+'>'+r+'</option>'}).join('')+'</select></div><div class="form-group"><label>District</label><select id="fpDistrict" required><option value="">Select</option>'+dist.map(function(d){return'<option value="'+d+'" '+(f.fieldDistrict===d?'selected':'')+'>'+d+'</option>'}).join('')+'</select></div></div><div class="form-group"><label>Institution</label><input type="text" id="fpInstitution" value="'+(f.institution||'')+'"></div><div class="grid grid-2"><div class="form-group"><label>Start</label><input type="date" id="fpStartDate" value="'+(f.startDate||'')+'"></div><div class="form-group"><label>End</label><input type="date" id="fpEndDate" value="'+(f.endDate||'')+'"></div></div><div class="sticky-bottom" style="display:flex;gap:8px"><button type="button" class="btn btn-outline btn-lg" onclick="app.setWizardStep(1)" style="flex:1">Back</button><button type="submit" class="btn btn-lg" style="flex:1">Save</button></div></form>';return h;case 3:return'<div><h3>Uni Supervisor</h3><div class="form-group"><input type="text" id="supervisorSearch" placeholder="Search..." oninput="app.searchSupLive()"></div><div style="max-height:250px;overflow-y:auto" id="supervisorList">'+S.renderSupervisorList()+'</div><div class="sticky-bottom" style="display:flex;gap:8px"><button type="button" class="btn btn-outline btn-lg" onclick="app.setWizardStep(2)" style="flex:1">Back</button><button type="button" class="btn btn-lg" onclick="app.setWizardStep(4)" style="flex:1">Continue</button></div></div>';case 4:return'<form onsubmit="app.saveFieldSupervisor(event)"><h3>Field Supervisor</h3><div class="form-group"><label>Name</label><input type="text" id="fsName" value="'+(f.fieldSupervisorName||'')+'" required></div><div class="grid grid-2"><div class="form-group"><label>Phone</label><input type="tel" id="fsPhone" value="' S.renderSupervisorList=function(){var f=S.getFilteredSup();if(f.length===0)return'<div class="empty-state"><p>No supervisors</p></div>';return f.map(function(s){var is=S.supId===s.$id;return'<div class="supervisor-card'+(is?' selected':'')+'" onclick="app.requestSupervisor(\''+s.$id+'\')"><div class="flex-between"><div>'+S.getAvatar(s)+' <strong>'+s.fullName+'</strong></div>'+(is?'<span class="badge badge-warning">Requested</span>':'<button class="btn btn-sm">Request</button>')+'</div></div>'}).join('')};

S.requestSupervisor=async function(sid){if(!confirm('Request this supervisor?'))return;S.loading('Sending...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,S.user.$id,{supervisorId:sid,supervisorStatus:'pending'}));S.supId=sid;var sup=S.allUsers.find(function(u){return u.$id===sid});if(sup){await S.notify(sid,'Supervisor Request',S.user.fullName+' requested you.','supervisor_request').catch(function(){});try{var deps=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('role','department'),Q.equal('accountStatus','active')]));for(var i=0;i<deps.documents.length;i++){await S.notify(deps.documents[i].$id,'Pending Request',S.user.fullName+' requested '+sup.fullName,'supervisor_request_pending').catch(function(){})}}catch(notifErr){}}S.hideLoading();S.render();showToast('Request sent!','success')}catch(er){S.hideLoading();showToast('Error','error')}};

S.renderEntry=function(){return'<div class="glass-card" style="max-width:900px;margin:0 auto"><div class="flex-between"><h2>New Entry</h2><button class="close-btn" onclick="app.showEntry=false;app.render()"><i class="fas fa-times"></i></button></div><div class="form-group"><label>Date</label><input type="date" id="entryDate" value="'+new Date().toISOString().split('T')[0]+'" required></div><div class="form-group"><label>Week</label><input type="number" id="weekNumber" value="'+S.week+'" readonly></div><div style="margin:16px 0"><div class="entry-pages-wrap" id="pagesContainer"></div><button type="button" class="add-page-btn" onclick="app.addFullPage()">+ Add Page</button></div><div style="display:flex;gap:10px;margin-top:16px"><button type="button" class="btn btn-lg" onclick="app.saveEntry()" style="flex:1">Submit</button><button type="button" class="btn btn-lg btn-outline" onclick="app.saveDraft()" style="flex:1">Draft</button></div></div>'};
S.renderFullPage=function(pi,data){data=data||{};return'<div class="page-block" id="pageBlock_'+pi+'"><div class="page-hdr"><span class="page-ttl">Page '+(pi+1)+'</span>'+(pi>0?'<button type="button" class="page-rmv" onclick="app.removePage('+pi+')"><i class="fas fa-times"></i></button>':'')+'</div><div class="page-body"><div class="page-field"><label class="page-label">Activity Title</label><input type="text" class="page-input" id="pageTitle_'+pi+'" value="'+(data.activityTitle||'')+'"></div><div class="page-field"><label class="page-label">Objectives</label><textarea class="page-textarea" id="pageObj_'+pi+'" rows="2">'+(data.objectives||'')+'</textarea></div><div class="page-field"><label class="page-label">Activities</label><textarea class="page-textarea page-content-area" id="pageContent_'+pi+'" rows="6">'+(data.activitiesPerformed||'')+'</textarea></div><div class="grid grid-2"><div class="page-field"><label class="page-label">Skills</label><textarea class="page-textarea" id="pageSkills_'+pi+'" rows="3">'+(data.skillsAcquired||'')+'</textarea></div><div class="page-field"><label class="page-label">Challenges</label><textarea class="page-textarea" id="pageChal_'+pi+'" rows="3">'+(data.challengesFaced||'')+'</textarea></div></div></div></div>'};
S.newEntry=function(){S.showEntry=true;S.totalPages=1;S.render();setTimeout(function(){var c=document.getElementById('pagesContainer');if(c)c.innerHTML=S.renderFullPage(0)},200)};
S.addFullPage=function(){S.totalPages++;var ni=S.totalPages-1,c=document.getElementById('pagesContainer');if(!c)return;c.insertAdjacentHTML('beforeend',S.renderFullPage(ni));setTimeout(function(){var ti=document.getElementById('pageTitle_'+ni);if(ti)ti.focus()},200)};

S.renumberPages=function(){var c=document.getElementById('pagesContainer');if(!c)return;var bs=c.querySelectorAll('.page-block');S.totalPages=bs.length;bs.forEach(function(b,ni){b.id='pageBlock_'+ni;var tt=b.querySelector('.page-ttl');if(tt)tt.innerHTML='Page '+(ni+1);['pageTitle_','pageObj_','pageContent_','pageSkills_','pageChal_'].forEach(function(f){var el=b.querySelector('[id^="'+f+'"]');if(el)el.id=f+ni});var rm=b.querySelector('.page-rmv');if(ni===0){if(rm)rm.style.display='none'}else{if(!rm){var hdr=b.querySelector('.page-hdr');if(hdr){var btn=document.createElement('button');btn.type='button';btn.className='page-rmv';btn.setAttribute('onclick','app.removePage('+ni+')');btn.innerHTML='<i class="fas fa-times"></i>';hdr.appendChild(btn)}}else{rm.setAttribute('onclick','app.removePage('+ni+')');rm.style.display='flex'}}})};
S.getPagesData=function(){var pages=[];for(var i=0;i<S.totalPages;i++){pages.push({activityTitle:(document.getElementById('pageTitle_'+i)||{}).value||'',objectives:(document.getElementById('pageObj_'+i)||{}).value||'',activitiesPerformed:(document.getElementById('pageContent_'+i)||{}).value||'',skillsAcquired:(document.getElementById('pageSkills_'+i)||{}).value||'',challengesFaced:(document.getElementById('pageChal_'+i)||{}).value||''})}return pages};
S.saveEntry=async function(){var pages=S.getPagesData();if(!pages.some(function(p){return p.activityTitle||p.activitiesPerformed})){showToast('Fill at least one page','error');return}S.loading('Submitting...');try{var mainTitle=pages[0].activityTitle||'Untitled';if(pages.length>1)mainTitle+=' ('+pages.length+' activities)';var d={studentId:S.user.$id,supervisorId:S.user.supervisorId||'unassigned',fieldSupervisorId:S.user.fieldSupervisorId||null,entryDate:document.getElementById('entryDate').value,weekNumber:parseInt(document.getElementById('weekNumber').value),activityTitle:mainTitle,objectives:pages[0].objectives||'',activitiesPerformed:pages.map(function(p){return p.activitiesPerformed}).filter(Boolean).join('\n\n'),description:pages.map(function(p,i){return'<div data-page="'+(i+1)+'">'+p.activitiesPerformed+'</div>'}).join('\n<!-- PAGE_BREAK -->\n'),skillsAcquired:pages.map(function(p){return p.skillsAcquired}).filter(Boolean).join(' | '),challengesFaced:pages.map(function(p){return p.challengesFaced}).filter(Boolean).join(' | '),status:'Pending Review',fieldSupervisorStatus:'pending',submittedAt:new Date().toISOString(),totalPages:pages.length,hasMultiplePages:pages.length>1,pagesData:JSON.stringify(pages)};await safeOp(db.createDocument(AC.databaseId,AC.collections.logbookEntries,ID.unique(),d));S.hideLoading();S.showEntry=false;S.totalPages=1;await S.loadStudentData();S.render();showToast('Submitted!','success');if(S.user.fieldSupervisorId)await S.notify(S.user.fieldSupervisorId,'New Entry',S.user.fullName+' submitted: '+mainTitle,'field_verification_needed').catch(function(){});if(S.user.supervisorId&&S.user.supervisorId!=='unassigned')await S.notify(S.user.supervisorId,'New Entry',S.user.fullName+' submitted: '+mainTitle,'entry_submitted').catch(function(){})}catch(er){S.hideLoading();showToast('Error','error')}};
S.saveDraft=async function(){var pages=S.getPagesData();if(!pages.some(function(p){return p.activityTitle||p.activitiesPerformed})){showToast('Fill at least one page','error');return}S.loading('Saving...');try{var d={studentId:S.user.$id,supervisorId:S.user.supervisorId||'unassigned',entryDate:document.getElementById('entryDate').value,weekNumber:parseInt(document.getElementById('weekNumber').value),activityTitle:pages[0].activityTitle||'Draft',activitiesPerformed:pages.map(function(p){return p.activitiesPerformed}).filter(Boolean).join('\n\n'),description:pages.map(function(p){return'<div>'+p.activitiesPerformed+'</div>'}).join('\n'),status:'Draft',fieldSupervisorStatus:'pending',submittedAt:new Date().toISOString(),totalPages:pages.length,pagesData:JSON.stringify(pages)};await safeOp(db.createDocument(AC.databaseId,AC.collections.logbookEntries,ID.unique(),d));S.hideLoading();S.showEntry=false;S.totalPages=1;await S.loadStudentData();S.render();showToast('Draft saved','success')}catch(er){S.hideLoading();showToast('Error','error')}};

// ===== VIEW ENTRY & SIGNATURES =====
S.viewEntry=function(entryId){var entry=S.entries.find(function(e){return e.$id===entryId});if(!entry)return;var pagesData=[];try{pagesData=JSON.parse(entry.pagesData||'[]')}catch(e){pagesData=[{activityTitle:entry.activityTitle,activitiesPerformed:entry.activitiesPerformed}]}if(pagesData.length===0)pagesData=[{activityTitle:entry.activityTitle,activitiesPerformed:entry.activitiesPerformed}];var sn='';var stu=S.allUsers.find(function(u){return u.$id===entry.studentId});if(stu)sn=stu.fullName;var h='<div class="modal-content" style="max-width:850px;max-height:90vh"><div class="modal-header"><h3>'+(entry.activityTitle||'Entry')+'</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><p>Student: '+sn+' | Date: '+new Date(entry.entryDate).toLocaleDateString()+' | Week: '+entry.weekNumber+' | <span class="badge badge-info">'+(entry.status||'Draft')+'</span></p>';if(entry.fieldSupervisorStatus==='verified')h+='<div class="fs-verified-banner">Field Verified</div>';if(pagesData.length>1){h+='<div class="page-tabs" id="ptabs_'+entryId+'">';pagesData.forEach(function(p,i){h+='<button class="page-tab '+(i===0?'active':'')+'" onclick="app.switchPage(\''+entryId+'\','+i+')">Page '+(i+1)+'</button>'});h+='</div>'}h+='<div id="pcontent_'+entryId+'">'+S.renderPageContent(pagesData[0])+'</div>';window._pagesData=window._pagesData||{};window._pagesData[entryId]=pagesData;h+='<div class="sticky-bottom" style="display:flex;gap:8px">';if(S.role==='field_supervisor'&&(!entry.fieldSupervisorStatus||entry.fieldSupervisorStatus==='pending'))h+='<button class="btn btn-lg btn-fs" onclick="app.closeMod(\'modalReviewEntry\');app.openFSign(\''+entryId+'\')" style="flex:1">Verify & Sign</button>';else if(S.role==='university_supervisor'&&entry.status==='Pending Review'&&entry.fieldSupervisorStatus==='verified')h+='<button class="btn btn-lg btn-success" onclick="app.closeMod(\'modalReviewEntry\');app.openUSign(\''+entryId+'\')" style="flex:1">Approve & Sign</button>';else h+='<button class="btn btn-lg btn-outline" onclick="app.closeMod(\'modalReviewEntry\')" style="flex:1">Close</button>';h+='</div></div>';S.openMod('modalReviewEntry',h)};
S.renderPageContent=function(page){var h='';if(page.activityTitle)h+='<div class="review-section"><div class="review-section-title">Activity</div><div class="review-section-content">'+page.activityTitle+'</div></div>';if(page.objectives)h+='<div class="review-section"><div class="review-section-title">Objectives</div><div class="review-section-content">'+(page.objectives||'').replace(/\n/g,'<br>')+'</div></div>';if(page.activitiesPerformed)h+='<div class="review-section"><div class="review-section-title">Activities</div><div class="review-section-content">'+(page.activitiesPerformed||'').replace(/\n/g,'<br>')+'</div></div>';if(page.skillsAcquired)h+='<div class="review-section"><div class="review-section-title">Skills</div><div class="review-section-content">'+(page.skillsAcquired||'').replace(/\n/g,'<br>')+'</div></div>';if(page.challengesFaced)h+='<div class="review-section"><div class="review-section-title">Challenges</div><div class="review-section-content">'+(page.challengesFaced||'').replace(/\n/g,'<br>')+'</div></div>';return h};
S.switchPage=function(eid,i){var pages=window._pagesData&&window._pagesData[eid];if(!pages||!pages[i])return;document.getElementById('pcontent_'+eid).innerHTML=S.renderPageContent(pages[i]);var tabs=document.querySelectorAll('#ptabs_'+eid+' .page-tab');tabs.forEach(function(t,idx){if(idx===i)t.classList.add('active');else t.classList.remove('active')})};
S.openFSign=function(eid){S.sigId=eid;var h='<div class="modal-content" style="max-width:450px"><div class="modal-header"><h3>Verify & Sign</h3><button class="close-btn" onclick="app.closeMod(\'modalSignature\')"><i class="fas fa-times"></i></button></div><canvas id="sigCanvas" class="signature-canvas" width="400" height="180"></canvas><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-sm btn-outline" onclick="app.clearSig()">Clear</button><button class="btn btn-sm btn-fs" onclick="app.saveFSign()">Verify & Sign</button></div></div>';S.openMod('modalSignature',h);setTimeout(function(){S.initSig('#0891b2')},150)};
S.openUSign=function(eid){S.sigId=eid;var h='<div class="modal-content" style="max-width:450px"><div class="modal-header"><h3>Approve & Sign</h3><button class="close-btn" onclick="app.closeMod(\'modalSignature\')"><i class="fas fa-times"></i></button></div><canvas id="sigCanvas" class="signature-canvas" width="400" height="180"></canvas><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-sm btn-outline" onclick="app.clearSig()">Clear</button><button class="btn btn-sm btn-success" onclick="app.saveUSign()">Approve & Sign</button></div></div>';S.openMod('modalSignature',h);setTimeout(function(){S.initSig('#1e40af')},150)};
S.initSig=function(c){S.sigCanvas=document.getElementById('sigCanvas');if(!S.sigCanvas)return;S.sigCtx=S.sigCanvas.getContext('2d');S.sigCtx.strokeStyle=c||'#1e40af';S.sigCtx.lineWidth=2;S.sigCtx.lineCap='round';var d=false;var gp=function(e){var r=S.sigCanvas.getBoundingClientRect();return{x:(e.clientX||(e.touches&&e.touches[0].clientX))-r.left,y:(e.clientY||(e.touches&&e.touches[0].clientY))-r.top}};S.sigCanvas.onmousedown=S.sigCanvas.ontouchstart=function(e){e.preventDefault();d=true;var p=gp(e);S.sigCtx.beginPath();S.sigCtx.moveTo(p.x,p.y)};S.sigCanvas.onmousemove=S.sigCanvas.ontouchmove=function(e){if(!d)return;e.preventDefault();var p=gp(e);S.sigCtx.lineTo(p.x,p.y);S.sigCtx.stroke()};S.sigCanvas.onmouseup=S.sigCanvas.ontouchend=S.sigCanvas.onmouseleave=function(){d=false}};
S.clearSig=function(){if(S.sigCtx&&S.sigCanvas)S.sigCtx.clearRect(0,0,S.sigCanvas.width,S.sigCanvas.height)};
S.saveFSign=async function(){if(!S.sigCanvas||!S.sigId){showToast('Draw signature','error');return}var d=S.sigCanvas.toDataURL();S.loading('Verifying...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.logbookEntries,S.sigId,{fieldSupervisorStatus:'verified',fieldSupervisorSignature:d,fieldSupervisorReviewedAt:new Date().toISOString()}));S.closeMod('modalSignature');S.sigId=null;S.hideLoading();showToast('Verified!','success');await S.loadFieldSupervisorData();S.render()}catch(er){S.hideLoading();showToast('Error','error')}};
S.saveUSign=async function(){if(!S.sigCanvas||!S.sigId){showToast('Draw signature','error');return}var d=S.sigCanvas.toDataURL();S.loading('Approving...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.logbookEntries,S.sigId,{status:'Approved',supervisorSignature:d,reviewedAt:new Date().toISOString()}));S.closeMod('modalSignature');S.sigId=null;S.hideLoading();showToast('Approved!','success');await S.loadSupervisorData();S.render()}catch(er){S.hideLoading();showToast('Error','error')}};

// ===== ASSESSMENTS =====
S.calculateGrade=function(m){m=parseInt(m)||0;if(m>=70)return{grade:'A',cssClass:'grade-a'};if(m>=60)return{grade:'B+',cssClass:'grade-bplus'};if(m>=50)return{grade:'B',cssClass:'grade-b'};if(m>=40)return{grade:'C',cssClass:'grade-c'};return{grade:'Supplementary',cssClass:'grade-supp'}};
S.findAssessmentRecord=async function(sid,title){try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.assessments,[Q.equal('studentId',sid),Q.equal('title',title),Q.limit(1)]));return r.documents.length?r.documents[0]:null}catch(e){return null}};
S.toggleBulkAll=function(prefix,checked,count){for(var i=0;i<count;i++){var el=document.getElementById(prefix+i);if(el)el.checked=checked}};
S.renderAssessments=function(){var h='<div class="glass-card"><div class="flex-between"><h2>Assessments</h2><button class="close-btn" onclick="app.goDash()"><i class="fas fa-times"></i></button></div>';if(S.role==='university_supervisor'){h+='<div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-lg btn-purple" style="flex:1" onclick="app.openAddAssessment()"><i class="fas fa-user"></i> One Student</button><button class="btn btn-lg btn-purple" style="flex:1" onclick="app.openBulkAssessment()"><i class="fas fa-users"></i> Bulk Marks</button></div>'}if(S.role==='field_supervisor'){h+='<div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-lg btn-fs" style="flex:1" onclick="app.openFieldAssessment()"><i class="fas fa-user"></i> One Student</button><button class="btn btn-lg btn-fs" style="flex:1" onclick="app.openBulkFieldAssessment()"><i class="fas fa-users"></i> Bulk Marks</button></div>'}if(!S.assessments||S.assessments.length===0){h+='<div class="empty-state"><p>No assessments</p></div>'}else{S.assessments.forEach(function(a){var g=S.calculateGrade(a.totalMarks);h+='<div class="assessment-card"><div class="flex-between"><div><strong>'+(a.title||'Assessment')+'</strong><div style="font-size:0.7rem">'+new Date(a.createdAt).toLocaleDateString()+'</div></div><div><span class="grade-badge '+g.cssClass+'">'+g.grade+(a.uniDone?'':' (provisional)')+'</span><div style="font-size:0.7rem">'+a.totalMarks+'/100</div></div></div><div style="font-size:0.7rem">Field: '+(a.fieldDone?(a.fieldMarks||0)+'/100':'Pending')+' | Uni: '+(a.uniDone?(a.uniMarks||0)+'/100':'Pending')+'</div></div>';});}h+='</div>';return h};

// ----- shared merge logic (single record per student+title, filled in by field sup then uni sup) -----
S.applyFieldMarks=async function(sid,title,fm){var ea=await S.findAssessmentRecord(sid,title);var um=ea?(ea.uniMarks||0):0,uniDone=ea?!!ea.uniDone:false;var tm=uniDone?Math.round((fm+um)/2):fm;var g=S.calculateGrade(tm);if(ea){await safeOp(db.updateDocument(AC.databaseId,AC.collections.assessments,ea.$id,{fieldMarks:fm,fieldDone:true,totalMarks:tm,grade:g.grade,fieldSupervisorId:S.user.$id}))}else{await safeOp(db.createDocument(AC.databaseId,AC.collections.assessments,ID.unique(),{studentId:sid,supervisorId:'unassigned',fieldSupervisorId:S.user.$id,title:title,fieldMarks:fm,fieldDone:true,uniMarks:0,uniDone:false,totalMarks:tm,grade:g.grade,isDeleted:false,createdAt:new Date().toISOString()}))}try{var stu=S.allUsers.find(function(u){return u.$id===sid});if(stu&&stu.supervisorId){await S.notify(stu.supervisorId,'Field Marks Submitted','Field marks submitted for '+(stu.fullName||'student')+' ('+title+'). You can now add your marks.','field_marks_submitted').catch(function(){})}}catch(notifErr){}};
S.applyUniMarks=async function(sid,title,um){var ea=await S.findAssessmentRecord(sid,title);if(!ea||!ea.fieldDone)return{blocked:true};var fm=ea.fieldMarks||0;var tm=Math.round((fm+um)/2);var g=S.calculateGrade(tm);await safeOp(db.updateDocument(AC.databaseId,AC.collections.assessments,ea.$id,{uniMarks:um,uniDone:true,totalMarks:tm,grade:g.grade,supervisorId:S.user.$id}));await S.notify(sid,'Assessment Marks Sent',title+': '+tm+'/100 - Grade '+g.grade,'assessment_marks').catch(function(){});return{blocked:false,total:tm,grade:g.grade}};

// ----- field supervisor: one student -----
S.openFieldAssessment=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.fieldSupervisorId===S.user.$id});var h='<div class="modal-content" style="max-width:600px"><div class="modal-header"><h3>Field Marks</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><form onsubmit="app.saveFieldMarks(event)"><div class="form-group"><label>Student</label><select id="fieldAssessStudentId" required><option value="">Select...</option>';st.forEach(function(s){h+='<option value="'+s.$id+'">'+s.fullName+'</option>'});h+='</select></div><div class="form-group"><label>Title</label><input type="text" id="fieldAssessTitle" required></div><div class="form-group"><label>Field Marks (0-100)</label><input type="number" id="fieldAssessMarks" min="0" max="100" required></div><button type="submit" class="btn btn-lg btn-fs" style="width:100%">Save</button></form></div>';S.openMod('modalReviewEntry',h)};
S.saveFieldMarks=async function(e){e.preventDefault();var sid=document.getElementById('fieldAssessStudentId').value,title=document.getElementById('fieldAssessTitle').value.trim(),fm=parseInt(document.getElementById('fieldAssessMarks').value)||0;if(!sid||!title){showToast('Fill fields','error');return}S.loading('Saving...');try{await S.applyFieldMarks(sid,title,fm);S.hideLoading();S.closeMod('modalReviewEntry');await S.loadAssess();S.render();showToast('Field marks saved!','success')}catch(er){S.hideLoading();showToast('Error','error')}};

// ----- field supervisor: bulk (same marks for many students at once) -----
S.openBulkFieldAssessment=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.fieldSupervisorId===S.user.$id});if(st.length===0){showToast('No students assigned','warning');return}var h='<div class="modal-content" style="max-width:600px"><div class="modal-header"><h3>Bulk Field Marks</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><div class="form-group"><label>Title</label><input type="text" id="bulkFieldTitle" required></div><div class="form-group"><label>Field Marks (0-100) - applied to all selected</label><input type="number" id="bulkFieldMarks" min="0" max="100" required></div><div class="flex-between" style="margin:8px 0"><strong style="font-size:0.75rem">Students ('+st.length+')</strong><label style="font-size:0.72rem"><input type="checkbox" id="bulkFieldSelectAll" checked onclick="app.toggleBulkAll(\'bulkFieldStu_\',this.checked,'+st.length+')"> Select All</label></div><div style="max-height:220px;overflow-y:auto;border:1px solid var(--o);border-radius:8px;padding:6px">'+st.map(function(s,i){return'<label style="display:flex;align-items:center;gap:8px;padding:6px;font-size:0.78rem"><input type="checkbox" id="bulkFieldStu_'+i+'" value="'+s.$id+'" checked> '+s.fullName+'</label>'}).join('')+'</div><button class="btn btn-lg btn-fs" style="width:100%;margin-top:10px" onclick="app.saveBulkFieldMarks('+st.length+')">Save for Selected</button></div>';S.openMod('modalReviewEntry',h)};
S.saveBulkFieldMarks=async function(count){var title=document.getElementById('bulkFieldTitle').value.trim(),fm=parseInt(document.getElementById('bulkFieldMarks').value)||0;if(!title){showToast('Enter title','error');return}var ids=[];for(var i=0;i<count;i++){var el=document.getElementById('bulkFieldStu_'+i);if(el&&el.checked)ids.push(el.value)}if(ids.length===0){showToast('Select at least one student','error');return}S.loading('Saving for '+ids.length+' students...');try{for(var j=0;j<ids.length;j++){await S.applyFieldMarks(ids[j],title,fm)}S.hideLoading();S.closeMod('modalReviewEntry');await S.loadAssess();S.render();showToast('Saved for '+ids.length+' students!','success')}catch(er){S.hideLoading();showToast('Error','error')}};

// ----- university supervisor: one student -----
S.openAddAssessment=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.supervisorId===S.user.$id});var h='<div class="modal-content" style="max-width:600px"><div class="modal-header"><h3>New Assessment</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><form onsubmit="app.saveAssessment(event)"><div class="form-group"><label>Student</label><select id="assessStudentId" required><option value="">Select...</option>';st.forEach(function(s){h+='<option value="'+s.$id+'">'+s.fullName+'</option>'});h+='</select></div><div class="form-group"><label>Title</label><input type="text" id="assessTitle" required></div><div class="form-group"><label>Uni Marks (0-100)</label><input type="number" id="assessUniMarks" min="0" max="100" required></div><button type="submit" class="btn btn-lg btn-purple" style="width:100%">Save & Send</button></form></div>';S.openMod('modalReviewEntry',h)};
S.saveAssessment=async function(e){e.preventDefault();var sid=document.getElementById('assessStudentId').value,title=document.getElementById('assessTitle').value.trim(),um=parseInt(document.getElementById('assessUniMarks').value)||0;if(!sid||!title){showToast('Fill fields','error');return}S.loading('Saving...');try{var res=await S.applyUniMarks(sid,title,um);S.hideLoading();if(res.blocked){showToast('Field supervisor has not submitted marks for this student yet','error');return}S.closeMod('modalReviewEntry');await S.loadAssess();S.render();showToast('Marks sent to student!','success')}catch(er){S.hideLoading();showToast('Error','error')}};

// ----- university supervisor: bulk (same marks for many students at once) -----
S.openBulkAssessment=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.supervisorId===S.user.$id});if(st.length===0){showToast('No students assigned','warning');return}var h='<div class="modal-content" style="max-width:600px"><div class="modal-header"><h3>Bulk Assessment Marks</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><div class="form-group"><label>Title</label><input type="text" id="bulkUniTitle" required></div><div class="form-group"><label>Uni Marks (0-100) - applied to all selected</label><input type="number" id="bulkUniMarks" min="0" max="100" required></div><div class="flex-between" style="margin:8px 0"><strong style="font-size:0.75rem">Students ('+st.length+')</strong><label style="font-size:0.72rem"><input type="checkbox" id="bulkUniSelectAll" checked onclick="app.toggleBulkAll(\'bulkUniStu_\',this.checked,'+st.length+')"> Select All</label></div><div style="max-height:220px;overflow-y:auto;border:1px solid var(--o);border-radius:8px;padding:6px">'+st.map(function(s,i){return'<label style="display:flex;align-items:center;gap:8px;padding:6px;font-size:0.78rem"><input type="checkbox" id="bulkUniStu_'+i+'" value="'+s.$id+'" checked> '+s.fullName+'</label>'}).join('')+'</div><button class="btn btn-lg btn-purple" style="width:100%;margin-top:10px" onclick="app.saveBulkAssessment('+st.length+')">Save & Send to Selected</button></div>';S.openMod('modalReviewEntry',h)};
S.saveBulkAssessment=async function(count){var title=document.getElementById('bulkUniTitle').value.trim(),um=parseInt(document.getElementById('bulkUniMarks').value)||0;if(!title){showToast('Enter title','error');return}var ids=[];for(var i=0;i<count;i++){var el=document.getElementById('bulkUniStu_'+i);if(el&&el.checked)ids.push(el.value)}if(ids.length===0){showToast('Select at least one student','error');return}S.loading('Sending to '+ids.length+' students...');try{var sent=0,blocked=0;for(var j=0;j<ids.length;j++){var res=await S.applyUniMarks(ids[j],title,um);if(res.blocked)blocked++;else sent++}S.hideLoading();S.closeMod('modalReviewEntry');await S.loadAssess();S.render();if(blocked>0)showToast('Sent to '+sent+' student(s). '+blocked+' skipped - field marks not submitted yet.','warning');else showToast('Marks sent to '+sent+' students!','success')}catch(er){S.hideLoading();showToast('Error','error')}};

// ===== CHECK IN/OUT, EXPORT, TASKS =====
S.checkIn=async function(){if(S.role!=='student')return;var t=new Date().toISOString().split('T')[0];try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.equal('checkInDate',t)]));if(r.documents.length){showToast('Already checked in','warning');return}await safeOp(db.createDocument(AC.databaseId,AC.collections.attendance,ID.unique(),{studentId:S.user.$id,checkInDate:t,checkInTime:new Date().toISOString(),weekNumber:S.week,status:'present'}));showToast('Checked in!','success')}catch(er){showToast('Error','error')}};
S.checkOut=async function(){if(S.role!=='student')return;var t=new Date().toISOString().split('T')[0];try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.equal('checkInDate',t)]));if(!r.documents.length){showToast('Check in first','warning');return}await safeOp(db.updateDocument(AC.databaseId,AC.collections.attendance,r.documents[0].$id,{checkOutTime:new Date().toISOString()}));showToast('Checked out','success')}catch(er){showToast('Error','error')}};
S.openExport=function(){var h='<div class="modal-content" style="max-width:500px"><div class="modal-header"><h3>Export</h3><button class="close-btn" onclick="app.closeMod(\'modalExport\')"><i class="fas fa-times"></i></button></div><div style="display:flex;flex-direction:column;gap:8px"><button class="btn btn-lg" onclick="app.exportPDF()">PDF</button><button class="btn btn-lg btn-outline" onclick="app.exportWord()">Word</button><button class="btn btn-lg btn-success" onclick="app.exportExcel()">Excel</button></div></div>';S.openMod('modalExport',h)};
S.exportPDF=function(){if(typeof window.jspdf==='undefined')return;var e=S.entries||[];if(e.length===0)return;var doc=new window.jspdf.jsPDF();doc.text('Logbook',15,20);e.forEach(function(x,i){var y=30+i*20;if(y>270){doc.addPage();y=20}doc.text((i+1)+'. '+x.activityTitle,15,y)});doc.save('logbook.pdf');S.closeMod('modalExport')};
S.exportWord=function(){var e=S.entries||[];var t='Logbook\n\n';e.forEach(function(x,i){t+=(i+1)+'. '+x.activityTitle+'\n'+new Date(x.entryDate).toLocaleDateString()+'\n\n'});var b=new Blob([t],{type:'application/msword'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='logbook.doc';a.click();S.closeMod('modalExport')};
S.exportExcel=function(){var e=S.entries||[];var c='No.,Date,Title,Status\n';e.forEach(function(x,i){c+=(i+1)+','+new Date(x.entryDate).toLocaleDateString()+',"'+x.activityTitle+'","'+x.status+'"\n'});var b=new Blob([c],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='logbook.csv';a.click();S.closeMod('modalExport')};
S.renderTasks=function(){var e=S.entries||[];var h='<div class="glass-card"><div class="flex-between"><h2>'+(S.role==='field_supervisor'?'Verification':'Tasks')+'</h2><button class="close-btn" onclick="app.goDash()"><i class="fas fa-times"></i></button></div>';if(e.length===0){h+='<div class="empty-state"><p>No entries</p></div>'}else{h+='<div class="responsive-table"><table><thead><tr><th>Date</th><th>Activity</th><th>Status</th><th>Actions</th></tr></thead><tbody>';e.forEach(function(x){h+='<tr><td>'+new Date(x.entryDate).toLocaleDateString()+'</td><td>'+x.activityTitle+'</td><td><span class="badge badge-info">'+(x.status||'Draft')+'</span></td><td><button class="btn btn-sm btn-outline" onclick="app.viewEntry(\''+x.$id+'\')">View</button></td></tr>'});h+='</tbody></table></div>'}h+='</div>';return h};

// ===== NOTIFICATIONS DRAWER =====
S.markSingleNotif=async function(id,i){try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.notifications,id,{isRead:true}));if(S.notifs[i])S.notifs[i].isRead=true;S.unread=S.notifs.filter(function(n){return !n.isRead}).length;S.updateBadge();S.openNotifDrawer()}catch(e){}};
S.markAllNotifsRead=async function(){if(S.notifs.length===0)return;S.loading('Marking...');try{for(var i=0;i<S.notifs.length;i++){if(!S.notifs[i].isRead){await safeOp(db.updateDocument(AC.databaseId,AC.collections.notifications,S.notifs[i].$id,{isRead:true}));S.notifs[i].isRead=true}}S.unread=0;S.updateBadge();S.hideLoading();S.openNotifDrawer()}catch(e){S.hideLoading()}};
S.deleteSingleNotif=async function(id,i){try{await safeOp(db.deleteDocument(AC.databaseId,AC.collections.notifications,id));S.notifs.splice(i,1);S.unread=S.notifs.filter(function(n){return !n.isRead}).length;S.updateBadge();S.openNotifDrawer()}catch(e){}};
S.deleteAllNotifs=async function(){if(S.notifs.length===0)return;if(!confirm('Delete all?'))return;S.loading('Deleting...');try{for(var i=0;i<S.notifs.length;i++){await safeOp(db.deleteDocument(AC.databaseId,AC.collections.notifications,S.notifs[i].$id))}S.notifs=[];S.unread=0;S.updateBadge();S.hideLoading();S.openNotifDrawer();showToast('Deleted','success')}catch(e){S.hideLoading()}};
S.openNotifDrawer=function(){var d=document.getElementById('drawer'),o=document.getElementById('overlay');if(!d||!o)return;d.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;padding:14px;border-bottom:1px solid var(--o);background:var(--s)"><h3><i class="fas fa-bell" style="color:var(--p)"></i> Notifications ('+S.notifs.length+')</h3><div style="display:flex;gap:6px"><button class="btn btn-sm btn-outline" onclick="app.markAllNotifsRead()">Read All</button><button class="btn btn-sm btn-danger" onclick="app.deleteAllNotifs()">Clear</button><button class="close-btn" onclick="closeDrawer()"><i class="fas fa-times"></i></button></div></div><div style="flex:1;overflow-y:auto;padding:8px">'+(S.notifs.length>0?S.notifs.map(function(n,i){var ts='';try{var dm=Math.floor((new Date()-new Date(n.createdAt))/60000);ts=dm<1?'Just now':dm<60?dm+'m ago':dm<1440?Math.floor(dm/60)+'h ago':Math.floor(dm/1440)+'d ago'}catch(e){}return'<div style="padding:10px 12px;margin-bottom:6px;border-radius:10px;cursor:pointer;'+(n.isRead?'opacity:0.6':'background:rgba(30,64,175,0.04)')+'" onclick="app.markSingleNotif(\''+n.$id+'\','+i+')"><div style="display:flex;justify-content:space-between"><div><strong>'+n.title+'</strong><div style="font-size:0.7rem;color:#64748b">'+n.message+'</div><div style="font-size:0.62rem;color:#94a3b8">'+ts+'</div></div><button class="btn btn-sm btn-danger" onclick="event.stopPropagation();app.deleteSingleNotif(\''+n.$id+'\','+i+')" style="height:20px;width:20px;padding:0">X</button></div></div>'}).join(''):'<div class="empty-state"><p>No notifications</p></div>')+'</div>';d.classList.add('open');o.classList.add('active')};

S.viewStudentEntries=function(sid){var stu=S.allUsers.find(function(u){return u.$id===sid});if(!stu)return;S.loading('Loading...');safeOp(db.listDocuments(AC.databaseId,AC.collections.logbookEntries,[Q.equal('studentId',sid),Q.orderDesc('entryDate'),Q.limit(100)])).then(function(r){S.hideLoading();var se=r.documents;var h='<div class="modal-content" style="max-width:900px"><div class="modal-header"><h3>Entries: '+stu.fullName+'</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div>';if(se.length===0)h+='<div class="empty-state"><p>No entries</p></div>';else{h+='<div class="responsive-table"><table><thead><tr><th>Date</th><th>Activity</th><th>Status</th><th>Actions</th></tr></thead><tbody>';se.forEach(function(x){h+='<tr><td>'+new Date(x.entryDate).toLocaleDateString()+'</td><td>'+x.activityTitle+'</td><td>'+x.status+'</td><td><button class="btn btn-sm btn-outline" onclick="app.viewEntryById(\''+x.$id+'\')">View</button></td></tr>'});h+='</tbody></table></div>'}h+='</div>';S.openMod('modalReviewEntry',h)}).catch(function(){S.hideLoading()})};

S.viewStudentProfile=function(sid){var stu=S.allUsers.find(function(u){return u.$id===sid});if(!stu)return;S.loading('Loading...');safeOp(db.listDocuments(AC.databaseId,AC.collections.profiles,[Q.equal('userId',sid)])).then(function(pr){safeOp(db.listDocuments(AC.databaseId,AC.collections.fieldPlacements,[Q.equal('studentId',sid),Q.orderDesc('createdAt'),Q.limit(1)])).then(function(fpr){S.hideLoading();var p=pr.documents.length>0?pr.documents[0]:{},fp=fpr.documents.length>0?fpr.documents[0]:{};var h='<div class="modal-content" style="max-width:700px"><div class="modal-header"><h3>Profile: '+stu.fullName+'</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><h4>Personal</h4><div style="border:1px solid var(--o);border-radius:8px;padding:8px 12px;margin-bottom:12px">Name: '+stu.fullName+'<br>Reg: '+(stu.registrationNumber||'N/A')+'<br>Email: '+stu.email+'<br>Phone: '+(stu.phone||'N/A')+'</div><h4>Academic</h4><div style="border:1px solid var(--o);border-radius:8px;padding:8px 12px;margin-bottom:12px">Institution: '+(p.institution||'N/A')+'<br>Programme: '+(p.programme||'N/A')+'</div><h4>Field</h4><div style="border:1px solid var(--o);border-radius:8px;padding:8px 12px;margin-bottom:12px">Region: '+(fp.fieldRegion||'N/A')+'<br>District: '+(fp.fieldDistrict||'N/A')+'</div><button class="btn btn-fs" onclick="app.assignFSToStudent(\''+sid+'\')" style="width:100%">Assign FS</button></div>';S.openMod('modalReviewEntry',h)}).catch(function(){S.hideLoading()})}).catch(function(){S.hideLoading()})};
S.showFSStudents=function(){var st=S.allUsers.filter(function(u){return u.role==='student'&&u.fieldSupervisorId===S.user.$id});var h='<div class="modal-content" style="max-width:900px"><div class="modal-header"><h3>My Students ('+st.length+')</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div>';if(st.length===0)h+='<div class="empty-state"><p>No students</p></div>';else{h+='<div class="responsive-table"><table><thead><tr><th>Name</th><th>Reg No</th><th>Entries</th><th>Actions</th></tr></thead><tbody>';st.forEach(function(s){h+='<tr><td>'+s.fullName+'</td><td>'+(s.registrationNumber||'N/A')+'</td><td>'+S.entries.filter(function(e){return e.studentId===s.$id}).length+'</td><td><button class="btn btn-sm btn-outline" onclick="app.viewStudentEntries(\''+s.$id+'\')">Entries</button> <button class="btn btn-sm btn-outline" onclick="app.viewStudentProfile(\''+s.$id+'\')">Profile</button></td></tr>'});h+='</tbody></table></div>'}h+='</div>';S.openMod('modalReviewEntry',h)};

S.assignFSToStudent=function(sid){var st=S.allUsers.find(function(u){return u.$id===sid});if(!st)return;var fsu=S.fieldSupervisors;var h='<div class="modal-content" style="max-width:550px"><div class="modal-header"><h3>Assign FS</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><p>Student: '+st.fullName+'</p><div class="form-group"><label>Field Supervisor</label><select id="fsSelect_'+sid+'"><option value="">Choose...</option>';fsu.forEach(function(f){h+='<option value="'+f.$id+'">'+f.fullName+'</option>'});h+='</select></div><button class="btn btn-lg btn-fs" onclick="app.saveFSAssignment(\''+sid+'\')" style="width:100%">Assign</button></div>';S.openMod('modalReviewEntry',h)};
S.saveFSAssignment=async function(sid){var fsId=document.getElementById('fsSelect_'+sid).value;if(!fsId){showToast('Select FS','error');return}S.loading('Assigning...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,sid,{fieldSupervisorId:fsId}));S.hideLoading();S.closeMod('modalReviewEntry');await S.loadData();S.render();showToast('Assigned!','success')}catch(er){S.hideLoading();showToast('Error','error')}};
S.approveSupRequest=async function(sid){var stu=S.allUsers.find(function(u){return u.$id===sid});if(!stu||!stu.supervisorId)return;S.loading('Approving...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,sid,{supervisorStatus:'approved'}));await S.notify(sid,'Supervisor Approved','Your request has been approved.','supervisor_approved').catch(function(){});if(stu.supervisorId)await S.notify(stu.supervisorId,'New Student',stu.fullName+' assigned to you.','student_assigned').catch(function(){});S.hideLoading();await S.loadData();S.render();showToast('Approved!','success')}catch(er){S.hideLoading();showToast('Error','error')}};
S.rejectSupRequest=async function(sid){var r=prompt('Reason (optional):');if(r===null)return;S.loading('Rejecting...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,sid,{supervisorId:null,supervisorStatus:null}));S.hideLoading();await S.loadData();S.render();showToast('Rejected','success')}catch(er){S.hideLoading();showToast('Error','error')}};
S.showAnnouncementsManager=async function(){if(S.role!=='department'&&S.role!=='admin'){showToast('Not authorized','error');return}S.loading('Loading...');try{var r=await safeOp(db.listDocuments(AC.databaseId,AC.collections.announcements,[Q.orderDesc('createdAt'),Q.limit(50)]));S.hideLoading();S.renderAnnouncementsModal(r.documents)}catch(er){S.hideLoading();showToast('Error','error')}};
S.renderAnnouncementsModal=function(list){var h='<div class="modal-content" style="max-width:600px"><div class="modal-header"><h3><i class="fas fa-bullhorn"></i> Announcements</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div>';h+='<div class="form-group"><label>New Announcement</label><textarea id="newAnnounceMsg" rows="2" placeholder="Type announcement for students and supervisors..."></textarea></div><button class="btn btn-lg btn-purple" style="width:100%;margin-bottom:14px" onclick="app.createAnnouncement()"><i class="fas fa-paper-plane"></i> Post</button>';if(!list||list.length===0){h+='<div class="empty-state"><i class="fas fa-bullhorn"></i><p>No announcements yet</p></div>'}else{list.forEach(function(a){h+='<div style="padding:10px;border:1px solid var(--o);border-radius:8px;margin-bottom:6px"><div class="flex-between"><div style="flex:1;min-width:0"><div style="font-size:0.8rem">'+a.message+'</div><div style="font-size:0.65rem;color:#94a3b8;margin-top:2px">'+new Date(a.createdAt).toLocaleString()+' <span class="badge '+(a.isActive?'badge-success':'badge-danger')+'">'+(a.isActive?'Active':'Off')+'</span></div></div><div style="display:flex;gap:4px"><button class="btn btn-sm btn-outline" onclick="app.toggleAnnouncement(\''+a.$id+'\','+(!a.isActive)+')">'+(a.isActive?'Turn Off':'Turn On')+'</button><button class="btn btn-sm btn-danger" onclick="app.deleteAnnouncement(\''+a.$id+'\')"><i class="fas fa-trash"></i></button></div></div></div>'});}h+='</div>';S.openMod('modalReviewEntry',h)};
S.createAnnouncement=async function(){var t=document.getElementById('newAnnounceMsg'),msg=t?t.value.trim():'';if(!msg){showToast('Type a message','error');return}S.loading('Posting...');try{await safeOp(db.createDocument(AC.databaseId,AC.collections.announcements,ID.unique(),{message:msg,isActive:true,createdBy:S.user.$id,createdByName:S.user.fullName||'Department',createdAt:new Date().toISOString()}));S.hideLoading();showToast('Posted!','success');await S.loadAnnouncements();S.renderAnnounceBanner();S.showAnnouncementsManager()}catch(er){S.hideLoading();showToast('Error','error')}};
S.toggleAnnouncement=async function(id,val){try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.announcements,id,{isActive:val}));showToast('Updated','success');await S.loadAnnouncements();S.renderAnnounceBanner();S.showAnnouncementsManager()}catch(er){showToast('Error','error')}};
S.deleteAnnouncement=async function(id){if(!confirm('Delete this announcement?'))return;try{await safeOp(db.deleteDocument(AC.databaseId,AC.collections.announcements,id));showToast('Deleted','success');await S.loadAnnouncements();S.renderAnnounceBanner();S.showAnnouncementsManager()}catch(er){showToast('Error','error')}};
S.departmentReports=function(){var st=S.allUsers.filter(function(u){return u.role==='student'});var h='<div class="modal-content" style="max-width:700px"><div class="modal-header"><h3>Reports</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><div class="db-grid"><div class="db-card"><div class="card-value">'+st.length+'</div><div class="card-label">Students</div></div><div class="db-card"><div class="card-value">'+st.filter(function(u){return u.fieldSupervisorId}).length+'</div><div class="card-label">With FS</div></div></div></div>';S.openMod('modalReviewEntry',h)};
S.showAllUsers=function(){var h='<div class="modal-content" style="max-width:1000px"><div class="modal-header"><h3>All Users ('+S.allUsers.length+')</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><div class="responsive-table"><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody>';S.allUsers.forEach(function(u){h+='<tr><td>'+u.fullName+'</td><td>'+u.email+'</td><td><span class="badge badge-info">'+u.role+'</span></td><td>'+(u.accountStatus==='active'?'Active':'Disabled')+'</td><td style="display:flex;gap:4px"><button class="btn btn-sm btn-outline" onclick="app.changeUserRole(\''+u.$id+'\',\''+u.role+'\')">Role</button><button class="btn btn-sm btn-outline" onclick="app.toggleUserStatus(\''+u.$id+'\',\''+u.accountStatus+'\')">'+(u.accountStatus==='active'?'Disable':'Activate')+'</button><button class="btn btn-sm btn-warning" onclick="app.resetUserPassword(\''+u.$id+'\')">Pwd</button></td></tr>'});h+='</tbody></table></div></div>';S.openMod('modalReviewEntry',h)};
S.changeUserRole=async function(uid,cr){var roles=[{v:'student',l:'Student'},{v:'university_supervisor',l:'Uni Sup'},{v:'field_supervisor',l:'Field Sup'},{v:'department',l:'Department'},{v:'admin',l:'Admin'}];var h='<div class="modal-content" style="max-width:450px"><div class="modal-header"><h3>Change Role</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><div class="form-group"><label>New Role</label><select id="newRole_'+uid+'">'+roles.map(function(r){return'<option value="'+r.v+'" '+(r.v===cr?'selected':'')+'>'+r.l+'</option>'}).join('')+'</select></div><button class="btn btn-lg btn-purple" onclick="app.saveRoleChange(\''+uid+'\')" style="width:100%">Save</button></div>';S.openMod('modalReviewEntry',h)};
S.saveRoleChange=async function(uid){var nr=document.getElementById('newRole_'+uid).value;S.loading('Changing...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,uid,{role:nr}));S.hideLoading();S.closeMod('modalReviewEntry');await S.loadData();S.render();showToast('Role changed','success')}catch(er){S.hideLoading();showToast('Error','error')}};
S.toggleUserStatus=async function(uid,cs){var ns=cs==='active'?'disabled':'active';S.loading('Updating...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,uid,{accountStatus:ns}));S.hideLoading();await S.loadData();S.render();showToast('Status: '+ns,'success')}catch(er){S.hideLoading();showToast('Error','error')}};
S.resetUserPassword=async function(uid){if(!confirm('Reset password? Temp: 12345678'))return;S.loading('Resetting...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,uid,{mustChangePassword:true,tempPasswordCreatedAt:new Date().toISOString(),tempPasswordExpiry:new Date(Date.now()+30*60*1000).toISOString()}));S.hideLoading();showToast('Password reset!','success')}catch(er){S.hideLoading();showToast('Error','error')}};
S.createSup=function(){var h='<div class="modal-content" style="max-width:500px"><div class="modal-header"><h3>Create Supervisor</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><form onsubmit="app.saveSup(event)"><div class="form-group"><label>Name</label><input type="text" id="supFullName" required></div><div class="form-group"><label>Email</label><input type="email" id="supEmail" required></div><div class="form-group"><label>Phone</label><input type="text" id="supPhone" required></div><div class="form-group"><label>Role</label><select id="supRole" required><option value="">Select</option><option value="university_supervisor">Uni Sup</option><option value="field_supervisor">Field Sup</option></select></div><div class="grid grid-2"><div class="form-group"><label>Password</label><div class="password-wrapper"><input type="password" id="supPassword" required><button type="button" class="password-toggle" onclick="togglePassword(\'supPassword\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm</label><div class="password-wrapper"><input type="password" id="supConfirmPassword" required><button type="button" class="password-toggle" onclick="togglePassword(\'supConfirmPassword\',this)"><i class="fas fa-eye"></i></button></div></div></div><button type="submit" class="btn btn-lg btn-success" style="width:100%">Create</button></form></div>';S.openMod('modalReviewEntry',h)};
S.saveSup=async function(e){e.preventDefault();var sp=document.getElementById('supPassword').value,sc=document.getElementById('supConfirmPassword').value;if(sp!==sc){showToast('Mismatch','error');return}var se=document.getElementById('supEmail').value.trim(),sn=document.getElementById('supFullName').value.trim(),sph=document.getElementById('supPhone').value.trim(),srole=document.getElementById('supRole').value;if(!srole){showToast('Select role','error');return}var prefix=srole==='field_supervisor'?'FS-':'SUP-',regNo=prefix+Math.floor(10000000+Math.random()*90000000);S.loading('Creating...');try{var newAcc=await account.create(ID.unique(),se,sp,sn);await safeOp(db.createDocument(AC.databaseId,AC.collections.users,newAcc.$id,{fullName:sn,registrationNumber:regNo,email:se,phone:sph,role:srole,accountStatus:'active',isFirstLogin:false,createdAt:new Date().toISOString()}));S.hideLoading();S.closeMod('modalReviewEntry');await S.loadData();S.render();showToast('Created! Reg: '+regNo,'success')}catch(er){S.hideLoading();showToast('Error','error')}};

S.showRecoveryRequests=async function(){S.loading('Loading...');var r=[];try{var res=await safeOp(db.listDocuments(AC.databaseId,AC.collections.recoveryRequests,[Q.orderDesc('createdAt'),Q.limit(100)]));r=res.documents}catch(e){}S.hideLoading();var h='<div class="modal-content" style="max-width:900px"><div class="modal-header"><h3>Password Requests ('+r.length+')</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div>';if(r.length===0){h+='<div class="empty-state"><p>No requests</p></div>'}else{h+='<div class="responsive-table"><table><thead><tr><th>Name</th><th>Reg No</th><th>Email</th><th>Status</th><th>Actions</th></tr></thead><tbody>';r.forEach(function(req){var sb=req.status==='pending'?'badge-warning':'badge-success';h+='<tr><td>'+(req.fullName||'Unknown')+'</td><td>'+(req.regNo||'N/A')+'</td><td>'+(req.email||'N/A')+'</td><td><span class="badge '+sb+'">'+(req.status||'N/A')+'</span></td><td>'+(req.status==='pending'?'<button class="btn btn-sm btn-warning" onclick="app.generateTempPassword(\''+req.userId+'\',\''+req.$id+'\',\''+(req.fullName||'').replace(/'/g,"\\'")+'\')">Generate</button> ':'')+'<button class="btn btn-sm btn-danger" onclick="app.deleteRecoveryRequest(\''+req.$id+'\')">Delete</button></td></tr>'});h+='</tbody></table></div>'}h+='</div>';S.openMod('modalReviewEntry',h)};
S.generateTempPassword=async function(uid,reqId,name){if(!confirm('Generate temp password (12345678) for '+name+'?'))return;S.loading('Generating...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,uid,{mustChangePassword:true,tempPasswordCreatedAt:new Date().toISOString(),tempPasswordExpiry:new Date(Date.now()+30*60*1000).toISOString()}));try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.recoveryRequests,reqId,{status:'completed'}))}catch(e){}await S.notify(uid,'Password Reset','Temp: 12345678','password_reset').catch(function(){});S.hideLoading();S.closeMod('modalReviewEntry');var popup=document.createElement('div');popup.className='popup-overlay';popup.innerHTML='<div class="popup-card"><h2>Temp Password</h2><p>For: '+name+'</p><code style="font-size:2rem">12345678</code><button class="btn btn-lg" style="width:100%" onclick="navigator.clipboard.writeText(\'12345678\')">Copy</button><button class="btn btn-sm" style="width:100%;margin-top:8px" onclick="this.closest(\'.popup-overlay\').remove()">Close</button></div>';document.body.appendChild(popup);popup.onclick=function(e){if(e.target===popup)popup.remove()};showToast('Generated!','success')}catch(er){S.hideLoading();showToast('Error','error')}};
S.deleteRecoveryRequest=async function(id){if(!confirm('Delete?'))return;try{await safeOp(db.deleteDocument(AC.databaseId,AC.collections.recoveryRequests,id));showToast('Deleted','success');S.closeMod('modalReviewEntry')}catch(e){showToast('Error','error')}};

S.renderAuth=function(){return'<div class="auth-wrapper"><div class="auth-container"><div class="auth-card"><div class="auth-logo"><img src="'+LOGO+'" alt="HAS"><h1>HAS FIELD SYSTEM</h1></div>'+(S.view==='login'?S.renderLogin():S.view==='register'?S.renderRegister():S.view==='forgot'?S.renderForgot():'')+'</div></div></div>'};
S.renderLogin=function(){return'<form onsubmit="app.handleLogin(event)"><div class="form-group"><label>Reg Number</label><input type="text" id="loginRegNo" required></div><div class="form-group"><label>Password</label><div class="password-wrapper"><input type="password" id="loginPassword" required><button type="button" class="password-toggle" onclick="togglePassword(\'loginPassword\',this)"><i class="fas fa-eye"></i></button></div></div><button type="submit" class="btn-auth" id="loginBtn">Sign In</button></form><div class="auth-links"><p>No account? <a onclick="app.switchView(\'register\')">Create</a></p><p><a onclick="app.switchView(\'forgot\')">Forgot Password?</a></p></div>'};
S.renderRegister=function(){return'<form onsubmit="app.handleRegister(event)"><div class="form-group"><label>Full Name</label><input type="text" id="regFullName" required></div><div class="grid grid-2"><div class="form-group"><label>Reg Number</label><input type="text" id="regRegNo" required></div><div class="form-group"><label>Phone</label><input type="tel" id="regPhone" required></div></div><div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div><div class="grid grid-2"><div class="form-group"><label>Password</label><div class="password-wrapper"><input type="password" id="regPassword" minlength="8" required><button type="button" class="password-toggle" onclick="togglePassword(\'regPassword\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm</label><div class="password-wrapper"><input type="password" id="regConfirmPassword" minlength="8" required><button type="button" class="password-toggle" onclick="togglePassword(\'regConfirmPassword\',this)"><i class="fas fa-eye"></i></button></div></div></div><button type="submit" class="btn-auth" id="regBtn">Create Account</button></form><div class="auth-links"><p>Have account? <a onclick="app.switchView(\'login\')">Sign In</a></p></div>'};
S.renderForgot=function(){return'<form onsubmit="app.handleForgot(event)"><div style="margin-bottom:14px;padding:14px;background:rgba(30,64,175,0.04);border-radius:12px"><p style="font-weight:600;color:var(--p)"><i class="fas fa-lock"></i> Password Recovery</p><p style="font-size:0.7rem;color:#64748b">Enter your details. Admin will send a temporary password.</p></div><div class="form-group"><label>Reg Number</label><input type="text" id="forgotRegNo" required></div><div class="form-group"><label>Email</label><input type="email" id="forgotEmail" required></div><button type="submit" class="btn-auth" id="forgotBtn">Send Request</button></form><div id="recoverySection" class="hidden" style="margin-top:14px;padding-top:14px;border-top:2px dashed var(--o)"><p style="color:var(--su)"><i class="fas fa-check-circle"></i> Request sent!</p><a href="https://wa.link/va934h" target="_blank" class="whatsapp-btn" style="margin-top:12px"><i class="fab fa-whatsapp"></i> Contact Support</a></div><div class="auth-links"><p><a onclick="app.switchView(\'login\')">Back to Sign In</a></p></div>'};
S.handleLogin=async function(e){e.preventDefault();var rn=document.getElementById('loginRegNo').value.trim(),pw=document.getElementById('loginPassword').value;if(!rn||!pw){showToast('Fill all fields','error');return}var btn=document.getElementById('loginBtn');if(btn){btn.disabled=true;btn.innerHTML='Signing in...'}try{var users=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('registrationNumber',rn)]));var u=users.documents.length?users.documents[0]:null;if(!u){showToast('Invalid','error');if(btn){btn.disabled=false;btn.innerHTML='Sign In'}return}if(u.mustChangePassword){if(u.tempPasswordExpiry&&new Date(u.tempPasswordExpiry)<new Date()){showToast('Temp password expired','error');if(btn){btn.disabled=false;btn.innerHTML='Sign In'}return}S.user=u;S.role=u.role;S.showChangePwdPrompt(u);return}await account.createEmailSession(u.email,pw);await S.checkSession()}catch(er){showToast('Login failed','error');if(btn){btn.disabled=false;btn.innerHTML='Sign In'}}};
S.handleRegister=async function(e){e.preventDefault();var pw=document.getElementById('regPassword').value,pc=document.getElementById('regConfirmPassword').value;if(pw!==pc){showToast('Mismatch','error');return}if(pw.length<8){showToast('Min 8 chars','error');return}var btn=document.getElementById('regBtn');if(btn){btn.disabled=true;btn.innerHTML='Creating...'}try{var em=document.getElementById('regEmail').value.trim(),rn=document.getElementById('regRegNo').value.trim(),nm=document.getElementById('regFullName').value.trim(),ph=document.getElementById('regPhone').value.trim();var ex=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('registrationNumber',rn)]));if(ex.documents.length>0){showToast('Reg No exists','error');btn.disabled=false;btn.innerHTML='Create Account';return}var newAcc=await account.create(ID.unique(),em,pw,nm);await safeOp(db.createDocument(AC.databaseId,AC.collections.users,newAcc.$id,{fullName:nm,registrationNumber:rn,email:em,phone:ph,role:'student',supervisorId:null,accountStatus:'active',isFirstLogin:true,createdAt:new Date().toISOString()}));await account.createEmailSession(em,pw);await S.checkSession()}catch(er){showToast('Error','error');btn.disabled=false;btn.innerHTML='Create Account'}};
S.handleForgot=async function(e){e.preventDefault();var rn=document.getElementById('forgotRegNo').value.trim(),em=document.getElementById('forgotEmail').value.trim();if(!rn||!em){showToast('Fill fields','error');return}var btn=document.getElementById('forgotBtn');if(btn){btn.disabled=true;btn.innerHTML='Sending...'}try{var users=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('email',em),Q.equal('registrationNumber',rn)]));if(!users.documents.length){showToast('No account found','error');if(btn){btn.disabled=false;btn.innerHTML='Send Request'}return}var u=users.documents[0];await safeOp(db.createDocument(AC.databaseId,AC.collections.recoveryRequests,ID.unique(),{userId:u.$id,regNo:rn,email:em,fullName:u.fullName||'Unknown',status:'pending',createdAt:new Date().toISOString()}));try{var admins=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('role','admin'),Q.equal('accountStatus','active')]));for(var i=0;i<admins.documents.length;i++){await S.notify(admins.documents[i].$id,'Password Recovery',u.fullName+' requested recovery.','recovery_request').catch(function(){})}}catch(notifErr){}document.getElementById('recoverySection').classList.remove('hidden');showToast('Request sent!','success')}catch(er){showToast('Error','error')}finally{if(btn){btn.disabled=false;btn.innerHTML='Send Request'}}};
S.showChangePwdPrompt=function(u){var mc=document.getElementById('mainContent');mc.innerHTML='<div class="auth-wrapper"><div class="auth-container"><div class="auth-card"><div style="text-align:center;margin-bottom:20px"><i class="fas fa-lock" style="font-size:3rem;color:#b45309"></i><h1 style="color:#b45309;margin-top:8px">Create New Password</h1></div><p style="text-align:center;font-weight:600">'+u.fullName+'</p><p style="font-size:0.8rem;color:#64748b;text-align:center;margin-bottom:16px">Create a new password to continue.</p><div class="form-group"><label>Temporary Password</label><div class="password-wrapper"><input type="password" id="changeTempPwd" required><button type="button" class="password-toggle" onclick="togglePassword(\'changeTempPwd\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>New Password</label><div class="password-wrapper"><input type="password" id="changeNewPwd" minlength="8" required><button type="button" class="password-toggle" onclick="togglePassword(\'changeNewPwd\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm</label><div class="password-wrapper"><input type="password" id="changeConfPwd" minlength="8" required><button type="button" class="password-toggle" onclick="togglePassword(\'changeConfPwd\',this)"><i class="fas fa-eye"></i></button></div></div><button class="btn-auth" style="background:linear-gradient(135deg,#b45309,#d97706)" onclick="app.completePasswordChange(\''+u.$id+'\',\''+u.email+'\')">Save</button></div></div></div>'};
S.completePasswordChange=async function(uid,email){var tp=document.getElementById('changeTempPwd').value,np=document.getElementById('changeNewPwd').value,cp=document.getElementById('changeConfPwd').value;if(!tp||!np||!cp){showToast('All fields required','error');return}if(np!==cp){showToast('Mismatch','error');return}if(np.length<8){showToast('Min 8 chars','error');return}try{await account.updatePassword(np,tp);try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,uid,{mustChangePassword:false}))}catch(dbErr){}try{await account.deleteSessions()}catch(e){}await account.createEmailSession(email,np);showToast('Updated!','success');await S.checkSession()}catch(e){showToast('Failed','error')}};

// ===== MISC =====
S.logout=async function(){try{await account.deleteSession('current')}catch(e){}S.reset();S.hideAll();document.getElementById('mainContent').innerHTML='';S.view='login';S.loadingInitial=false;S.render();showToast('Logged out','success')};
S.switchView=function(v){S.view=v;if(!S.user)document.getElementById('mainContent').innerHTML='';S.render()};
S.toggleDark=function(){S.dark=!S.dark;document.body.classList.toggle('dark');localStorage.setItem('darkMode',S.dark);S.renderMenu()};
}

// ===== GLOBAL HELPERS =====
function togglePassword(id,btn){var i=document.getElementById(id);if(!i)return;var ic=btn.querySelector('i');if(i.type==='password'){i.type='text';if(ic){ic.classList.remove('fa-eye');ic.classList.add('fa-eye-slash')}}else{i.type='password';if(ic){ic.classList.remove('fa-eye-slash');ic.classList.add('fa-eye')}}}
function closeDrawer(){var d=document.getElementById('drawer'),o=document.getElementById('overlay');if(d){d.classList.remove('open');d.innerHTML=''}if(o)o.classList.remove('active')}
var app=new AppState();window.app=app;window.closeDrawer=closeDrawer;window.togglePassword=togglePassword;window.installPWA=installPWA;
app.init();
</script>
