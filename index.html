S.viewEntryFromAll=function(eid){var entry=(S.entries||[]).find(function(e){return e.$id===eid});if(!entry)return;S.viewEntry(eid)};
S.filterApprovedEntries=function(val){var q=(val||'').trim().toLowerCase();var all=(S.entries||[]).filter(function(x){return x.status==='Approved'});var list=all;if(q){list=all.filter(function(x){var stu=S.allUsers.find(function(u){return u.$id===x.studentId});return(x.activityTitle||'').toLowerCase().indexOf(q)>-1||(stu&&stu.fullName&&stu.fullName.toLowerCase().indexOf(q)>-1)||(stu&&stu.registrationNumber&&stu.registrationNumber.toLowerCase().indexOf(q)>-1)})}var tb=document.getElementById('approvedEntriesBody');if(tb)tb.innerHTML=S.approvedEntriesRowsHTML(list);var cnt=document.getElementById('approvedEntriesCount');if(cnt)cnt.textContent=list.length}
S.showApprovedEntries=function(){var all=(S.entries||[]).filter(function(x){return x.status==='Approved'});var h='<div class="modal-content" style="max-width:1000px"><div class="modal-header"><h3>Approved Entries (<span id="approvedEntriesCount">'+all.length+'</span>)</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><div style="display:flex;gap:8px;margin-bottom:10px"><input type="text" placeholder="Search by student, reg no or activity..." oninput="app.filterApprovedEntries(this.value)" style="flex:1;padding:10px 14px;border:1px solid var(--o);border-radius:10px"><button class="btn btn-sm btn-success" onclick="app.closeMod(\'modalReviewEntry\');app.exportChooseFormat(\'approved\')"><i class="fas fa-download"></i> Export</button></div><div class="responsive-table"><table><thead><tr><th>Student</th><th>Reg No</th><th>Activity</th><th>Date</th><th>Actions</th></tr></thead><tbody id="approvedEntriesBody">'+S.approvedEntriesRowsHTML(all)+'</tbody></table></div></div>';S.openMod('modalReviewEntry',h)};

// ===== GLOBAL SEARCH (Department/Admin) =====
S.globalSearchRun=function(val){var q=(val||'').trim().toLowerCase();var box=document.getElementById('globalSearchResults');if(!box)return;if(!q){box.innerHTML='<div class="empty-state"><p>Type a name, registration number, or activity title to search</p></div>';return}var users=(S.allUsers||[]).filter(function(u){return(u.fullName&&u.fullName.toLowerCase().indexOf(q)>-1)||(u.registrationNumber&&u.registrationNumber.toLowerCase().indexOf(q)>-1)||(u.email&&u.email.toLowerCase().indexOf(q)>-1)}).slice(0,15);var entries=(S.entries||[]).filter(function(x){var stu=S.allUsers.find(function(u){return u.$id===x.studentId});return(x.activityTitle&&x.activityTitle.toLowerCase().indexOf(q)>-1)||(stu&&stu.registrationNumber&&stu.registrationNumber.toLowerCase().indexOf(q)>-1)||(stu&&stu.fullName&&stu.fullName.toLowerCase().indexOf(q)>-1)}).slice(0,15);var h='';var rl={student:'Student',university_supervisor:'Uni Sup',field_supervisor:'Field Sup',department:'Department',admin:'Admin'};h+='<h4 style="margin-bottom:6px">Users ('+users.length+')</h4>';if(users.length===0)h+='<p style="font-size:0.78rem;color:#94a3b8;margin-bottom:12px">No matching users</p>';else{h+='<div class="responsive-table" style="margin-bottom:16px"><table><thead><tr><th>Name</th><th>Reg No</th><th>Role</th><th>Actions</th></tr></thead><tbody>'+users.map(function(u){return'<tr><td>'+u.fullName+'</td><td>'+(u.registrationNumber||'N/A')+'</td><td>'+(rl[u.role]||u.role)+'</td><td>'+(u.role==='student'?('<button class="btn btn-sm btn-outline" onclick="app.viewStudentProfile(\''+u.$id+'\')">Profile</button> <button class="btn btn-sm btn-outline" onclick="app.viewStudentEntries(\''+u.$id+'\')">Entries</button>'):'')+'</td></tr>'}).join('')+'</tbody></table></div>'}h+='<h4 style="margin-bottom:6px">Entries / Jobs ('+entries.length+')</h4>';if(entries.length===0)h+='<p style="font-size:0.78rem;color:#94a3b8">No matching entries</p>';else{h+='<div class="responsive-table"><table><thead><tr><th>Student</th><th>Activity</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+entries.map(function(x){var stu=S.allUsers.find(function(u){return u.$id===x.studentId});return'<tr><td>'+(stu?stu.fullName:'Unknown')+'</td><td>'+(x.activityTitle||'Untitled')+'</td><td>'+new Date(x.entryDate).toLocaleDateString()+'</td><td>'+(x.status||'Draft')+'</td><td><button class="btn btn-sm btn-outline" onclick="app.viewEntryFromAll(\''+x.$id+'\')">View</button></td></tr>'}).join('')+'</tbody></table></div>'}box.innerHTML=h};
S.openGlobalSearch=function(){var h='<div class="modal-content" style="max-width:1000px"><div class="modal-header"><h3><i class="fas fa-magnifying-glass"></i> Global Search</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div><input type="text" id="globalSearchInput" placeholder="Search users, registration numbers, or entries..." oninput="app.globalSearchRun(this.value)" style="width:100%;padding:12px 14px;border:1px solid var(--o);border-radius:10px;margin-bottom:14px" autofocus><div id="globalSearchResults"><div class="empty-state"><p>Type a name, registration number, or activity title to search</p></div></div></div>';S.openMod('modalReviewEntry',h);setTimeout(function(){var i=document.getElementById('globalSearchInput');if(i)i.focus()},150)};

// ===== AUTH =====
S.renderAuth=function(){return'<div class="auth-wrapper"><div class="auth-container"><div class="auth-card"><div class="auth-logo"><img src="'+LOGO+'" alt="FoHS"><h1>FoHS FIELD SYSTEM</h1></div>'+(S.view==='login'?S.renderLogin():S.view==='register'?S.renderRegister():S.view==='forgot'?S.renderForgot():'')+'</div></div></div>'};
S.renderLogin=function(){return'<form onsubmit="app.handleLogin(event)"><div class="form-group"><label>Reg Number</label><input type="text" id="loginRegNo" required></div><div class="form-group"><label>Password</label><div class="password-wrapper"><input type="password" id="loginPassword" required><button type="button" class="password-toggle" onclick="togglePassword(\'loginPassword\',this)"><i class="fas fa-eye"></i></button></div></div><button type="submit" class="btn-auth" id="loginBtn">Sign In</button></form><div class="auth-links"><p>No account? <a onclick="app.switchView(\'register\')">Create Account</a></p><p><a onclick="app.switchView(\'forgot\')">Forgot Password?</a></p><p><a onclick="app.showHelp()"><i class="fas fa-circle-question"></i> Need Help?</a></p></div>'};
S.showHelp=function(){var h='<div class="modal-content" style="max-width:550px"><div class="modal-header"><h3><i class="fas fa-circle-question" style="color:var(--p)"></i> Help & Guidance</h3><button class="close-btn" onclick="app.closeMod(\'modalReviewEntry\')"><i class="fas fa-times"></i></button></div>'+'<div style="margin-bottom:14px"><p style="font-weight:600;color:var(--p)"><i class="fas fa-user-plus"></i> How to Register</p><p style="font-size:0.78rem;color:#64748b">Click "Create" on the login page. Fill in your Full Name, Registration Number (Reg No), Phone, Email and Password (minimum 8 characters), then click "Create Account".</p></div>'+'<div style="margin-bottom:14px"><p style="font-weight:600;color:var(--p)"><i class="fas fa-user-graduate"></i> Completing Your Profile (Students)</p><p style="font-size:0.78rem;color:#64748b">After logging in, go to "Profile" from the menu. Complete every step: Personal, Academic, Field, University Supervisor and Field Supervisor, to reach 100% completion before you can submit entries.</p></div>'+'<div style="margin-bottom:14px"><p style="font-weight:600;color:var(--p)"><i class="fas fa-file-lines"></i> Preparing Your Final Report</p><p style="font-size:0.78rem;color:#64748b">Open "Final Report" from the menu. Fill in Chapters 1, 2, 3, 6, 7, 8 and 9 yourself (your work auto-saves as you type). Chapters 4, 5, 10, 11 and 12 are generated automatically from your logbook entries, attendance and assessment marks, so keep those up to date first. When every chapter is complete, click "Submit for Approval" \u2014 your report locks and your University Supervisor is notified to review it. If they request revision, you will see their comment on the report and can wait for them to unlock it before editing again. Once approved, you can export the final report as PDF, Word or DOCX at any time.</p></div>'+'<div style="margin-bottom:14px"><p style="font-weight:600;color:var(--p)"><i class="fas fa-key"></i> Forgot Your Password?</p><p style="font-size:0.78rem;color:#64748b">Click "Forgot Password?" below the login form and enter your Reg No and Email. FoHS will send you a temporary password via notification.</p></div>'+'<div style="margin-bottom:14px"><p style="font-weight:600;color:var(--p)"><i class="fas fa-wifi"></i> Working Without Internet (Offline Mode)</p><p style="font-size:0.78rem;color:#64748b">You need internet only once, the first time you log in on a device. After that, you can keep filling your logbook, attendance and other forms even with no internet connection \u2014 your work is saved safely on your phone or computer. Everything you did offline is sent to the server automatically as soon as your internet connection comes back, with no extra steps needed from you.</p></div>'+'<div style="padding-top:10px;border-top:2px dashed var(--o)"><p style="font-size:0.78rem;color:#64748b;margin-bottom:8px">For further assistance, contact us directly:</p><a href="https://wa.link/va934h" target="_blank" class="whatsapp-btn"><i class="fab fa-whatsapp"></i> Contact Support</a></div>'+'</div>';S.openMod('modalReviewEntry',h)};
S.renderRegister=function(){return'<form onsubmit="app.handleRegister(event)"><div class="form-group"><label>Full Name</label><input type="text" id="regFullName" required></div><div class="grid grid-2"><div class="form-group"><label>Reg Number</label><input type="text" id="regRegNo" required></div><div class="form-group"><label>Phone</label><input type="tel" id="regPhone" required></div></div><div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div><div class="grid grid-2"><div class="form-group"><label>Password</label><div class="password-wrapper"><input type="password" id="regPassword" minlength="8" required><button type="button" class="password-toggle" onclick="togglePassword(\'regPassword\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm</label><div class="password-wrapper"><input type="password" id="regConfirmPassword" minlength="8" required><button type="button" class="password-toggle" onclick="togglePassword(\'regConfirmPassword\',this)"><i class="fas fa-eye"></i></button></div></div></div><button type="submit" class="btn-auth" id="regBtn">Create Account</button></form><div class="auth-links"><p>Have account? <a onclick="app.switchView(\'login\')">Sign In</a></p></div>'};
S.renderForgot=function(){return'<form onsubmit="app.handleForgot(event)"><div style="margin-bottom:14px;padding:14px;background:rgba(30,64,175,0.04);border-radius:12px"><p style="font-weight:600;color:var(--p)"><i class="fas fa-lock"></i> Password Recovery</p><p style="font-size:0.7rem;color:#64748b">Enter your details. FoHS will send a temporary password.</p></div><div class="form-group"><label>Reg Number</label><input type="text" id="forgotRegNo" required></div><div class="form-group"><label>Email</label><input type="email" id="forgotEmail" required></div><button type="submit" class="btn-auth" id="forgotBtn">Send Request</button></form><div id="recoverySection" class="hidden" style="margin-top:14px;padding-top:14px;border-top:2px dashed var(--o)"><p style="color:var(--su)"><i class="fas fa-check-circle"></i> Request sent!</p><a href="https://wa.link/va934h" target="_blank" class="whatsapp-btn" style="margin-top:12px"><i class="fab fa-whatsapp"></i> Contact Support</a></div><div class="auth-links"><p><a onclick="app.switchView(\'login\')">Back to Sign In</a></p></div>'};
S.handleLogin=async function(e){e.preventDefault();var rn=document.getElementById('loginRegNo').value.trim(),pw=document.getElementById('loginPassword').value;if(!rn||!pw){showToast('Fill all fields','error');return}var btn=document.getElementById('loginBtn');if(btn){btn.disabled=true;btn.innerHTML='Signing in...'}try{var users=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('registrationNumber',rn)]));var u=users.documents.length?users.documents[0]:null;if(!u){showToast('Invalid Reg No or password','error');if(btn){btn.disabled=false;btn.innerHTML='Sign In'}return}if(u.mustChangePassword){if(u.tempPasswordExpiry&&new Date(u.tempPasswordExpiry)<new Date()){showToast('Temp password expired','error');if(btn){btn.disabled=false;btn.innerHTML='Sign In'}return}S.user=u;S.role=u.role;S.showChangePwdPrompt(u);return}await account.createEmailSession(u.email,pw);await S.checkSession();showToast('Logged in successfully!','success')}catch(er){showToast('Login failed','error');if(btn){btn.disabled=false;btn.innerHTML='Sign In'}}};
S.handleRegister=async function(e){e.preventDefault();var pw=document.getElementById('regPassword').value,pc=document.getElementById('regConfirmPassword').value;if(pw!==pc){showToast('Passwords do not match','error');return}if(pw.length<8){showToast('Minimum 8 characters','error');return}var btn=document.getElementById('regBtn');if(btn){btn.disabled=true;btn.innerHTML='Creating...'}try{var em=document.getElementById('regEmail').value.trim(),rn=document.getElementById('regRegNo').value.trim(),nm=document.getElementById('regFullName').value.trim(),ph=document.getElementById('regPhone').value.trim();var ex=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('registrationNumber',rn)]));if(ex.documents.length>0){showToast('Registration number already exists','error');btn.disabled=false;btn.innerHTML='Create Account';return}var newAcc=await account.create(ID.unique(),em,pw,nm);await safeOp(db.createDocument(AC.databaseId,AC.collections.users,newAcc.$id,{fullName:nm,registrationNumber:rn,email:em,phone:ph,role:'student',supervisorId:null,accountStatus:'active',isFirstLogin:true,createdAt:new Date().toISOString()}));await account.createEmailSession(em,pw);await S.checkSession()}catch(er){showToast(getErrMsg(er),'error');btn.disabled=false;btn.innerHTML='Create Account'}};
S.handleForgot=async function(e){e.preventDefault();var rn=document.getElementById('forgotRegNo').value.trim(),em=document.getElementById('forgotEmail').value.trim();if(!rn||!em){showToast('Fill fields','error');return}var btn=document.getElementById('forgotBtn');if(btn){btn.disabled=true;btn.innerHTML='Sending...'}try{var users=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('email',em),Q.equal('registrationNumber',rn)]));if(!users.documents.length){showToast('No account found','error');if(btn){btn.disabled=false;btn.innerHTML='Send Request'}return}var u=users.documents[0];await safeOp(db.createDocument(AC.databaseId,AC.collections.recoveryRequests,ID.unique(),{userId:u.$id,regNo:rn,email:em,fullName:u.fullName||'Unknown',status:'pending',createdAt:new Date().toISOString()}));try{var admins=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('role','admin'),Q.equal('accountStatus','active')]));for(var i=0;i<admins.documents.length;i++){await S.notify(admins.documents[i].$id,'Password Recovery',u.fullName+' requested recovery.','recovery_request').catch(function(){})}}catch(notifErr){}document.getElementById('recoverySection').classList.remove('hidden');showToast('Request sent!','success')}catch(er){showToast(getErrMsg(er),'error')}finally{if(btn){btn.disabled=false;btn.innerHTML='Send Request'}}};
S.showChangePwdPrompt=function(u){var mc=document.getElementById('mainContent');mc.innerHTML='<div class="auth-wrapper"><div class="auth-container"><div class="auth-card"><div style="text-align:center;margin-bottom:20px"><i class="fas fa-lock" style="font-size:3rem;color:#b45309"></i><h1 style="color:#b45309;margin-top:8px">Create New Password</h1></div><p style="text-align:center;font-weight:600">'+u.fullName+'</p><p style="font-size:0.8rem;color:#64748b;text-align:center;margin-bottom:16px">Create a new password to continue.</p><div class="form-group"><label>Temporary Password</label><div class="password-wrapper"><input type="password" id="changeTempPwd" required><button type="button" class="password-toggle" onclick="togglePassword(\'changeTempPwd\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>New Password</label><div class="password-wrapper"><input type="password" id="changeNewPwd" minlength="8" required><button type="button" class="password-toggle" onclick="togglePassword(\'changeNewPwd\',this)"><i class="fas fa-eye"></i></button></div></div><div class="form-group"><label>Confirm</label><div class="password-wrapper"><input type="password" id="changeConfPwd" minlength="8" required><button type="button" class="password-toggle" onclick="togglePassword(\'changeConfPwd\',this)"><i class="fas fa-eye"></i></button></div></div><button class="btn-auth" style="background:linear-gradient(135deg,#b45309,#d97706)" onclick="app.completePasswordChange(\''+u.$id+'\',\''+u.email+'\')">Save</button></div></div></div>'};
S.completePasswordChange=async function(uid,email){var tp=document.getElementById('changeTempPwd').value,np=document.getElementById('changeNewPwd').value,cp=document.getElementById('changeConfPwd').value;if(!tp||!np||!cp){showToast('All fields required','error');return}if(np!==cp){showToast('Passwords do not match','error');return}if(np.length<8){showToast('Minimum 8 characters','error');return}try{await account.createEmailSession(email,tp);await account.updatePassword(np);try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,uid,{mustChangePassword:false}))}catch(dbErr){}showToast('Password updated!','success');await S.checkSession()}catch(e){showToast(getErrMsg(e),'error')}};

// ===== MISC =====
S.logout=async function(){try{await account.deleteSession('current')}catch(e){}S.reset();S.hideAll();document.getElementById('mainContent').innerHTML='';S.view='login';S.loadingInitial=false;S.render();showToast('Logged out','success')};
S.switchView=function(v){S.view=v;if(!S.user)document.getElementById('mainContent').innerHTML='';S.render()};
S.toggleDark=function(){S.dark=!S.dark;document.body.classList.toggle('dark');localStorage.setItem('darkMode',S.dark);S.renderMenu()};
}

// ===== GLOBAL HELPERS =====
function togglePassword(id,btn){var i=document.getElementById(id);if(!i)return;var ic=btn.querySelector('i');if(i.type==='password'){i.type='text';if(ic){ic.classList.remove('fa-eye');ic.classList.add('fa-eye-slash')}}else{i.type='password';if(ic){ic.classList.remove('fa-eye-slash');ic.classList.add('fa-eye')}}}
function closeDrawer(){var d=document.getElementById('drawer'),o=document.getElementById('overlay');if(d){d.classList.remove('open');d.innerHTML=''}if(o)o.classList.remove('active')}
var app=new AppState();window.app=app;window.closeDrawer=closeDrawer;window.togglePassword=togglePassword;window.installPWA=installPWA;
app.init();
</script>
</body>
</html>
