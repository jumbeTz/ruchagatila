<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <meta name="description" content="FoHS FIELD SYSTEM">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FoHS FIELD SYSTEM">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="https://fra.cloud.appwrite.io/v1/storage/buckets/6a426a570026eb00d2a3/files/6a57c85e003e6e4db57b/view?project=6a42691c0006e65e22b2">
    <title>FoHS FIELD SYSTEM</title>
    <link rel="preconnect" href="https://fra.cloud.appwrite.io">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--p:#4F46E5;--pd:#4338CA;--sec:#0D9488;--secd:#0F766E;
--s:#ffffff;--b:#F8FAFC;--os:#0f172a;--o:#e2e8f0;
--e:#DC2626;--su:#16A34A;--w:#D97706;
--accent:#0D9488;--navy:#111827;--purple:#7C3AED;--purpled:#6D28D9;
--fs:#0D9488;--fsd:#0F766E;
--card-bg:rgba(255,255,255,0.72);--card-border:rgba(226,232,240,0.8);
--shadow-sm:0 1px 2px rgba(15,23,42,0.04),0 1px 3px rgba(15,23,42,0.06);
--shadow-md:0 4px 16px -4px rgba(15,23,42,0.08),0 2px 6px -2px rgba(15,23,42,0.06);
--shadow-lg:0 20px 40px -12px rgba(15,23,42,0.14),0 8px 16px -8px rgba(15,23,42,0.08);
--shadow-glow:0 8px 24px -6px rgba(79,70,229,0.35);
--ease:cubic-bezier(0.4,0,0.2,1);
}
.dark{
--s:#0F172A;--b:#020617;--os:#e2e8f0;--o:#1E293B;
--card-bg:rgba(15,23,42,0.68);--card-border:rgba(30,41,59,0.9);
--shadow-sm:0 1px 2px rgba(0,0,0,0.3);
--shadow-md:0 4px 20px -4px rgba(0,0,0,0.45);
--shadow-lg:0 24px 48px -14px rgba(0,0,0,0.55);
}
*{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}
::selection{background:rgba(79,70,229,0.22);color:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.45);border-radius:20px}
::-webkit-scrollbar-thumb:hover{background:rgba(148,163,184,0.7)}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,sans-serif;background:
radial-gradient(1100px 520px at 12% -8%,rgba(79,70,229,0.07),transparent 60%),
radial-gradient(900px 480px at 110% 0%,rgba(14,165,233,0.06),transparent 55%),
var(--b);
color:var(--os);min-height:100dvh;line-height:1.6;overflow-x:hidden;
transition:background 0.4s var(--ease),color 0.3s var(--ease);
-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body.logged-in{padding-top:64px}
h1,h2,h3,h4,.nav-brand,.auth-logo h1,.welcome-hero h1,.menu-header h3,.card-value,.modal-header h3{
font-family:'Outfit',sans-serif;font-weight:700;letter-spacing:-0.01em}

@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popScale{from{transform:scale(0.94);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes gradientSlide{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
@keyframes toastProgress{from{width:100%}to{width:0%}}
@keyframes announceScroll{from{transform:translateX(0)}to{transform:translateX(-100%)}}
@keyframes softPulse{0%,100%{opacity:1}50%{opacity:0.55}}

/* ===== PWA / TOASTS / POPUPS ===== */
.pwa-install-banner{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,var(--navy),var(--p) 60%,var(--sec));color:#fff;padding:12px 16px;z-index:9999;display:none;align-items:center;justify-content:space-between;gap:10px;font-size:0.8rem;box-shadow:var(--shadow-md)}
.pwa-install-banner.show{display:flex;animation:fadeInUp 0.4s var(--ease)}
.offline-bar{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,#92400E,#B45309);color:#fff;padding:9px 16px;z-index:9998;display:none;align-items:center;justify-content:center;gap:8px;font-size:0.76rem;font-weight:600;text-align:center;box-shadow:var(--shadow-md)}
.offline-bar.show{display:flex;animation:fadeInUp 0.4s var(--ease)}
.offline-bar.syncing{background:linear-gradient(135deg,var(--secd),var(--sec))}
body.has-offline-bar{padding-top:34px}
body.has-offline-bar .top-nav{top:34px}
body.has-offline-bar .pwa-install-banner{top:34px}
body.logged-in.has-offline-bar{padding-top:98px}
.toast-container{position:fixed;top:16px;right:16px;z-index:10002;display:flex;flex-direction:column;align-items:flex-end;gap:10px;max-width:450px;pointer-events:none}
.toast-item{background:var(--card-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:16px;padding:13px 15px;box-shadow:var(--shadow-lg);display:inline-flex;align-items:flex-start;gap:10px;pointer-events:all;border:1px solid var(--card-border);min-width:280px;max-width:420px;position:relative;overflow:hidden;animation:toastIn 0.35s var(--ease)}
.popup-overlay{position:fixed;inset:0;background:rgba(2,6,23,0.55);backdrop-filter:blur(4px);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.25s var(--ease)}
.popup-card{background:var(--s);border-radius:20px;padding:26px 22px;max-width:440px;width:100%;box-shadow:var(--shadow-lg);animation:popScale 0.35s var(--ease);border:1px solid var(--o)}

/* ===== TOP NAV ===== */
.top-nav{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(248,250,252,0.72);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(226,232,240,0.7);display:none;align-items:center;justify-content:space-between;padding:0 18px;z-index:500;box-shadow:0 1px 0 rgba(15,23,42,0.03);transition:background 0.3s var(--ease)}
.top-nav.visible{display:flex;animation:fadeInUp 0.4s var(--ease)}
.dark .top-nav{background:rgba(2,6,23,0.72);border-bottom:1px solid rgba(30,41,59,0.8)}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-logo{height:30px;border-radius:8px;cursor:pointer;transition:transform 0.3s var(--ease)}
.nav-logo:hover{transform:scale(1.06) rotate(-2deg)}
.nav-brand{font-weight:700;font-size:0.95rem;cursor:pointer;color:var(--navy);letter-spacing:-0.01em}
.dark .nav-brand{color:var(--os)}
.nav-right{display:flex;align-items:center;gap:4px}
.nav-icon-btn{width:38px;height:38px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;color:var(--os);position:relative;transition:background 0.25s var(--ease),transform 0.25s var(--ease),color 0.25s var(--ease)}
.nav-icon-btn:hover{background:rgba(79,70,229,0.1);color:var(--p);transform:translateY(-1px)}
.nav-badge{position:absolute;top:-2px;right:-4px;background:linear-gradient(135deg,var(--e),#dc2626);color:#fff;border-radius:10px;padding:1px 5px;font-size:0.6rem;font-weight:700;min-width:16px;text-align:center;display:none;box-shadow:0 0 0 2px var(--s)}
.nav-badge.show{display:inline-block;animation:softPulse 2s ease-in-out infinite}
.user-info{display:flex;align-items:center;gap:6px;padding:5px 12px 5px 8px;border-radius:20px;background:rgba(79,70,229,0.07);cursor:pointer;font-size:0.8rem;font-weight:600;color:var(--navy);transition:background 0.25s var(--ease),transform 0.25s var(--ease)}
.user-info:hover{background:rgba(79,70,229,0.13);transform:translateY(-1px)}
.dark .user-info{color:var(--os)}

/* ===== SIDEBAR / DRAWER ===== */
.side-menu{position:fixed;top:0;left:0;height:100dvh;width:288px;max-width:85vw;background:var(--card-bg);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);box-shadow:var(--shadow-lg);transform:translateX(-100%);transition:transform 0.35s var(--ease);z-index:600;display:flex;flex-direction:column;border-right:1px solid var(--card-border);border-radius:0 20px 20px 0}
.side-menu.open{transform:translateX(0)}
.side-menu.drawer-right{left:auto;right:0;transform:translateX(100%);width:390px;border-right:none;border-left:1px solid var(--card-border);border-radius:20px 0 0 20px}
.side-menu.drawer-right.open{transform:translateX(0)}
.menu-overlay{position:fixed;inset:0;background:rgba(2,6,23,0.45);backdrop-filter:blur(2px);z-index:599;display:none;opacity:0;transition:opacity 0.3s var(--ease)}
.menu-overlay.active{display:block;opacity:1}
.menu-header{padding:20px 16px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--navy) 0%,var(--p) 65%,var(--sec) 130%);color:#fff;border-radius:0 20px 0 0}
.side-menu.drawer-right .menu-header{border-radius:20px 0 0 0}
.menu-header img{height:32px;border-radius:9px;box-shadow:0 2px 8px rgba(0,0,0,0.25)}
.menu-header h3{font-size:0.85rem;letter-spacing:-0.01em}
.role-badge{font-size:0.58rem;background:rgba(255,255,255,0.22);padding:3px 9px;border-radius:10px;margin-left:auto;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;backdrop-filter:blur(4px)}
.menu-content{flex:1;overflow-y:auto;padding:10px 8px}
.menu-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;cursor:pointer;font-size:0.82rem;font-weight:500;color:var(--os);position:relative;transition:background 0.25s var(--ease),color 0.25s var(--ease),transform 0.2s var(--ease),padding-left 0.25s var(--ease)}
.menu-item::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:0;background:linear-gradient(180deg,var(--p),var(--sec));border-radius:0 4px 4px 0;transition:height 0.25s var(--ease)}
.menu-item:hover{background:rgba(79,70,229,0.08);color:var(--p);padding-left:18px}
.menu-item:hover::before{height:60%}
.menu-item:active{transform:scale(0.98)}
.menu-item i{width:20px;text-align:center;font-size:0.95rem;transition:transform 0.25s var(--ease)}
.menu-item:hover i{transform:translateX(1px) scale(1.05)}
.menu-item.danger{color:var(--e)}.menu-item.danger:hover{background:rgba(239,68,68,0.08)}
.menu-divider{border-top:1px solid var(--card-border);margin:8px 4px}
.menu-section{padding:10px 14px 6px;font-size:0.6rem;text-transform:uppercase;letter-spacing:1.8px;color:#94a3b8;font-weight:700}
.menu-footer{padding:10px;border-top:1px solid var(--card-border);font-size:0.62rem;text-align:center;color:#94a3b8}

/* ===== LAYOUT ===== */
.app-container{max-width:1400px;margin:0 auto;padding:18px;min-height:100vh}
.announce-banner{position:sticky;top:64px;z-index:498;overflow:hidden;background:linear-gradient(120deg,var(--purple),#9333ea 45%,var(--sec));border-radius:16px;margin-bottom:14px;box-shadow:var(--shadow-md);display:none}
.announce-banner.show{display:block;animation:fadeInUp 0.4s var(--ease)}
.announce-track{display:inline-flex;align-items:center;white-space:nowrap;padding:11px 0;padding-left:100%;animation:announceScroll 45s linear infinite}
.announce-track:hover,.announce-track:focus-within{animation-play-state:paused}
.announce-track span{display:inline-flex;align-items:center;gap:8px;color:#fff;font-size:0.8rem;font-weight:600;margin-right:70px}
@media(max-width:768px){.announce-banner{top:58px}}

/* ===== CARDS (glass) ===== */
.glass-card{background:var(--card-bg);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-radius:20px;padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--card-border);margin-bottom:14px;animation:fadeInUp 0.45s var(--ease);transition:box-shadow 0.35s var(--ease),transform 0.35s var(--ease)}
.glass-card:hover{box-shadow:var(--shadow-md)}

/* ===== BUTTONS ===== */
.btn{background:linear-gradient(135deg,var(--p),var(--sec));color:#fff;border:none;padding:9px 18px;border-radius:999px;font-weight:600;font-size:0.8rem;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:transform 0.25s var(--ease),box-shadow 0.25s var(--ease),filter 0.25s var(--ease);box-shadow:0 2px 10px -2px rgba(79,70,229,0.4);position:relative}
.btn:hover{transform:translateY(-2px) scale(1.015);box-shadow:var(--shadow-glow);filter:brightness(1.05)}
.btn:active{transform:translateY(0) scale(0.97)}
.btn-outline{background:transparent;border:1.5px solid var(--p);color:var(--p);box-shadow:none}
.btn-outline:hover{background:rgba(79,70,229,0.08);color:var(--pd);transform:translateY(-2px)}
.btn-danger{background:linear-gradient(135deg,var(--e),#dc2626);box-shadow:0 2px 10px -2px rgba(239,68,68,0.4)}
.btn-danger:hover{box-shadow:0 8px 22px -6px rgba(239,68,68,0.45)}
.btn-success{background:linear-gradient(135deg,var(--su),#16a34a);box-shadow:0 2px 10px -2px rgba(34,197,94,0.4)}
.btn-success:hover{box-shadow:0 8px 22px -6px rgba(34,197,94,0.45)}
.btn-warning{background:linear-gradient(135deg,var(--w),#d97706);color:#fff;box-shadow:0 2px 10px -2px rgba(245,158,11,0.4)}
.btn-warning:hover{box-shadow:0 8px 22px -6px rgba(245,158,11,0.45)}
.btn-purple{background:linear-gradient(135deg,var(--purple),var(--purpled));color:#fff;box-shadow:0 2px 10px -2px rgba(124,58,237,0.4)}
.btn-purple:hover{box-shadow:0 8px 22px -6px rgba(124,58,237,0.45)}
.btn-fs{background:linear-gradient(135deg,var(--fs),var(--fsd));color:#fff;box-shadow:0 2px 10px -2px rgba(14,165,233,0.4)}
.btn-fs:hover{box-shadow:0 8px 22px -6px rgba(14,165,233,0.45)}
.btn-sm{padding:6px 12px;font-size:0.72rem;border-radius:999px}.btn-lg{padding:12px 24px;font-size:0.88rem;border-radius:999px}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* ===== FORMS ===== */
.form-group{margin-bottom:14px}.form-group label{display:block;margin-bottom:5px;font-size:0.73rem;font-weight:600;color:#64748b;letter-spacing:0.01em}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;border:1.5px solid var(--o);border-radius:14px;background:rgba(248,250,252,0.6);font-family:'Inter',sans-serif;font-size:0.85rem;outline:none;color:var(--os);transition:border-color 0.25s var(--ease),box-shadow 0.25s var(--ease),background 0.25s var(--ease)}
.form-group input::placeholder,.form-group textarea::placeholder{color:#a1aab8}
.form-group input:hover,.form-group select:hover,.form-group textarea:hover{border-color:#cbd5e1}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(79,70,229,0.12);background:var(--s)}
.dark .form-group input,.dark .form-group select,.dark .form-group textarea{background:rgba(30,41,59,0.6);color:var(--os);border-color:#334155}
.dark .form-group input:focus,.dark .form-group select:focus,.dark .form-group textarea:focus{background:#1e293b}
.password-wrapper{position:relative}.password-wrapper input{padding-right:44px}
.password-toggle{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;border:none;background:transparent;cursor:pointer;color:#94a3b8;transition:background 0.2s var(--ease),color 0.2s var(--ease)}
.password-toggle:hover{background:rgba(79,70,229,0.08);color:var(--p)}
.grid{display:grid;gap:12px}.grid-2{grid-template-columns:1fr 1fr}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hidden{display:none!important}.empty-state{text-align:center;padding:32px 20px;color:#94a3b8}.empty-state i{font-size:2.2rem;margin-bottom:10px;opacity:0.6}

/* ===== BADGES ===== */
.badge{padding:3px 9px;border-radius:8px;font-size:0.64rem;font-weight:700;display:inline-block;letter-spacing:0.01em}
.badge-success{background:rgba(34,197,94,0.14);color:#15803d}.badge-warning{background:rgba(245,158,11,0.14);color:#b45309}
.badge-danger{background:rgba(239,68,68,0.14);color:#b91c1c}.badge-info{background:rgba(79,70,229,0.13);color:#1d4ed8}
.badge-fs{background:rgba(14,165,233,0.14);color:#0369a1}.fs-card{border-left:3px solid var(--fs)}
.sticky-bottom{position:sticky;bottom:0;background:var(--s);padding:14px 0 4px;border-top:1px solid var(--o);z-index:10;margin-top:14px}

/* ===== AUTH ===== */
.auth-wrapper{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-container{width:100%;max-width:440px;animation:fadeInUp 0.5s var(--ease)}
.auth-card{background:var(--card-bg);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-radius:24px;padding:34px 28px;box-shadow:var(--shadow-lg);border:1px solid var(--card-border);position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--p),var(--sec),var(--purple),var(--p));background-size:200% 100%;animation:gradientSlide 3s ease infinite}
.auth-logo{text-align:center;margin-bottom:22px}.auth-logo img{height:48px;border-radius:12px;margin-bottom:10px;box-shadow:var(--shadow-md)}
.auth-logo h1{font-weight:700;font-size:1.4rem;background:linear-gradient(135deg,var(--p),var(--sec));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn-auth{width:100%;padding:13px 22px;background:linear-gradient(135deg,var(--p),var(--sec));color:#fff;border:none;border-radius:999px;font-weight:700;font-size:0.88rem;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px -4px rgba(79,70,229,0.45);transition:transform 0.25s var(--ease),box-shadow 0.25s var(--ease),filter 0.25s var(--ease)}
.btn-auth:hover{transform:translateY(-2px);box-shadow:var(--shadow-glow);filter:brightness(1.05)}
.btn-auth:active{transform:translateY(0) scale(0.98)}
.btn-auth:disabled{opacity:0.7;cursor:wait;transform:none}
.auth-links{text-align:center;margin-top:18px;padding-top:14px;border-top:1px solid var(--o)}
.auth-links p{font-size:0.78rem;color:#64748b;margin:4px 0}.auth-links a{color:var(--p);text-decoration:none;font-weight:600;cursor:pointer;transition:color 0.2s var(--ease)}
.auth-links a:hover{color:var(--sec);text-decoration:underline}
.whatsapp-btn{background:linear-gradient(135deg,#25D366,#1ea952);color:#fff;border:none;padding:11px 16px;border-radius:999px;font-weight:600;font-size:0.78rem;cursor:pointer;display:inline-flex;align-items:center;gap:7px;text-decoration:none;width:100%;justify-content:center;box-shadow:0 3px 12px -3px rgba(37,169,82,0.45);transition:transform 0.25s var(--ease),box-shadow 0.25s var(--ease)}
.whatsapp-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px -5px rgba(37,169,82,0.5)}

/* ===== SPINNER ===== */
.spinner-overlay{position:fixed;inset:0;background:rgba(248,250,252,0.82);backdrop-filter:blur(6px);z-index:10001;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.dark .spinner-overlay{background:rgba(2,6,23,0.82)}
.spinner-ring{width:38px;height:38px;border:3px solid rgba(79,70,229,0.15);border-top:3px solid var(--p);border-right:3px solid var(--sec);border-radius:50%;animation:spin 0.7s linear infinite}

/* ===== MODALS ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(2,6,23,0.55);backdrop-filter:blur(6px);z-index:700;display:flex;align-items:center;justify-content:center;padding:14px}
.modal-content{background:var(--card-bg);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border-radius:22px;width:100%;max-width:650px;max-height:85vh;overflow-y:auto;padding:22px;box-shadow:var(--shadow-lg);border:1px solid var(--card-border);animation:popScale 0.3s var(--ease)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--o);position:sticky;top:0;background:var(--s);z-index:1}
.close-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--o);background:transparent;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;color:var(--os);transition:all 0.3s var(--ease)}
.close-btn:hover{background:var(--e);color:#fff;border-color:var(--e);transform:rotate(90deg) scale(1.05)}

/* ===== DASHBOARD STAT CARDS ===== */
.db-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.db-card{background:var(--card-bg);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-radius:18px;padding:18px;border:1px solid var(--card-border);cursor:pointer;transition:transform 0.35s var(--ease),box-shadow 0.35s var(--ease),border-color 0.35s var(--ease);position:relative;overflow:hidden;animation:fadeInUp 0.5s var(--ease)}
.db-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--p),var(--sec));opacity:0;transition:opacity 0.35s var(--ease)}
.db-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-md);border-color:rgba(79,70,229,0.25)}
.db-card:hover::before{opacity:1}
.card-value{font-size:1.9rem;font-weight:800;color:var(--navy);letter-spacing:-0.02em;line-height:1.1}.dark .card-value{color:#e2e8f0}
.card-label{font-size:0.72rem;color:#64748b;margin-top:6px;font-weight:500;display:flex;align-items:center;gap:5px}
.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.quick-action{background:var(--s);border:1px solid var(--o);border-radius:16px;padding:16px 8px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;transition:transform 0.3s var(--ease),box-shadow 0.3s var(--ease),border-color 0.3s var(--ease),background 0.3s var(--ease)}
.quick-action:hover{background:rgba(79,70,229,0.05);border-color:var(--p);transform:translateY(-3px);box-shadow:var(--shadow-sm)}
.quick-action:active{transform:translateY(-1px) scale(0.97)}
.quick-action i{font-size:1.4rem;color:var(--p);transition:transform 0.3s var(--ease)}.quick-action:hover i{transform:scale(1.12)}
.quick-action span{font-size:0.68rem;font-weight:600}
.welcome-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--p) 55%,var(--sec) 130%);color:#fff;border-radius:20px;padding:22px 24px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:var(--shadow-md);animation:fadeInUp 0.4s var(--ease)}
.welcome-hero::after{content:'';position:absolute;top:-40%;right:-10%;width:220px;height:220px;background:rgba(255,255,255,0.08);border-radius:50%}
.welcome-hero::before{content:'';position:absolute;bottom:-50%;left:10%;width:180px;height:180px;background:rgba(14,165,233,0.15);border-radius:50%;filter:blur(10px)}
.welcome-hero h1{font-size:1.25rem;margin-bottom:3px;position:relative;z-index:1}
.welcome-hero p{font-size:0.78rem;opacity:0.92;position:relative;z-index:1}

/* ===== AVATARS ===== */
.avatar{width:38px;height:38px;border-radius:50%;border:2px solid rgba(79,70,229,0.2);background:rgba(79,70,229,0.1);display:flex;align-items:center;justify-content:center;color:var(--p);font-size:0.95rem;flex-shrink:0;transition:transform 0.25s var(--ease)}
.avatar:hover{transform:scale(1.06)}
.avatar-sm{width:30px;height:30px}.avatar-lg{width:52px;height:52px;border-width:3px;box-shadow:0 4px 14px -4px rgba(0,0,0,0.25)}

/* ===== ENTRY PAGES / SIGNATURE ===== */
.signature-canvas{border:2px dashed var(--o);border-radius:16px;background:rgba(248,250,252,0.6);cursor:crosshair;width:100%;touch-action:none;transition:border-color 0.25s var(--ease)}
.entry-pages-wrap{background:rgba(241,245,249,0.6);border-radius:18px;padding:16px;margin:14px 0}.dark .entry-pages-wrap{background:rgba(15,23,42,0.5)}
.page-block{margin-bottom:14px;background:var(--s);border-radius:16px;box-shadow:var(--shadow-sm);overflow:hidden;border:1px solid var(--o);transition:box-shadow 0.3s var(--ease)}
.page-block:hover{box-shadow:var(--shadow-md)}
.dark .page-block{background:#1e293b}
.page-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;background:rgba(79,70,229,0.05);border-bottom:1px solid var(--o)}
.page-ttl{font-weight:700;font-size:0.78rem;color:var(--p)}
.page-rmv{width:28px;height:28px;border-radius:50%;border:1px solid rgba(239,68,68,0.25);background:rgba(239,68,68,0.08);color:var(--e);cursor:pointer;font-size:0.72rem;display:flex;align-items:center;justify-content:center;transition:all 0.25s var(--ease)}
.page-rmv:hover{background:var(--e);color:#fff;transform:scale(1.08)}
.page-body{padding:16px}.page-field{margin-bottom:14px}
.page-label{display:block;font-size:0.72rem;font-weight:600;color:#64748b;margin-bottom:5px}
.page-input,.page-textarea{width:100%;padding:10px 13px;border:1.5px solid var(--o);border-radius:12px;font-family:'Inter',sans-serif;font-size:0.86rem;outline:none;background:rgba(248,250,252,0.6);color:var(--os);transition:border-color 0.25s var(--ease),box-shadow 0.25s var(--ease)}
.page-input:focus,.page-textarea:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(79,70,229,0.1);background:var(--s)}
.page-textarea{resize:vertical;line-height:1.65;min-height:64px}.page-content-area{min-height:150px}
.dark .page-input,.dark .page-textarea{background:rgba(30,41,59,0.6);color:#e2e8f0;border-color:#334155}
.add-page-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:14px;border:2px dashed #cbd5e1;border-radius:16px;background:transparent;color:var(--p);font-weight:600;font-size:0.82rem;cursor:pointer;margin-top:10px;transition:all 0.3s var(--ease)}
.add-page-btn:hover{background:rgba(79,70,229,0.05);border-color:var(--p);transform:translateY(-2px)}
.page-counter{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;background:rgba(79,70,229,0.08);border-radius:999px;font-size:0.74rem;font-weight:700;color:var(--p)}

/* ===== REVIEW SECTIONS ===== */
.review-section{margin-bottom:16px;border:1px solid var(--o);border-radius:16px;overflow:hidden;transition:box-shadow 0.3s var(--ease)}
.review-section:hover{box-shadow:var(--shadow-sm)}
.review-section-title{padding:12px 16px;background:rgba(79,70,229,0.05);font-size:0.78rem;font-weight:700;color:var(--p);border-bottom:1px solid var(--o)}
.review-section-content{padding:14px 16px;font-size:0.84rem;line-height:1.75;color:var(--os);background:var(--s)}.dark .review-section-content{background:#1e293b}
.page-tabs{display:flex;gap:8px;flex-wrap:wrap;padding:6px;background:var(--b);border-radius:14px;margin-bottom:14px}
.page-tab{padding:9px 16px;border:1px solid var(--o);border-radius:999px;background:var(--s);cursor:pointer;font-size:0.74rem;font-weight:600;color:#64748b;transition:all 0.25s var(--ease)}
.page-tab:hover{background:rgba(79,70,229,0.06);transform:translateY(-1px)}
.page-tab.active{background:linear-gradient(135deg,var(--p),var(--sec));color:#fff;border-color:transparent;box-shadow:0 3px 10px -3px rgba(79,70,229,0.4)}
.fs-verified-banner{padding:12px 16px;background:rgba(14,165,233,0.08);border-left:3px solid var(--fs);border-radius:14px;margin-bottom:14px;font-size:0.82rem;font-weight:600;color:var(--fsd)}
.fs-pending-banner{padding:12px 16px;background:rgba(245,158,11,0.08);border-left:3px solid var(--w);border-radius:14px;margin-bottom:14px;font-size:0.82rem;font-weight:600;color:#b45309}

/* ===== WEEKLY LOGBOOK ===== */
.wk-shell{max-width:960px;margin:0 auto}
.wk-header-card{background:var(--card-bg);backdrop-filter:blur(18px) saturate(160%);border:1px solid var(--card-border);border-radius:20px;padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow-sm);animation:fadeInUp 0.4s var(--ease)}
.wk-header-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 18px;margin-top:12px}
.wk-hfield{min-width:0}
.wk-hfield label{display:block;font-size:0.64rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.wk-hfield .wk-hval{font-size:0.86rem;font-weight:600;color:var(--os);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wk-hfield input{width:100%;padding:9px 12px;border:1.5px solid var(--o);border-radius:10px;font-size:0.82rem;font-family:'Inter',sans-serif;background:rgba(248,250,252,0.6);color:var(--os);outline:none;transition:border-color 0.25s var(--ease),box-shadow 0.25s var(--ease)}
.wk-hfield input:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(79,70,229,0.1);background:var(--s)}
.dark .wk-hfield input{background:rgba(30,41,59,0.6);color:#e2e8f0;border-color:#334155}

.wk-progress-wrap{display:flex;align-items:center;gap:12px;margin:14px 0 18px}
.wk-progress-track{flex:1;height:10px;border-radius:999px;background:rgba(148,163,184,0.22);overflow:hidden;position:relative}
.wk-progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--p),var(--sec));transition:width 0.5s var(--ease);position:relative}
.wk-progress-pct{font-size:0.78rem;font-weight:800;color:var(--p);min-width:42px;text-align:right}

.wk-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:6px;background:var(--b);border-radius:16px;margin-bottom:16px}
.wk-tab{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border:1px solid var(--o);border-radius:999px;background:var(--s);cursor:pointer;font-size:0.72rem;font-weight:700;color:#64748b;transition:all 0.25s var(--ease);white-space:nowrap}
.wk-tab:hover{background:rgba(79,70,229,0.06);transform:translateY(-1px)}
.wk-tab.active{background:linear-gradient(135deg,var(--p),var(--sec));color:#fff;border-color:transparent;box-shadow:0 3px 10px -3px rgba(79,70,229,0.4)}
.wk-tab .wk-status-ico{font-size:0.82rem;display:inline-flex}
.wk-tab .wk-status-ico.ico-complete{color:var(--su)}.wk-tab.active .wk-status-ico.ico-complete{color:#bbf7d0}
.wk-tab .wk-status-ico.ico-partial{color:var(--w)}.wk-tab.active .wk-status-ico.ico-partial{color:#fed7aa}
.wk-tab .wk-status-ico.ico-empty{color:#94a3b8}.wk-tab.active .wk-status-ico.ico-empty{color:#e2e8f0}

.wk-day-card{background:var(--s);border:1px solid var(--o);border-radius:18px;padding:18px;box-shadow:var(--shadow-sm);animation:fadeInUp 0.35s var(--ease)}
.dark .wk-day-card{background:#1e293b}
.wk-field{margin-bottom:14px}
.wk-field label{display:block;font-size:0.72rem;font-weight:700;color:#64748b;margin-bottom:6px}
.wk-field label .req-dot{color:var(--e);margin-left:2px}
.wk-field input[type=date],.wk-field textarea,.wk-field input[type=text]{width:100%;padding:10px 13px;border:1.5px solid var(--o);border-radius:12px;font-family:'Inter',sans-serif;font-size:0.86rem;outline:none;background:rgba(248,250,252,0.6);color:var(--os);transition:border-color 0.25s var(--ease),box-shadow 0.25s var(--ease)}
.wk-field textarea{resize:vertical;line-height:1.65;min-height:76px}
.wk-field input:focus,.wk-field textarea:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(79,70,229,0.1);background:var(--s)}
.dark .wk-field input,.dark .wk-field textarea{background:rgba(30,41,59,0.6);color:#e2e8f0;border-color:#334155}

.wk-status-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:999px;font-size:0.66rem;font-weight:700;letter-spacing:0.01em}
.wk-status-chip.chip-complete{background:rgba(34,197,94,0.14);color:#15803d}
.wk-status-chip.chip-partial{background:rgba(245,158,11,0.14);color:#b45309}
.wk-status-chip.chip-empty{background:rgba(148,163,184,0.18);color:#64748b}

.wk-nav-row{display:flex;gap:10px;justify-content:space-between;margin-top:18px}
.wk-summary-note{font-size:0.72rem;color:#64748b;background:rgba(79,70,229,0.05);border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.wk-sig-box{border:1.5px dashed var(--o);border-radius:14px;padding:14px;text-align:center;background:rgba(248,250,252,0.5)}
.dark .wk-sig-box{background:rgba(15,23,42,0.4)}
.wk-sig-box img{max-height:70px}

/* ===== COVERAGE AREAS / REGION MATCHING ===== */
.coverage-picker{display:flex;flex-wrap:wrap;gap:8px;max-height:190px;overflow-y:auto;padding:12px;border:1.5px solid var(--o);border-radius:14px;background:rgba(248,250,252,0.5)}
.dark .coverage-picker{background:rgba(15,23,42,0.4)}
.coverage-opt{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;border:1.5px solid var(--o);background:var(--s);cursor:pointer;font-size:0.72rem;font-weight:600;color:#64748b;transition:all 0.25s var(--ease);user-select:none}
.coverage-opt:hover{border-color:var(--p);color:var(--p)}
.coverage-opt input{display:none}
.coverage-opt.checked{background:linear-gradient(135deg,var(--p),var(--sec));border-color:transparent;color:#fff;box-shadow:0 3px 10px -3px rgba(79,70,229,0.4)}
.coverage-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;background:rgba(124,58,237,0.12);color:#6d28d9;font-size:0.66rem;font-weight:700;margin:2px}
.match-group-card{background:var(--card-bg);backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:18px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow-sm);transition:box-shadow 0.3s var(--ease)}
.match-group-card:hover{box-shadow:var(--shadow-md)}
.match-region-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed var(--o);font-size:0.8rem}
.match-region-row:last-child{border-bottom:none}
.match-total-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;background:rgba(79,70,229,0.1);color:var(--p);font-weight:800;font-size:0.8rem}
.no-coverage-card{border-left:4px solid var(--w);background:rgba(245,158,11,0.06)}

/* ===== TABLES ===== */
.responsive-table{overflow-x:auto;overflow-y:auto;border-radius:16px;border:1px solid var(--o);max-height:520px;box-shadow:var(--shadow-sm)}
.responsive-table table{width:100%;border-collapse:collapse;min-width:600px}
.responsive-table th{background:var(--s);position:sticky;top:0;padding:12px 14px;text-align:left;font-size:0.68rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;border-bottom:2px solid var(--o);white-space:nowrap;z-index:2}
.responsive-table td{padding:11px 14px;font-size:0.79rem;border-bottom:1px solid var(--o);transition:background 0.2s var(--ease)}
.responsive-table tbody tr:nth-child(even){background:rgba(79,70,229,0.025)}
.dark .responsive-table tbody tr:nth-child(even){background:rgba(255,255,255,0.02)}
.responsive-table tbody tr:hover td{background:rgba(79,70,229,0.06)}
.responsive-table tbody tr:last-child td{border-bottom:none}

/* ===== PROFILE WIZARD ===== */
.profile-wizard{display:flex;gap:5px;margin-bottom:20px;flex-wrap:wrap}
.wizard-step{flex:1;min-width:52px;text-align:center;padding:9px 4px;border-radius:12px;font-size:0.6rem;font-weight:700;cursor:pointer;background:rgba(148,163,184,0.15);color:#64748b;transition:all 0.3s var(--ease)}
.wizard-step:hover{background:rgba(79,70,229,0.1);color:var(--p)}
.wizard-step.active{background:linear-gradient(135deg,var(--p),var(--sec));color:#fff;box-shadow:0 3px 10px -3px rgba(79,70,229,0.4)}
.wizard-step.completed{background:rgba(34,197,94,0.15);color:#15803d}
.wizard-step i{display:block;font-size:0.85rem;margin-bottom:3px}
.progress-ring{position:relative;width:96px;height:96px;margin:0 auto 16px}.progress-ring svg{transform:rotate(-90deg)}
.bg-circle{fill:none;stroke:var(--o);stroke-width:7}
.fg-circle{fill:none;stroke:var(--p);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 0.6s var(--ease)}
.progress-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.35rem;font-weight:800;color:var(--p)}

/* ===== MISC CARDS ===== */
.supervisor-card{padding:12px;border:1px solid var(--o);border-radius:14px;cursor:pointer;margin-bottom:6px;transition:all 0.25s var(--ease)}
.supervisor-card:hover{background:rgba(79,70,229,0.05);border-color:var(--p);transform:translateY(-1px)}
.supervisor-card.selected{background:rgba(79,70,229,0.08);border-color:var(--p);border-width:2px}
.assessment-card{background:var(--card-bg);backdrop-filter:blur(14px);border:1px solid var(--card-border);border-radius:18px;padding:16px;margin-bottom:10px;transition:box-shadow 0.3s var(--ease),transform 0.3s var(--ease)}
.assessment-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.grade-badge{display:inline-block;padding:9px 20px;border-radius:14px;font-weight:800;font-size:1.25rem;letter-spacing:-0.01em}
.grade-a{background:rgba(34,197,94,0.15);color:#15803d}.grade-bplus{background:rgba(79,70,229,0.15);color:#1d4ed8}
.grade-b{background:rgba(124,58,237,0.15);color:#6d28d9}.grade-c{background:rgba(245,158,11,0.15);color:#b45309}
.grade-supp{background:rgba(239,68,68,0.15);color:#b91c1c}

/* ===== FINAL REPORT BUILDER ===== */
.report-shell{display:flex;gap:16px;align-items:flex-start}
.report-sidebar{width:230px;flex-shrink:0;position:sticky;top:74px;max-height:calc(100vh - 90px);overflow-y:auto;background:var(--card-bg);backdrop-filter:blur(18px) saturate(160%);border-radius:18px;border:1px solid var(--card-border);padding:10px;box-shadow:var(--shadow-sm)}
.report-chnav{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;cursor:pointer;font-size:0.74rem;font-weight:600;color:var(--os);margin-bottom:2px;transition:background 0.2s var(--ease),color 0.2s var(--ease)}
.report-chnav i{width:16px;text-align:center;font-size:0.7rem;flex-shrink:0}
.report-chnav:hover{background:rgba(79,70,229,0.08);color:var(--p)}
.report-chnav.active{background:linear-gradient(135deg,var(--p),var(--sec));color:#fff}
.report-chnav.auto::after{content:'AUTO';font-size:0.55rem;margin-left:auto;opacity:0.65;letter-spacing:0.03em}
.report-main{flex:1;min-width:0}
.report-toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;background:var(--card-bg);backdrop-filter:blur(18px);border-radius:16px;border:1px solid var(--card-border);padding:10px 12px;box-shadow:var(--shadow-sm);position:sticky;top:74px;z-index:5}
.report-save-indicator{font-size:0.68rem;color:#64748b;display:flex;align-items:center;gap:5px;margin-left:auto}
.report-save-indicator.saving i{animation:spin 0.8s linear infinite}
.report-save-indicator.saved i{color:var(--su)}
.report-viewport{background:#7c8797;border-radius:16px;padding:28px 12px;overflow-x:auto}
.report-paper{width:210mm;min-height:297mm;margin:0 auto 18px;background:#fff;box-shadow:0 8px 30px -6px rgba(0,0,0,0.35);padding:25mm 25mm 20mm 32mm;font-family:'Times New Roman',Georgia,'Noto Serif',serif;color:#1a1a1a;box-sizing:border-box;position:relative}
.report-page-break{break-before:page;page-break-before:always}
.report-cover{min-height:247mm;display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:flex-start}
.report-cover img{height:78px;margin-bottom:6px}
.report-cover .rc-logos{display:flex;gap:34px;align-items:center;justify-content:center;margin-bottom:22px}
.report-cover h1{font-size:1.05rem;letter-spacing:0.04em;color:#334155;font-weight:700;margin:14px 0 4px}

// ===== LOGBOOK METADATA CONSOLIDATION (Kundi 2) =====
// These fields no longer exist as separate Appwrite attributes on LogbookEntries.
// They are packed into the single existing "metaData" JSON attribute to avoid
// hitting the collection's attribute limit. All other app code keeps reading
// and writing these as flat properties on the entry object - unpackMeta/packMeta/
// mergeMeta silently translate to/from the JSON container at the DB boundary.
S.META_FIELDS=['studentSignature','supervisorSignature','fieldSupervisorSignature','reviewedAt','fieldSupervisorReviewedAt','submittedAt','fieldSupervisorComment','fieldSupervisorRejectComment','universitySupervisorRejectComment','isEdited','activityTitle','activitiesPerformed','skillsAcquired','challengesFaced','description'];
S.packMeta=function(d){var m={};S.META_FIELDS.forEach(function(f){if(d[f]!==undefined){m[f]=d[f];delete d[f]}});d.metaData=JSON.stringify(m);return d};
S.unpackMeta=function(entry){if(!entry)return entry;if(entry.metaData){try{var m=JSON.parse(entry.metaData);S.META_FIELDS.forEach(function(f){if(m[f]!==undefined)entry[f]=m[f]})}catch(e){}}return entry};
S.mergeMeta=function(entry,overrides){entry=entry||{};overrides=overrides||{};var merged={};S.META_FIELDS.forEach(function(f){merged[f]=overrides.hasOwnProperty(f)?overrides[f]:entry[f]});var out={metaData:JSON.stringify(merged)};Object.keys(overrides).forEach(function(k){if(S.META_FIELDS.indexOf(k)===-1)out[k]=overrides[k]});return out};
// Auto-attendance: for every logbook day that has activitiesPerformed filled, ensure a
// present Attendance record exists for that date (same schema/pattern as manual Check In).
// Does not touch existing checkIn/checkOut functions or the Attendance module's own logic;
// only adds missing records so Attendance count reflects days actually logged.
S.syncAttendanceFromWeek=async function(d){if(!d||!d.days)return;for(var i=0;i<WK_DAYS.length;i++){var dk=WK_DAYS[i];var day=d.days[dk];if(!day||!(day.activitiesPerformed||'').toString().trim())continue;try{var ex=await safeOp(db.listDocuments(AC.databaseId,AC.collections.attendance,[Q.equal('studentId',S.user.$id),Q.equal('checkInDate',day.date)]));if(!ex.documents.length){await safeOp(db.createDocument(AC.databaseId,AC.collections.attendance,ID.unique(),{studentId:S.user.$id,checkInDate:day.date,checkInTime:new Date(day.date+'T08:00:00').toISOString(),weekNumber:d.weekNumber,status:'present'}))}}catch(e){}}};

S.goDash=function(){S.showProf=S.showEntry=S.showTasks=S.showAssess=S.showReport=false;S.render()};
S.goProf=function(){S.showProf=true;S.showEntry=S.showTasks=S.showAssess=S.showReport=false;S.render()};
S.goTasks=function(){S.showTasks=true;S.showProf=S.showEntry=S.showAssess=S.showReport=false;S.render()};
S.goReport=async function(){if(S.role!=='student'){showToast('Only students can build a Final Report','warning');return}S.showProf=S.showEntry=S.showTasks=false;S.showReport=true;S.reportLoading=true;S.render();try{await S.loadFinalReport()}catch(e){}S.reportLoading=false;S.render()};

S.updateTop=function(){var ud=document.getElementById('userNameDisplay');if(S.user&&ud)ud.textContent=(S.user.fullName||'').split(' ')[0]||'User';S.updateBadge()};
S.updateBadge=function(){var b=document.getElementById('notifBadge');if(b){if(S.unread>0){b.textContent=S.unread>99?'99+':S.unread;b.classList.add('show')}else{b.textContent='0';b.classList.remove('show')}}};
S.renderAnnounceBanner=function(){var el=document.getElementById('announceBanner');if(!el)return;var list=(S.announcements||[]).filter(function(a){return a.isActive});if(!S.user||list.length===0){el.classList.remove('show');el.innerHTML='';return}var items=list.map(function(a){return'<span>'+a.message+'</span>'}).join('');el.innerHTML='<div class="announce-track">'+items+items+'</div>';el.classList.add('show');var totalLen=list.reduce(function(sum,a){return sum+(a.message||'').length},0)+list.length*10;var duration=Math.max(28,Math.round(totalLen*0.32));var track=el.querySelector('.announce-track');if(track)track.style.animationDuration=duration+'s'};

abel>Region</label><select id="fpRegion" onchange="app.updateFpDistricts()" required><option value="">Select</option>'+regs.map(function(r){return'<option value="'+r+'" '+(f.fieldRegion===r?'selected':'')+'>'+r+'</option>'}).join('')+'</select></div><div class="form-group"><label>District</label><select id="fpDistrict" required><option value="">Select</option>'+dist.map(function(d){return'<option value="'+d+'" '+(f.fieldDistrict===d?'selected':'')+'>'+d+'</option>'}).join('')+'</select></div></div><div class="form-group"><label>Institution</label><input type="text" id="fpInstitution" value="'+(f.institution||'')+'"></div><div class="grid grid-2"><div class="form-group"><label>Start</label><input type="date" id="fpStartDate" value="'+(f.startDate||'')+'"></div><div class="form-group"><label>End</label><input type="date" id="fpEndDate" value="'+(f.endDate||'')+'"></div></div><div class="sticky-bottom" style="display:flex;gap:8px;justify-content:space-between"><button type="button" class="btn btn-outline btn-lg" onclick="app.setWizardStep(1)">Back</button><button type="submit" class="btn btn-lg" style="min-width:140px">Save</button></div></form>';return h;case 3:var matchHtml='';if(S.supId&&S.user.supervisorStatus==='approved'){var assignedSup=S.supervisors.find(function(s){return s.$id===S.supId});matchHtml='<div class="wk-summary-note" style="background:rgba(34,197,94,0.08);color:#15803d"><i class="fas fa-circle-check"></i> Officially assigned to <strong>'+(assignedSup?assignedSup.fullName:'your University Supervisor')+'</strong>'+(f.fieldRegion?(' for '+f.fieldRegion):'')+'.</div>'}else if(S.user.matchStatus==='matched_pending_department'){var matchedSup=S.supervisors.find(function(s){return s.$id===S.user.matchedSupervisorId});matchHtml='<div class="wk-summary-note"><i class="fas fa-diagram-project"></i> Automatically matched with <strong>'+(matchedSup?matchedSup.fullName:'a University Supervisor')+'</strong> covering '+(S.user.matchedRegion||f.fieldRegion||'your region')+'. '+S.wkStatusChip('partial')+' Pending Department Approval.</div>'}else if(S.user.matchStatus==='no_coverage'){matchHtml='<div class="wk-summary-note" style="background:rgba(245,158,11,0.08);color:#b45309"><i class="fas fa-triangle-exclamation"></i> No University Supervisor currently covers '+(S.user.matchedRegion||f.fieldRegion||'your region')+'. Please contact your Department.</div>'}else{matchHtml='<div class="wk-summary-note"><i class="fas fa-circle-info"></i> Once you save your Field Placement region, the system will automatically match you with a University Supervisor. You do not choose your supervisor manually.</div>'}return'<div><h3>University Supervisor</h3><p style="font-size:0.75rem;color:#64748b;margin-bottom:10px">Your University Supervisor is matched automatically based on your Placement Region, then approved by your Department.</p>'+matchHtml+'<div class="sticky-bottom" style="display:flex;gap:8px;justify-content:space-between"><button type="button" class="btn btn-outline btn-lg" onclick="app.setWizardStep(2)">Back</button><button type="button" class="btn btn-lg" onclick="app.setWizardStep(4)" style="min-width:140px">Continue</button></div></div>';case 4:return'<form onsubmit="app.saveFieldSupervisor(event)"><h3>Field Supervisor</h3><div class="form-group"><label>Name</label><input type="text" id="fsName" value="'+(f.fieldSupervisorName||'')+'" required></div><div class="grid grid-2"><div class="form-group"><label>Phone</label><input type="tel" id="fsPhone" value="'+(f.fieldSupervisorPhone||'')+'" required></div><div class="form-group"><label>Email</label><input type="email" id="fsEmail" value="'+(f.fieldSupervisorEmail||'')+'"></div></div><div class="sticky-bottom" style="display:flex;gap:8px;justify-content:space-between"><button type="button" class="btn btn-outline btn-lg" onclick="app.setWizardStep(3)">Back</button><button type="submit" class="btn btn-lg btn-success" style="min-width:140px">Complete</button></div></form>';default:return' S.requestSupervisor=async function(sid){if(!confirm('Request this supervisor?'))return;S.loading('Sending...');try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,S.user.$id,{supervisorId:sid,supervisorStatus:'pending'}));S.supId=sid;var sup=S.allUsers.find(function(u){return u.$id===sid});if(sup){await S.notify(sid,'Supervisor Request',S.user.fullName+' requested you.','supervisor_request').catch(function(){});try{var deps=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('role','department'),Q.equal('accountStatus','active')]));for(var i=0;i<deps.documents.length;i++){await S.notify(deps.documents[i].$id,'Pending Request',S.user.fullName+' requested '+sup.fullName,'supervisor_request_pending').catch(function(){})}}catch(notifErr){}}S.hideLoading();S.render();showToast('Request sent!','success')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};

S.runRegionMatch=async function(region){if(!region)return;var candidates=(S.supervisors||[]).filter(function(s){return Array.isArray(s.coverageAreas)&&s.coverageAreas.indexOf(region)>-1});if(candidates.length===0){try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,S.user.$id,{matchedSupervisorId:null,matchedRegion:region,matchStatus:'no_coverage'}));S.user.matchedSupervisorId=null;S.user.matchedRegion=region;S.user.matchStatus='no_coverage'}catch(er){}showToast('No University Supervisor has been assigned to this region. Please contact your Department.','warning',{title:'No Coverage Found',icon:'triangle-exclamation',duration:6000});return}var counts=candidates.map(function(c){var n=(S.allUsers||[]).filter(function(u){return u.role==='student'&&(u.matchedSupervisorId===c.$id||u.supervisorId===c.$id)}).length;return{sup:c,n:n}});counts.sort(function(a,b){return a.n-b.n});var chosen=counts[0].sup;try{await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,S.user.$id,{matchedSupervisorId:chosen.$id,matchedRegion:region,matchStatus:'matched_pending_department'}));S.user.matchedSupervisorId=chosen.$id;S.user.matchedRegion=region;S.user.matchStatus='matched_pending_department';try{var deps=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('role','department'),Q.equal('accountStatus','active')]));for(var i=0;i<deps.documents.length;i++){await S.notify(deps.documents[i].$id,'New Supervisor Match',S.user.fullName+' was automatically matched with '+chosen.fullName+' ('+region+') — awaiting your approval.','supervisor_match_pending').catch(function(){})}}catch(notifErr){}}catch(er){}showToast('Matched with '+chosen.fullName+' ('+region+') — Pending Department Approval','info',{title:'Automatic Match Found',icon:'diagram-project',duration:5000})};
S.saveFieldPlacement=async function(e){e.preventDefault();var region=document.getElementById('fpRegion').value;var d={studentId:S.user.$id,supervisorId:S.supId||null,fieldRegion:region,fieldDistrict:document.getElementById('fpDistrict').value,institution:document.getElementById('fpInstitution').value,startDate:document.getElementById('fpStartDate').value,endDate:document.getElementById('fpEndDate').value,status:'submitted'};S.loading('Saving...');try{if(S.fieldPlacementData.$id)await safeOp(db.updateDocument(AC.databaseId,AC.collections.fieldPlacements,S.fieldPlacementData.$id,d));else{var r=await safeOp(db.createDocument(AC.databaseId,AC.collections.fieldPlacements,ID.unique(),d));S.fieldPlacementData.$id=r.$id}Object.assign(S.fieldPlacementData,d);var regionChanged=S.user.matchedRegion!==region;S.hideLoading();S.profileWizardStep=3;S.render();showToast('Saved (60%)','success');if(regionChanged&&!S.supId)await S.runRegionMatch(region);S.render()}catch(er){S.hideLoading();showToast(getErrMsg(er),'error')}};
S.saveFieldSupervisor=async function(e){e.preventDefault();var fsName=document.getElementById('fsName').value.trim(),fsPhone=document.getElementById('fsPhone').value.trim(),fsEmail=document.getElementById('fsEmail').value.trim().toLowerCase();if(!fsName||!fsEmail){showToast('Please fill in the Field Supervisor Name and Email','error');return}if(!isValidEmail(fsEmail)){showToast('Field Supervisor email is not valid','error');return}var d={fieldSupervisorName:fsName,fieldSupervisorPhone:fsPhone,fieldSupervisorEmail:fsEmail};S.loading('Saving...');try{if(S.fieldPlacementData.$id)await safeOp(db.updateDocument(AC.databaseId,AC.collections.fieldPlacements,S.fieldPlacementData.$id,d));else{var r=await safeOp(db.createDocument(AC.databaseId,AC.collections.fieldPlacements,ID.unique(),Object.assign({studentId:S.user.$id,supervisorId:S.supId||null,status:'not_submitted'},d)));S.fieldPlacementData.$id=r.$id}Object.assign(S.fieldPlacementData,d);var fsUserId=null,fsRegNo=null,fsTempPass=null,fsIsNew=false;var existing=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('email',fsEmail)]));if(existing.documents.length>0){var exU=existing.documents[0];if(exU.role&&exU.role!=='field_supervisor'){S.hideLoading();showToast('This email is already used by a different type of account in the system','error');return}fsUserId=exU.$id}else{fsRegNo='FS-'+Math.floor(10000000+Math.random()*90000000);fsTempPass=FS_DEFAULT_PASSWORD;var newAcc=await account.create(ID.unique(),fsEmail,fsTempPass,fsName);await safeOp(db.createDocument(AC.databaseId,AC.collections.users,newAcc.$id,{fullName:fsName,registrationNumber:fsRegNo,email:fsEmail,phone:fsPhone,role:'field_supervisor',accountStatus:'active',isFirstLogin:false,mustChangePassword:false,createdAt:new Date().toISOString()}));fsUserId=newAcc.$id;fsIsNew=true}await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,S.user.$id,{fieldSupervisorPendingId:fsUserId}));S.user.fieldSupervisorPendingId=fsUserId;if(S.user.isFirstLogin){await safeOp(db.updateDocument(AC.databaseId,AC.collections.users,S.user.$id,{isFirstLogin:false})).catch(function(){});S.user.isFirstLogin=false}try{var deps=await safeOp(db.listDocuments(AC.databaseId,AC.collections.users,[Q.equal('role','department'),Q.equal('accountStatus','active')]));for(var i=0;i<deps.documents.length;i++){await S.notify(deps.documents[i].$id,'Profile Completed',S.user.fullName+' completed profile.','profile_completed').catch(function(){});if(fsIsNew)await S.notify(deps.documents[i].$id,'Field Supervisor Account Created','FS: '+fsName+' ('+fsEmail+') | Reg No: '+fsRegNo+' | Password: '+fsTempPass+' | For student: '+S.user.fullName+' - Awaiting your approval','fs_account_created').catch(function(){});else await S.notify(deps.documents[i].$id,'Field Supervisor Assignment Pending','FS '+fsName+' was requested by '+S.user.fullName+' - Awaiting your approval','fs_assignment_pending').catch(function(){})}}catch(notifErr){}S.hideLoading();S.showProf=false;S.render();showToast('Field Supervisor details saved successfully! Awaiting Department approval.','success')}catch(er){S.hideLoading();showToast(getErrMsg(er),'error');console.error('saveFieldSupervisor failed:',er)}};
S.saveProfileToDB=async function(){var p=S.profileData,c=S.calcProfileCompletion(),d={userId:S.user.$id,gender:p.gender||null,dateOfBirth:p.dateOfBirth||null,institution:p.institution||null,programme:p.programme||null,yearOfStudy:p.yearOfStudy||null,semester:p.semester||null,completionPercentage:c};try{var ex=await safeOp(db.listDocuments(AC.databaseId,AC.collections.profiles,[Q.equal('userId',S.user.$id)]));if(ex.documents.length>0)await safeOp(db.updateDocument(AC.databaseId,AC.collections.profiles,ex.documents[0].$id,d));else await safeOp(db.createDocument(AC.databaseId,AC.collections.profiles,ID.unique(),d))}catch(er){}};

S.legacyResubmitEntry=async function(){var eid=S.editingEntryId;if(!eid)return;var original=S.entries.find(function(e){return e.$id===eid});if(!original){showToast('Original entry not found','error');return}var pages=S.getPagesData();if(!pages.some(function(p){return p.activityTitle||p.activitiesPerformed})){showToast('Please fill in at least one page','error');return}S.loading('Resubmitting...');try{var mainTitle=pages[0].activityTitle||'Untitled';if(pages.length>1)mainTitle+=' ('+pages.length+' activities)';var wasFSRejected=original.fieldSupervisorStatus==='rejected';var wasUSRejected=!wasFSRejected&&original.status==='Rejected';var d={activityTitle:mainTitle,objectives:pages[0].objectives||'',activitiesPerformed:pages.map(function(p){return p.activitiesPerformed}).filter(Boolean).join('\n\n'),description:pages.map(function(p,i){return'<div data-page="'+(i+1)+'">'+p.activitiesPerformed+'</div>'}).join('\n<!-- PAGE_BREAK -->\n'),skillsAcquired:pages.map(function(p){return p.skillsAcquired}).filter(Boolean).join(' | '),challengesFaced:pages.map(function(p){return p.challengesFaced}).filter(Boolean).join(' | '),totalPages:pages.length,hasMultiplePages:pages.length>1,pagesData:JSON.stringify(pages),isEdited:true,submittedAt:new Date().toISOString()};if(wasFSRejected){d.fieldSupervisorStatus='pending';d.fieldSupervisorRejectComment=null}else if(wasUSRejected){d.status='Pending Review';d.universitySupervisorRejectComment=null}var lgUpd=S.mergeMeta(original,d);await safeOp(db.updateDocument(AC.databaseId,AC.collections.logbookEntries,eid,lgUpd));S.hideLoading();S.showEntry=false;S.editingEntryId=null;S.totalPages=1;await S.loadStudentData();S.render();showToast('Entry resubmitted!','success');if(wasFSRejected){if(original.fieldSupervisorId)await S.notify(original.fieldSupervisorId,'Entry Resubmitted',S.user.fullName+' resubmitted an edited entry: '+mainTitle,'field_verification_needed').catch(function(){});if(original.supervisorId)await S.notify(original.supervisorId,'E S.renderSignatureBlock=function(entry){var stu=S.allUsers.find(function(u){return u.$id===entry.studentId});var fs=entry.fieldSupervisorId?S.allUsers.find(function(u){return u.$id===entry.fieldSupervisorId}):null;var us=entry.supervisorId?S.allUsers.find(function(u){return u.$id===entry.supervisorId}):null;var card=function(label,person,sig,date){return '<div style="flex:1;min-width:150px;border:1px solid var(--o);border-radius:10px;padding:10px;text-align:center;background:#f8fafc"><div style="font-size:0.65rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px">'+label+'</div>'+(sig?('<img src="'+sig+'" style="max-height:60px;max-width:100%">'):('<div style="font-size:0.72rem;color:var(--w);padding:14px 0"><i class="fas fa-hourglass-half"></i> Pending Approval</div>'))+'<div style="font-size:0.75rem;font-weight:600;margin-top:6px">'+(person?person.fullName:'—')+'</div>'+(date?('<div style="font-size:0.65rem;color:#94a3b8">'+new Date(date).toLocaleDateString()+'</div>'):'')+'</div>'};var h='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px dashed var(--o)">';h+=card('Student',stu,entry.studentSignature,entry.submittedAt);h+=card('Field Supervisor',fs,entry.fieldSupervisorStatus==='verified'?entry.fieldSupervisorSignature:null,entry.fieldSupervisorReviewedAt);h+=card('University Supervisor',us,entry.status==='Approved'?entry.supervisorSignature:null,entry.reviewedAt);h+='</div>';return h};

S.openFSign=function(eid){S.sigId=eid;var sig=S.user.signature;var h='<div class="modal-content" style="max-width:450px"><div class="modal-header"><h3>Verify & Sign</h3><button class="close-btn" onclick="app.closeMod(\'modalSignature\')"><i class="fas fa-times"></i></button></div>'+(sig?'<div style="border:1px solid var(--o);border-radius:10px;padding:8px;text-align:center;background:#f8fafc"><img src="'+sig+'" style="max-height:100px"></div>':'<p style="color:var(--e);font-size:0.8rem">No saved signature found. Please log out and back in to set one up.</p>')+'<div class="form-group" style="margin-top:10px"><label>Comment (optional, visible to University Supervisor)</label><textarea id="fsApproveComment" rows="3"></textarea></div><div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-sm btn-outline" style="flex:1" onclick="app.closeMod(\'modalSignature\')">Cancel</button><button class="btn btn-sm btn-fs" style="flex:2" onclick="app.saveFSign()">Verify & Sign</button></div></div>';S.openMod('modalSignature',h)};
